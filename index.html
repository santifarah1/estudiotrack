/* ---------- listo para rendir (diagnóstico) ---------- */
function renderDiagnostico(){
  const _w=document.querySelector('.wrap'); if(_w){_w.classList.remove('split');_w.classList.remove('camino-solo');}
  const dg=diagnostico(vista.id);
  if(!dg){vista={tipo:'inicio'};render();return;}
  const m=dg.materia;
  const dias=diasRestantes(m.fecha);
  const ex=exigencia(m.objetivo);

  // clasificar unidades
  const flojas=dg.unidades.filter(u=>!u.sinDatos && u.pct<ex.umbral);
  const medias=dg.unidades.filter(u=>!u.sinDatos && u.pct>=ex.umbral && u.pct<85);
  const buenas=dg.unidades.filter(u=>!u.sinDatos && u.pct>=85);
  const sinHacer=dg.unidades.filter(u=>u.sinDatos);

  let clase='rojo', veredicto='Todavía te falta', consejo='';
  if(dg.global===null){
    veredicto='Sin datos todavía';
    consejo='Hacé algunos quizzes y volvé: acá te voy a mostrar en qué temas estás firme y en cuáles flojeás.';
  }else if(dg.global>=85 && sinHacer.length===0){
    clase='verde'; veredicto='¡Estás listo!';
    consejo='Dominás el material. Repasá lo poco que falte y andá tranquilo.';
  }else if(dg.global>=ex.umbral){
    clase='amarillo'; veredicto='Vas bien, pero afiná';
    consejo = flojas.length
      ? `Concentrate en ${flojas.length===1?'la unidad floja':'las '+flojas.length+' unidades flojas'} de abajo.`
      : 'Seguí completando las unidades que te faltan.';
  }else{
    clase='rojo'; veredicto='Hay que meterle';
    consejo='Estás por debajo de tu objetivo. Repasá las unidades en rojo antes de seguir avanzando.';
  }

  const fila=(u)=>{
    if(u.sinDatos) return `<div class="diag-u vacio">
      <span class="du-ico">⚪</span>
      <span class="du-tx"><span class="du-t">${esc(u.titulo)}</span><span class="du-s">Todavía no la hiciste</span></span>
    </div>`;
    const cls = u.pct>=85?'bien' : u.pct>=ex.umbral?'medio' : 'flojo';
    const ico = u.pct>=85?'✅' : u.pct>=ex.umbral?'⚠️' : '🔴';
    const txt = u.pct>=85?'La tenés dominada' : u.pct>=ex.umbral?'Aceptable, podés afinar' : 'Necesita repaso';
    return `<div class="diag-u ${cls}">
      <span class="du-ico">${ico}</span>
      <span class="du-tx">
        <span class="du-t">${esc(u.titulo)}</span>
        <span class="du-s">${txt} · ${u.ok} de ${u.total} preguntas bien</span>
      </span>
      <span class="du-pct">${u.pct}%</span>
    </div>`;
  };

  // ordenar: primero lo flojo (es lo accionable)
  const ordenadas=[...flojas, ...medias, ...buenas, ...sinHacer];

  $app.innerHTML=`
    ${marcaHTML()}
    <button class="volver" id="volver">← Volver al camino</button>
    <div class="card">
      <h2>¿Listo para rendir?</h2>
      <p class="sub">${esc(m.nombre)} · ${dias===0?'¡Es hoy!':`faltan ${dias} día${dias===1?'':'s'}`} · objetivo ${esc(m.objetivo)}</p>

      <div class="diag-global ${clase}">
        <div class="dg-num">${dg.global===null?'—':dg.global+'%'}</div>
        <div class="dg-txt"><strong>${veredicto}</strong></div>
        <div class="dg-txt">${consejo}</div>
      </div>

      ${dg.aRepasar>0?`<button class="seguir-hoy" id="ir-repaso" style="margin-top:14px">
        <span class="ico">🔁</span>
        <span class="tx">
          <span class="et">Repaso pendiente</span>
          <span class="ti">${dg.aRepasar} pregunta${dg.aRepasar===1?'':'s'} para repasar</span>
          <span class="ma">Las que fallaste, servidas en el momento justo</span>
        </span>
        <span class="flecha">→</span>
      </button>`:''}

      <h2 style="font-size:19px;margin-top:22px">Tema por tema</h2>
      <p class="sub">Ordenado por lo que más necesita tu atención.</p>
      ${ordenadas.map(fila).join('')}
    </div>`;
  wireMarca();
  document.getElementById('volver').onclick=()=>{vista={tipo:'camino',id:m.id};render();};
  const ir=document.getElementById('ir-repaso');
  if(ir) ir.onclick=()=>{ iniciarRepaso(m.id); };
}

/* ---------- repaso espaciado ---------- */
function iniciarRepaso(mid){
  const pend=pendientesDeRepaso(mid);
  if(!pend.length){
    alert('No tenés preguntas para repasar ahora. ¡Buen síntoma!');
    return;
  }
  const d=datosMateria(mid);
  const enColaAntes=((d&&d.desempenio&&d.desempenio.fallos)||[]).length;
  const preguntas=barajar(pend).slice(0,10);
  vista={tipo:'quiz', mid, nid:'repaso', nodo:{tipo:'repaso', titulo:'Repaso'},
         preguntas, i:0, aciertos:0, respondida:false, esRepaso:true,
         enColaAntes,
         tandaActual:0, tandasTotales:1};
  render();
}

      <textarea id="codigo-in" style="min-height:100px;font-family:ui-monospace,monospace;font-size:12px" placeholder="R1_..."></textarea>
      <button class="btn sec" id="archivo-btn">📂 Cargar archivo</button>
      <input type="file" id="archivo-in" accept=".txt" style="display:none">
      ${aviso?`<div class="info-cuota" style="background:var(--aprobado-claro);border-color:var(--aprobado)">${esc(aviso)}</div>`:''}
      <div id="err-resp">${err?`<div class="err">${esc(err)}</div>`:''}</div>
      <button class="btn" id="restaurar">📥 Restaurar (sumar a lo que tengo)</button>
      <button class="btn sec" id="restaurar-r">♻️ Restaurar reemplazando todo</button>
    </div>`;
  wireMarca();
  document.getElementById('volver').onclick=()=>{vista={tipo:'ajustes',volver:{tipo:'inicio'}};render();};

  document.getElementById('generar').onclick=async ()=>{
    const btn=document.getElementById('generar');
    btn.disabled=true; btn.textContent='Generando…';
    const conClave=document.getElementById('con-clave').checked;
    try{
      const cod=await exportarPerfil(conClave);
      document.getElementById('salida').innerHTML=`
        <div class="codigo-box" id="codigo">${esc(cod)}</div>
        <p class="hint">${(cod.length/1000).toFixed(1)}k caracteres</p>
        <button class="btn" id="copiar">📋 Copiar</button>
        <button class="btn sec" id="descargar">💾 Descargar archivo</button>`;
      document.getElementById('copiar').onclick=async ()=>{
        const b=document.getElementById('copiar');
        try{ await navigator.clipboard.writeText(cod); b.textContent='✓ ¡Copiado!'; setTimeout(()=>{b.textContent='📋 Copiar';},2000); }
        catch(e){ b.textContent='Copialo a mano del recuadro'; }
      };
      document.getElementById('descargar').onclick=()=>{
        const blob=new Blob([cod],{type:'text/plain'});
        const a=document.createElement('a');
        a.href=URL.createObjectURL(blob);
        a.download='estudiotrack-respaldo.txt';
        a.click();
        URL.revokeObjectURL(a.href);
      };
    }catch(e){
      document.getElementById('salida').innerHTML=`<div class="err">No pude generar el respaldo: ${esc(e.message||'')}</div>`;
    }
    btn.disabled=false; btn.textContent='📤 Generar respaldo';
  };

  const inp=document.getElementById('archivo-in');
  document.getElementById('archivo-btn').onclick=()=>inp.click();
  inp.onchange=()=>{
    const f=inp.files[0]; if(!f) return;
    const r=new FileReader();
    r.onload=()=>{ document.getElementById('codigo-in').value=String(r.result).trim(); };
    r.readAsText(f);
  };

  const hacerRestaurar=async (modo)=>{
    const cod=document.getElementById('codigo-in').value.trim();
    if(!cod){ renderRespaldo('Pegá el código o cargá el archivo primero.'); return; }
    if(modo==='reemplazar' && !confirm('Esto BORRA las materias que tenés en este dispositivo y las reemplaza por las del respaldo. ¿Seguimos?')) return;
    try{
      const n=await importarPerfil(cod, modo);
      vista={tipo:'inicio'};
      render();
      setTimeout(()=>alert(`Listo: se restauraron ${n} materia${n===1?'':'s'}.`),100);
    }catch(e){
      renderRespaldo('No pude restaurar: '+(e.message||'código inválido'));
    }
  };
  document.getElementById('restaurar').onclick=()=>hacerRestaurar('sumar');
  document.getElementById('restaurar-r').onclick=()=>hacerRestaurar('reemplazar');
}

// Arma un HTML con estilo de impresión y abre el diálogo de imprimir/guardar PDF.
async function exportarPDF(mid, incluirPreguntas){
  const m=materias.find(x=>x.id===mid);
  const d=datosMateria(mid);
  if(!m||!d||!d.plan){ alert('No se pudo leer la materia.'); return; }

  const unidades=d.plan.unidades;
  const respuestas=[];   // se juntan para la hoja final
  let cuerpo='';
  let huboContenido=false;

  unidades.forEach((u,ui)=>{
    // saltear la "Recta final" (simulacro) en el PDF
    const leccionNodo=u.nodos.find(n=>n.tipo==='leccion');
    if(!leccionNodo) return;
    const li=u.nodos.indexOf(leccionNodo);
    const c=d.contenido[`${ui}-${li}`];
    if(!c||!c.puntos){ return; }   // unidad no generada: se saltea
    huboContenido=true;

    cuerpo+=`<h1 class="unidad">Unidad ${ui+1} · ${esc(u.titulo)}</h1>`;
    cuerpo+=`<h2 class="leccion">${esc(leccionNodo.titulo)}</h2>`;
    if(c.resumen) cuerpo+=`<p class="resumen">${esc(c.resumen)}</p>`;
    cuerpo+=`<ul class="puntos">${(c.puntos||[]).map(p=>`<li>${esc(p)}</li>`).join('')}</ul>`;
    if(c.ejemplo) cuerpo+=`<div class="ejemplo"><strong>Caso de examen</strong>${esc(c.ejemplo)}</div>`;

    if(incluirPreguntas){
      const quizNodo=u.nodos.find(n=>n.tipo==='quiz');
      const qi=quizNodo?u.nodos.indexOf(quizNodo):-1;
      const cq=qi>=0?d.contenido[`${ui}-${qi}`]:null;
      const preguntas=(cq&&cq.preguntas)?cq.preguntas.slice(0,5):[];
      if(preguntas.length){
        cuerpo+=`<div class="quiz-titulo">Preguntas de repaso — Unidad ${ui+1}</div>`;
        const respUnidad=[];
        preguntas.forEach((p,pi)=>{
          if(p.tipo==='abierta'){
            cuerpo+=`<div class="preg"><div class="q">${pi+1}. ${esc(p.q)}</div><div class="linea-resp">Respuesta: _______________________________________________</div></div>`;
            respUnidad.push(`<div class="resp-linea"><span class="num">${pi+1}.</span> ${esc((p.modelo||p.clave&&p.clave.join('; ')||'—'))}</div>`);
          }else{
            const ops=p.opciones||[];
            cuerpo+=`<div class="preg"><div class="q">${pi+1}. ${esc(p.q)}</div><ol type="a">${ops.map(o=>`<li>${esc(o)}</li>`).join('')}</ol></div>`;
            const correcta=ops[p.correcta];
            const letra=String.fromCharCode(97+(p.correcta||0));
            respUnidad.push(`<div class="resp-linea"><span class="num">${pi+1}.</span> ${letra}) ${esc(correcta||'')}</div>`);
          }
        });
        respuestas.push({titulo:`Unidad ${ui+1} · ${esc(u.titulo)}`, lineas:respUnidad});
      }
    }
  });

  if(!huboContenido){
    alert('Esta materia todavía no tiene contenido generado. Abrí algunas lecciones del camino y después exportá.');
    return;
  }

  // hoja de respuestas al final
  let hojaResp='';
  if(incluirPreguntas && respuestas.length){

      hojaResp+=`<div class="resp-unidad">${r.titulo}</div>${r.lineas.join('')}`;
    });

  }

  // Imprimir vía iframe oculto (no ventana nueva).
  // window.open rompe la app cuando está instalada como PWA (Android standalone):
  // no hay pestañas donde abrir y el navegador cierra la app. El iframe vive
  // dentro de la misma página, así que anda igual en PWA, celular y compu.
  const previo=document.getElementById('pdf-frame');
  if(previo) previo.remove();

  const iframe=document.createElement('iframe');
  iframe.id='pdf-frame';
  // fuera de pantalla pero "visible" para el navegador (display:none rompe print en algunos)
  iframe.style.cssText='position:fixed;right:0;bottom:0;width:0;height:0;border:0;visibility:hidden';
  document.body.appendChild(iframe);

  const idoc=iframe.contentWindow.document;
  idoc.open();
  idoc.write(html);
  idoc.close();

  const lanzar=()=>{
    try{
      iframe.contentWindow.focus();
      iframe.contentWindow.print();
    }catch(err){
      alert('No se pudo abrir el diálogo de impresión. Probá desde el navegador (no la app instalada) o avisame.');
    }
    // limpiar el iframe un rato después (cuando ya se cerró el diálogo)
    setTimeout(()=>{ const f=document.getElementById('pdf-frame'); if(f) f.remove(); }, 60000);
  };

  // esperar a que el iframe cargue su contenido antes de imprimir
  if(iframe.contentWindow.document.readyState==='complete') setTimeout(lanzar,400);
  else iframe.onload=()=>setTimeout(lanzar,400);
}

function renderExportar(){

      </div>
      <p class="hint" style="margin-top:12px">De esta materia ya tenés generado: <strong>${nodosListos} de ${totalNodos}</strong> nodos. Los que falten, tu amigo los va a generar con su propia clave a medida que avance.</p>
      <div class="codigo-box" id="codigo">${esc(codigo)}</div>
      <p class="hint">${(codigo.length/1000).toFixed(1)}k caracteres — es largo, por eso conviene compartir directo (abajo) en vez de pegarlo en un mensaje.</p>
      <button class="btn" id="compartir-nativo" style="display:none">📤 Compartir (WhatsApp, mail…)</button>
      <button class="btn sec" id="copiar">📋 Copiar código</button>
      <button class="btn sec" id="descargar">💾 Descargar como archivo</button>
    </div>`;

  document.getElementById('volver').onclick=()=>{vista={tipo:'camino',id:m.id};render();};
  document.getElementById('copiar').onclick=async ()=>{
    const btn=document.getElementById('copiar');

      await navigator.clipboard.writeText(codigo);
      btn.textContent='✓ ¡Copiado!';
      setTimeout(()=>{btn.textContent='📋 Copiar código';},2000);
    }catch(e){
      // fallback: seleccionar el texto
      const r=document.createRange();
      r.selectNode(document.getElementById('codigo'));
      window.getSelection().removeAllRanges();
      window.getSelection().addRange(r);
      btn.textContent='Copialo a mano (está seleccionado)';
    }
  };
  document.getElementById('descargar').onclick=()=>{
    const blob=new Blob([codigo],{type:'text/plain'});
    const a=document.createElement('a');
    a.href=URL.createObjectURL(blob);
    a.download=`estudiotrack-${m.nombre.replace(/[^a-z0-9]/gi,'-').toLowerCase()}.txt`;
    a.click();
    URL.revokeObjectURL(a.href);
  };

  // Compartir nativo: usa el menú del sistema (WhatsApp, mail, etc.).
  // Es lo que mejor funciona en celu/tablet: no depende de descargar archivos.
  const btnNativo=document.getElementById('compartir-nativo');
  if(navigator.share && btnNativo){
    btnNativo.style.display='';
    btnNativo.onclick=async ()=>{
      // 1) intentar compartir un archivo (lo mejor: entra completo aunque sea largo)
      try{
        const archivo=new File([codigo], `${m.nombre.replace(/[^a-z0-9]/gi,'-').toLowerCase()}.estudiotrack.txt`, {type:'text/plain'});
        if(navigator.canShare && navigator.canShare({files:[archivo]})){
          await navigator.share({
            files:[archivo],
            title:`EstudioTrack: ${m.nombre}`,
            text:`Te comparto la materia "${m.nombre}" de EstudioTrack. Abrila en la app con "Importar materia".`
          });
          return;
        }
      }catch(e){ if(e.name==='AbortError') return; }
      // 2) si no se puede compartir archivo, compartir el texto directo
      try{
        await navigator.share({
          title:`EstudioTrack: ${m.nombre}`,
          text:codigo
        });
      }catch(e){
        if(e.name==='AbortError') return;
        alert('Tu dispositivo no dejó compartir directo. Probá con "Copiar código".');
      }
    };
  }
}

function esDesktop(){ return window.matchMedia('(min-width:900px)').matches; }

// construye el HTML del camino (columna de nodos). Si compacto, sin acciones grandes.
function caminoHTML(m,d){
  const planos=nodosPlanos(d);
  const actual=planos.find(n=>!d.completados[n.id]);
  let html='';
  d.plan.unidades.forEach((u,ui)=>{
    html+=`<div class="unidad-titulo">${esc(u.titulo)}</div>`;
    u.nodos.forEach((n,ni)=>{
      const id=`${ui}-${ni}`;
      const idx=planos.findIndex(p=>p.id===id);
      const ok=!!d.completados[id];
      const desbloq=repasoLibre||ok||planos.slice(0,idx).every(p=>d.completados[p.id]);
      const esActual=!repasoLibre&&actual&&actual.id===id;
      const seleccionado=(vista.nid===id&&(vista.tipo==='leccion'||vista.tipo==='quiz'));
      html+=`
        <button class="nodo ${ok?'ok':''} ${!desbloq?'bloq':''} ${esActual?'actual':''} ${seleccionado?'sel':''}" data-id="${id}" ${!desbloq?'disabled':''}>
          <span class="icono">${iconoNodo(n.tipo)}</span>
          <span class="txt">
            <span class="tipo">${nombreTipo(n.tipo)}</span><br>
            <span class="tit">${esc(n.titulo)}</span>
          </span>
          ${ok?'<span class="check">✓</span>':''}
        </button>`;
    });
  });
  return html;
}

      </div>
      <div class="barra"><div style="width:${pct}%"></div></div>
      <div class="barra-label">${pct}% del camino recorrido${pct===100?' — ¡a rendir tranquilo! 🎓':''}${(d.vueltas||0)>0?` · <strong>completada ${d.vueltas} ${d.vueltas===1?'vez':'veces'}</strong> 🔂`:''}</div>
      ${m.tieneParciales?`<div class="barra-label">📝 Con parciales viejos de referencia — las preguntas siguen el estilo del profe</div>`:''}
    </div>`;
}

// Libera espacio: borra lecciones y quizzes generados, conserva plan/progreso/apuntes.
// Si volvés a abrir un nodo, se regenera (gasta cuota, pero recuperás el espacio).
function pesoMateria(mid){
  try{
    const raw=localStorage.getItem('et:m:'+mid)||'';
    return raw.length*2;   // bytes
  }catch(e){ return 0; }
}
function archivarMateria(mid){
  const d=datosMateria(mid);
  if(!d) return 0;
  const antes=pesoMateria(mid);
  d.contenido={};        // el contenido generado es lo que más pesa después de los apuntes
  d.explicaciones={}; d.explicRtas={};    // se regeneran junto con las lecciones
  guardarMateria(mid,d);
  const despues=pesoMateria(mid);
  return Math.max(0, antes-despues);
}

function accionesHTML(mid){
  const pend = mid ? pendientesDeRepaso(mid).length : 0;
  return `

    </button>

// cablea los botones del camino y de acciones (sirve para móvil y para el panel de desktop)
function wireCamino(m,d){
  const vi=document.getElementById('volver-inicio');
  if(vi) vi.onclick=()=>{repasoLibre=false;vista={tipo:'inicio'};render();};
  document.querySelectorAll('.nodo:not(.bloq)').forEach(b=>{
    b.onclick=()=>{
      const nodo=nodosPlanos(d).find(n=>n.id===b.dataset.id);
      const forzar = repasoLibre && nodo && nodo.tipo!=='leccion';
      abrirNodo(vista.id||m.id,b.dataset.id,forzar);
    };
  });
  const bs=document.getElementById('salir-repaso');
  if(bs) bs.onclick=()=>{repasoLibre=false;render();};
  const br=document.getElementById('repaso');
  if(br) br.onclick=()=>{repasoLibre=!repasoLibre;render();};
  const bd=document.getElementById('ir-diagnostico');
  if(bd) bd.onclick=()=>{ vista={tipo:'diagnostico', id:m.id}; render(); };
  const bf=document.getElementById('ir-flashcards');
  if(bf) bf.onclick=()=>{ vista={tipo:'flashcards', id:m.id, cards:barajar(flashcardsDe(m.id)), fi:0, girada:false}; render(); };
  const bc=document.getElementById('compartir');
  if(bc) bc.onclick=()=>{ vista={tipo:'compartir', id:m.id}; render(); chequearLogros({compartida:true}); };
  const bpdf=document.getElementById('exportar-pdf');
  if(bpdf) bpdf.onclick=()=>{ vista={tipo:'exportar', id:m.id}; render(); };
  const ba=document.getElementById('archivar');
  if(ba) ba.onclick=()=>{
    const kb=Math.round(pesoMateria(m.id)/1024);
    if(confirm(`Liberar espacio de "${m.nombre}" (ocupa ${kb} KB)\n\nSe borran las lecciones y quizzes ya generados, pero se conservan:\n• Tu progreso\n• El plan del camino\n• Tus apuntes\n\nSi volvés a abrir un nodo, se regenera con la IA (gasta cuota).\n\n¿Seguimos?`)){
      const liberado=archivarMateria(m.id);
      render();
      setTimeout(()=>alert(`Listo: liberaste ${Math.round(liberado/1024)} KB.`),100);
    }
  };
  const brp=document.getElementById('rehacer-plan');
  if(brp) brp.onclick=async ()=>{
    if(!hayMotor()){ alert('Necesitás tu clave de Gemini en Ajustes (⚙️) para rehacer el plan.'); return; }
    if(!confirm(`Rehacer el plan de "${m.nombre}".\n\nLa IA vuelve a dividir tus apuntes en unidades, ahora separando mejor los temas (un tema por unidad). Se pierde el progreso de esta materia y se regenera todo el contenido.\n\nTus apuntes NO se tocan.\n\n⚠️ Gasta cuota de tu clave.\n\n¿Seguimos?`)) return;
    const d=datosMateria(m.id);
    const apuntes=await apuntesDe(d);
    if(!apuntes || !apuntes.trim()){ alert('Esta materia no tiene apuntes guardados, no se puede rehacer el plan.'); return; }
    vista={tipo:'generando', msg:'Rehaciendo el plan, separando bien los temas…'};
    render();
    try{
      const plan=await iaJSON(pPlan(m, apuntes), 8192);
      if(!plan || !plan.unidades || !plan.unidades.length) throw new Error('El plan vino vacío. Reintentá.');
      const d2=datosMateria(m.id);
      d2.plan=plan;
      d2.completados={}; d2.contenido={}; d2.explicaciones={}; d2.explicRtas={}; d2.intentos={};
      d2.usadas={}; d2.desempenio={porUnidad:{}, fallos:[]};
      guardarMateria(m.id, d2);
      vista={tipo:'camino', id:m.id};
      render();
    }catch(e){
      alert(mensajeError(e));
      vista={tipo:'camino', id:m.id};
      render();
    }
  };

  const bre=document.getElementById('reiniciar');
  if(bre) bre.onclick=()=>{
    const dPrev=datosMateria(m.id);
    const planosPrev=nodosPlanos(dPrev);
    const estabaCompleta = planosPrev.length>0 && planosPrev.every(n=>dPrev.completados[n.id]);
    const vueltas = dPrev.vueltas||0;
    const msg = estabaCompleta
      ? `Ya completaste "${m.nombre}"${vueltas>0?` ${vueltas+1} ${vueltas+1===1?'vez':'veces'}`:''}.\n\nAl reiniciar, la IA arma TODO de nuevo: lecciones con otros ejemplos y ángulos, y preguntas distintas a las que ya te tomó. Se conservan tus apuntes y el plan.\n\n⚠️ Ojo: regenerar el contenido gasta cuota de tu clave.\n\n¿Seguimos?`
      : `Esto vuelve "${m.nombre}" a 0% para hacerla de nuevo.\n\nLa IA va a generar lecciones y preguntas NUEVAS (distintas a las que ya viste). Se conservan tus apuntes y el plan.\n\n⚠️ Ojo: regenerar el contenido gasta cuota de tu clave.\n\n¿Seguimos?`;
    if(confirm(msg)){
      const d2=datosMateria(m.id);
      // 'vueltas' cuenta las veces que la COMPLETÓ (para el logro y el cartel)
      if(estabaCompleta) d2.vueltas=(d2.vueltas||0)+1;
      // 'reinicios' cuenta cualquier reinicio: le dice a la IA que profundice
      d2.reinicios=(d2.reinicios||0)+1;
      d2.completados={}; d2.contenido={};
      d2.explicaciones={}; d2.explicRtas={};   // la lección se regenera: las explicaciones viejas ya no aplican
      d2.intentos={};
      // OJO: 'usadas' NO se borra, así el examen final y los quizzes
      // generan preguntas nuevas y no repiten las de la vuelta anterior.
      guardarMateria(m.id,d2);
      repasoLibre=false;
      vista={tipo:'camino',id:m.id};
      render();
    }
  };
  const bb=document.getElementById('borrar');
  if(bb) bb.onclick=()=>{
    if(confirm(`Esto borra "${m.nombre}" con todo su progreso. ¿Seguimos?`)){
      borrarMateria(m.id);
      repasoLibre=false;
      vista={tipo:'inicio'};render();
    }
  };
}

/* ---------- abrir nodo ---------- */
// avanza a la siguiente tanda del banco. Devuelve true si hay preguntas nuevas sin gastar cuota.
// cuántas tandas COMPLETAS de 5 entran en el banco (descarta el resto suelto)
function tandasDe(banco){ return Math.max(1, Math.floor(banco.length/5)); }

// Avanza a la siguiente serie del banco.
// Devuelve false cuando YA NO QUEDAN series sin usar: ahí hay que pedir preguntas nuevas a la IA.
function siguienteTanda(mid,nid){
  const d=datosMateria(mid);
  const c=d.contenido[nid];
  if(!c||!c.preguntas) return false;
  const buenas=limpiarPreguntas(c.preguntas);
  const tandas=tandasDe(buenas);
  const actual=c.tanda||0;
  if(actual+1 >= tandas) return false;   // se acabó el banco: NO volver a la serie 1
  c.tanda=actual+1;
  guardarMateria(mid,d);
  return true;
}

async function abrirNodo(mid, nid, forzarNuevo){
  const m=materias.find(x=>x.id===mid);
  let d=datosMateria(mid);
  const planos=nodosPlanos(d);
  const nodo=planos.find(n=>n.id===nid);
  if(!nodo) return;

  const ui=parseInt(nid.split('-')[0],10);
  const unidad=d.plan.unidades[ui];
  const esSimulacro=nodo.tipo==='simulacro';
  let apuntesTxt=null;   // se descomprimen solo si hace falta generar
  let parcialesTxt=null; // parciales viejos (estilo del profe), solo si la materia los tiene

  // REINTENTO GRATIS: solo para quizzes de unidad (el examen final siempre se regenera entero)
  if(forzarNuevo && nodo.tipo==='quiz' && siguienteTanda(mid,nid)){
    forzarNuevo=false;      // no hace falta llamar a la IA
    d=datosMateria(mid);    // RELEER: siguienteTanda actualizó la tanda en disco
  }

  if(!d.contenido[nid]||forzarNuevo){
    vista={tipo:'generando',msg:esSimulacro?'Armando el examen final…':(forzarNuevo?'Generando preguntas nuevas…':'Preparando la unidad…')};
    render();
    try{
      if(esSimulacro){
        // el examen final se genera solo (cubre todos los temas)
        const evitar=d.usadas[nid]||'';
        apuntesTxt = apuntesTxt ?? await apuntesDe(d);
        parcialesTxt = parcialesTxt ?? await parcialesDe(d);
        const cont=await iaJSON(pQuiz(m,apuntesTxt,nodo,true,evitar,null,parcialesTxt),8192,false,0.85);
        let ok=limpiarPreguntas(cont.preguntas);
        ok=quitarRepetidas(ok, evitar);          // el examen final nunca repite
        if(ok.length<6) throw new Error('El examen vino incompleto. Probá de nuevo.');
        d.usadas[nid]=[(d.usadas[nid]||''),ok.map(p=>p.q).join(' | ')].filter(Boolean).join(' | ');
        d.contenido[nid]={preguntas:ok};   // el examen final se rinde entero, sin tandas
      }else if(forzarNuevo && nodo.tipo==='quiz'){
        // reintento: pedir preguntas NUEVAS a la IA solo si el banco local ya se agotó
        const evitar=d.usadas[nid]||'';
        // Banco agotado: pedir un LOTE NUEVO de preguntas (15, para 3 series más)
        apuntesTxt = apuntesTxt ?? await apuntesDe(d);
        parcialesTxt = parcialesTxt ?? await parcialesDe(d);
        const cont=await iaJSON(pQuiz(m,apuntesTxt,nodo,false,evitar,15,parcialesTxt),8192,false,0.95);
        let ok=limpiarPreguntas(cont.preguntas);
        ok=quitarRepetidas(ok, evitar);
        if(ok.length<3) throw new Error('No pude generar preguntas nuevas distintas. Probá de nuevo en un momento.');
        d.usadas[nid]=[(d.usadas[nid]||''),ok.map(p=>p.q).join(' | ')].filter(Boolean).join(' | ');
        // reemplazar el banco por el nuevo y volver a la serie 1
        d.contenido[nid]={preguntas:ok, tanda:0};
      }else{
        // UN SOLO PEDIDO genera la lección Y el quiz de toda la unidad (ahorra cuota)
        apuntesTxt = apuntesTxt ?? await apuntesDe(d);
        parcialesTxt = parcialesTxt ?? await parcialesDe(d);
        // Preguntas ya tomadas en esta unidad (de vueltas anteriores): no se repiten.
        const idsQuiz=unidad.nodos.map((n,ni)=>n.tipo==='quiz'?`${ui}-${ni}`:null).filter(Boolean);
        const yaUsadas=idsQuiz.map(id=>d.usadas[id]||'').filter(Boolean).join(' | ');
        // Temperatura según vuelta: la 1ra va conservadora (0.4) para máxima
        // coherencia lección↔quiz; en revueltas sube a 0.8 para que el "otro
        // ángulo" que pide el prompt salga de verdad y no una paráfrasis.
        const cont=await iaJSON(pUnidad(m,apuntesTxt,unidad,parcialesTxt,yaUsadas,d.reinicios||0),16384,false,(d.reinicios||0)>0?0.8:0.4);
        if(!cont.leccion||!cont.quiz) throw new Error('La unidad vino incompleta');
        let banco=limpiarPreguntas(cont.quiz.preguntas);
        banco=quitarRepetidas(banco, yaUsadas);   // filtro de seguridad por si la IA repitió igual
        if(banco.length<3) throw new Error('La IA devolvió un quiz incompleto. Probá de nuevo.');
        unidad.nodos.forEach((n,ni)=>{
          const id=`${ui}-${ni}`;
          if(n.tipo==='leccion') d.contenido[id]=cont.leccion;
          else if(n.tipo==='quiz'){
            // banco completo (hasta 15). Se sirven de a 5: los reintentos no gastan cuota.
            d.contenido[id]={preguntas:banco, tanda:0};
            // ACUMULAR el historial (antes se pisaba y por eso repetía en la 2ª vuelta)
            d.usadas[id]=[(d.usadas[id]||''), banco.map(p=>p.q).join(' | ')].filter(Boolean).join(' | ');
          }
        });
      }
      guardarMateria(mid,d);
    }catch(e){
      // Falló generar preguntas nuevas. NO mentir mostrando las viejas como si fueran nuevas:
      // avisar con honestidad y dejar que el usuario elija.
      if(forzarNuevo && d.contenido[nid] && (d.contenido[nid].preguntas||[]).length){
        const seguir=confirm(
          'No pude generar preguntas nuevas.\n\n'+mensajeError(e)+
          '\n\n¿Querés repasar con las MISMAS preguntas de antes (mezcladas)?\n\n'+
          'Aceptar = repasar las mismas\nCancelar = volver al camino'
        );
        if(seguir){
          vista={tipo:'quiz',mid,nid,nodo,preguntas:barajar(limpiarPreguntas(d.contenido[nid].preguntas)),i:0,aciertos:0,respondida:false,sonRepetidas:true};
          render();
          return;
        }
      }
      vista={tipo:'camino',id:mid};render();
      alert(mensajeError(e));
      return;
    }
  }
  const c=d.contenido[nid];
  if(!c){ vista={tipo:'camino',id:mid}; render(); alert('No se generó el contenido de este nodo. Probá de nuevo.'); return; }
  if(nodo.tipo==='leccion'){
    vista={tipo:'leccion',mid,nid,nodo,contenido:c};
  }else{
    const buenas=limpiarPreguntas(c.preguntas);
    if(buenas.length<3){
      if(!forzarNuevo){ return abrirNodo(mid,nid,true); }
      vista={tipo:'camino',id:mid}; render();
      alert('Este quiz quedó incompleto. Probá de nuevo en un momento.');
      return;
    }
    if(nodo.tipo==='simulacro'){
      // EXAMEN FINAL: se rinde entero, sin tandas. Todas las preguntas de una.
      vista={tipo:'quiz',mid,nid,nodo,preguntas:barajar(buenas),i:0,aciertos:0,respondida:false,
             tandaActual:0, tandasTotales:1};
    }else{
      // quiz de unidad: 5 preguntas por tanda (reintentos gratis con preguntas distintas)
      const POR_TANDA=5;
      const tandas=tandasDe(buenas);
      const t=((c.tanda||0)%tandas);
      let lote=buenas.slice(t*POR_TANDA,(t+1)*POR_TANDA);
      if(lote.length<POR_TANDA) lote=buenas.slice(0,POR_TANDA);
      vista={tipo:'quiz',mid,nid,nodo,preguntas:barajar(lote),i:0,aciertos:0,respondida:false,
             tandaActual:t, tandasTotales:tandas};
    }
  }
  render();
}

/* ---------- lección ---------- */
function cajaExplicacion(e){
  if(!e||!e.explicacion) return '';
  return `<div class="exp-caja">
    <strong>💡 Explicado de otra forma</strong>
    ${esc(e.explicacion)}
    ${e.tip?`<div class="ex-mas">🎯 ${esc(e.tip)}</div>`:''}
  </div>`;
}

function renderLeccion(){
  const c=vista.contenido;
  const d=datosMateria(vista.mid);
  // Explicaciones ya pedidas. Se indexan por el TEXTO del punto (no por su posición):
  // si la lección se regenera con otros puntos, las viejas no se muestran.
  const expls=(d.explicaciones&&d.explicaciones[vista.nid])||{};
  const html=`
    <button class="volver" id="volver">← Volver al camino</button>
    <div class="card contenido">
      <h2>${esc(vista.nodo.titulo)}</h2>
      <p>${esc(c.resumen)}</p>
      <div class="puntos">
        ${(c.puntos||[]).map((p,i)=>{
          const ex=expls[normQ(p)];
          const agotado=ex&&(ex.intento||1)>=4;
          return `
          <div class="punto">
            <span class="b">›</span>
            <span>${esc(p)}</span>
            ${agotado?'':`<button class="exp-btn" data-i="${i}" title="Explicámelo de otra forma">${ex?'🔄 Sigo sin entender':'💡 No entiendo'}</button>`}
          </div>
          <div id="exp-${i}">${ex?cajaExplicacion(ex):''}</div>
        `;}).join('')}
      </div>
      ${c.ejemplo?`<div class="ejemplo"><strong>Caso de examen</strong>${esc(c.ejemplo)}</div>`:''}
      <button class="btn" id="listo">${repasoLibre?'Listo (repaso)':(d.completados[vista.nid]?'Volver al camino':'Entendido, siguiente ✓')}</button>
    </div>`;
  pintarContenido(html, ()=>{
    const bv=document.getElementById('volver');
    if(bv) bv.onclick=()=>{vista={tipo:'camino',id:vista.mid};render();};

    // --- Explicame esto ---
    $app.querySelectorAll('.exp-btn').forEach(btn=>{
      btn.onclick=async ()=>{
        const i=+btn.dataset.i;
        const punto=(c.puntos||[])[i];
        const caja=document.getElementById('exp-'+i);
        if(!punto||!caja) return;

        if(!hayMotor()){
          caja.innerHTML=`<div class="exp-caja"><strong>💡 Explicación</strong>Necesitás cargar tu clave de Gemini en Ajustes (⚙️) para pedir explicaciones.</div>`;
          return;
        }
        btn.disabled=true; btn.textContent='Pensando…';
        caja.innerHTML=`<div class="exp-caja"><strong>💡 Explicación</strong>Buscando otra forma de explicártelo…</div>`;
        let guardada=null;   // visible en el catch: si un reintento falla, hay que restaurarla
        try{
          const m=materias.find(x=>x.id===vista.mid);
          const dd=datosMateria(vista.mid);
          const apuntes=await apuntesDe(dd);
          // ¿Ya hay una explicación guardada para este punto? → este es un reintento.
          // Las guardadas sin 'intento' (versiones viejas) cuentan como intento 1.
          guardada=((dd.explicaciones||{})[vista.nid]||{})[normQ(punto)]||null;
          const intento=guardada?((guardada.intento||1)+1):1;
          const r=await iaJSON(pExplicar(m, apuntes, vista.nodo.titulo, punto, intento, guardada&&guardada.explicacion), 1024, false, intento>1?0.9:0.7);
          const expl={explicacion:r.explicacion||'', tip:r.tip||'', intento};
          caja.innerHTML=cajaExplicacion(expl);
          // guardar para no volver a gastar cuota
          const d2=datosMateria(vista.mid);
          if(!d2.explicaciones) d2.explicaciones={};
          if(!d2.explicaciones[vista.nid]) d2.explicaciones[vista.nid]={};
          d2.explicaciones[vista.nid][normQ(punto)]=expl;   // clave = texto del punto
          guardarMateria(vista.mid,d2);
          if(intento>=4){
            // 4 enfoques distintos y sigue sin cerrar: la IA ya dio lo que tenía
            btn.remove();
            caja.insertAdjacentHTML('beforeend','<p class="hint" style="margin-top:6px">Ya te lo expliqué de 4 formas distintas. Si sigue sin cerrar, anotalo para preguntarle al profe o releé esa parte de tus apuntes.</p>');
          }else{
            btn.disabled=false; btn.textContent='🔄 Sigo sin entender';
          }
          chequearLogros({explicacion:true});
        }catch(e){
          // Si era un reintento, restaurar la explicación anterior y avisar abajo;
          // si era el primer intento, mostrar solo el error.
          caja.innerHTML=(guardada?cajaExplicacion(guardada):'')
            +`<div class="exp-caja"><strong>💡 Explicación</strong>${esc(mensajeError(e))}</div>`;
          btn.disabled=false;
          btn.textContent=guardada?'🔄 Sigo sin entender':'💡 No entiendo';
        }
      };
    });
    document.getElementById('listo').onclick=()=>{
      let esNuevo=false;
      if(!repasoLibre){
        const d2=datosMateria(vista.mid);
        if(!d2.completados[vista.nid]){
          d2.completados[vista.nid]=true;
          guardarMateria(vista.mid,d2);
          marcarRacha();
          esNuevo=true;
        }
      }
      vista={tipo:'camino',id:vista.mid};render();
      if(esNuevo) chequearLogros({esLeccion:true});
    };
  });
}

/* ---------- quiz / simulacro ---------- */
function renderQuiz(){
  const total=vista.preguntas.length;
  if(vista.i>=total){renderResultado(total);return;}
  const q=vista.preguntas[vista.i];
  const cabecera=`<div class="q-num">${nombreTipo(vista.nodo.tipo)} · Pregunta ${vista.i+1} de ${total}${(vista.tandasTotales>1&&vista.nodo.tipo!=='simulacro')?` · serie ${(vista.tandaActual||0)+1}/${vista.tandasTotales}`:''}${q.tipo==='abierta'?' · a desarrollar':''}</div>`;

  // ---- PREGUNTA A DESARROLLAR ----
  if(q.tipo==='abierta'){
    const html=`
      <button class="volver" id="volver">← Volver al camino</button>
      <div class="card">
        ${cabecera}
        <div class="q-texto">${esc(q.q)}</div>
        <textarea id="resp-abierta" placeholder="Escribí tu respuesta como en un final: explicá con tus palabras, mencioná los conceptos clave…" style="min-height:150px;margin-top:6px"></textarea>
        <p class="hint">La IA la corrige con criterio de examen: te dice qué acertaste y qué te faltó.</p>
        <button class="btn" id="corregir">Corregir mi respuesta</button>
        <div id="feedback"></div>
      </div>`;
    pintarContenido(html, ()=>{
      const bv=document.getElementById('volver');
      if(bv) bv.onclick=()=>{vista={tipo:'camino',id:vista.mid};render();};
      const ta=document.getElementById('resp-abierta');
      const btn=document.getElementById('corregir');
      btn.onclick=async ()=>{
        if(vista.respondida) return;
        const texto=(ta.value||'').trim();
        if(texto.length<10){ alert('Escribí una respuesta un poco más desarrollada.'); return; }
        vista.respondida=true;
        btn.disabled=true; btn.textContent='Corrigiendo…';
        ta.disabled=true;
        try{
          const m=materias.find(x=>x.id===vista.mid);
          const r=await iaJSON(pCorregir(m, q, texto), 1024, false, 0.4);
          const nota=Math.max(0, Math.min(10, Number(r.nota)||0));
          const bien = nota>=6;                 // aprobada esta pregunta
          if(bien) vista.aciertos++;
          if(nota>=10) chequearLogros({notaAbierta:10});
          if(!repasoLibre && vista.mid){
            const nidReg = vista.esRepaso ? (q.ui!==undefined ? q.ui+'-r' : '0-r') : vista.nid;
            if(nidReg) registrarRespuesta(vista.mid, nidReg, q, bien);
          }
          document.getElementById('feedback').innerHTML=`
            <div class="explic ${bien?'bien':'mal'}">
              <strong>${nota}/10 ${bien?'✓':'✗'}</strong>
              <div style="margin-bottom:8px">${esc(r.veredicto||'')}</div>
              ${(r.bien&&r.bien.length)?`<div style="margin-bottom:6px"><strong style="display:inline;font-weight:700">Bien:</strong> ${esc(r.bien.join('. '))}</div>`:''}
              ${(r.falta&&r.falta.length)?`<div><strong style="display:inline;font-weight:700">Te faltó:</strong> ${esc(r.falta.join('. '))}</div>`:''}
              ${q.modelo?`<div style="margin-top:10px;padding-top:10px;border-top:1px solid rgba(0,0,0,.08)"><strong style="display:inline;font-weight:700">Respuesta modelo:</strong> ${esc(q.modelo)}</div>`:''}
            </div>
            <button class="btn" id="sig">${vista.i+1<total?'Siguiente pregunta':'Ver resultado'}</button>`;
          document.getElementById('sig').onclick=()=>{vista.i++;vista.respondida=false;render();};
        }catch(e){
          vista.respondida=false;
          btn.disabled=false; btn.textContent='Corregir mi respuesta';
          ta.disabled=false;
          document.getElementById('feedback').innerHTML=`<div class="err">${esc(mensajeError(e))}</div>`;
        }
      };
    });
    return;
  }

  // ---- MULTIPLE CHOICE ----
  const html=`
    <button class="volver" id="volver">← Volver al camino</button>
    <div class="card">
      ${cabecera}
      <div class="q-texto">${esc(q.q)}</div>
      <div id="ops">
        ${q.opciones.map((o,i)=>`<button class="opcion" data-i="${i}">${esc(o)}</button>`).join('')}
      </div>
      <div id="feedback"></div>
    </div>`;
  pintarContenido(html, ()=>{
  const bv=document.getElementById('volver');
  if(bv) bv.onclick=()=>{vista={tipo:'camino',id:vista.mid};render();};
  document.querySelectorAll('.opcion').forEach(btn=>{
    btn.onclick=()=>{
      if(vista.respondida)return;
      vista.respondida=true;
      const elegida=+btn.dataset.i;
      const bien=elegida===q.correcta;
      if(bien)vista.aciertos++;
      // registrar el resultado (alimenta el diagnóstico y el repaso espaciado)
      if(!repasoLibre && vista.tipo==='quiz' && vista.mid){
        // en el repaso, cada pregunta guarda de qué unidad vino
        const nidReg = vista.esRepaso ? (q.ui!==undefined ? q.ui+'-r' : '0-r') : vista.nid;
        if(nidReg) registrarRespuesta(vista.mid, nidReg, q, bien);
      }
      $app.querySelectorAll('.opcion').forEach(b=>{
        b.disabled=true;
        const i=+b.dataset.i;
        if(i===q.correcta)b.classList.add('correcta');
        else if(i===elegida)b.classList.add('mal');
      });
      // ¿Ya se pidió antes el "por qué" de esta misma pregunta con esta misma opción?
      // (cacheado: se muestra gratis, sin gastar cuota)
      const dPq=vista.mid?datosMateria(vista.mid):null;
      const clavePq=normQ(q.q)+'|'+elegida;
      const pqCacheada=(!bien && dPq && dPq.explicRtas && dPq.explicRtas[clavePq])||null;
      document.getElementById('feedback').innerHTML=`
        <div class="explic ${bien?'bien':'mal'}">
          <strong>${bien?'¡Bien ahí! ✓':'No era esa ✗'}</strong>
          ${bien?'':`<div style="margin-bottom:6px"><strong style="display:inline;font-weight:700">La correcta era:</strong> ${esc(q.opciones[q.correcta])}</div>`}
          ${esc(q.explicacion||'')}
        </div>
        ${pqCacheada?`<div class="exp-caja"><strong>🤔 Por qué</strong>${esc(pqCacheada)}</div>`:''}
        ${(!bien && !pqCacheada && vista.mid && q.opciones)?`<button class="btn sec chico" id="pq" style="margin-top:8px">🤔 ¿Por qué está mal la mía?</button><div id="pq-caja"></div>`:''}
        <button class="btn" id="sig">${vista.i+1<total?'Siguiente pregunta':'Ver resultado'}</button>`;
      document.getElementById('sig').onclick=()=>{vista.i++;vista.respondida=false;render();};
      const bpq=document.getElementById('pq');
      if(bpq) bpq.onclick=async ()=>{
        const cajaPq=document.getElementById('pq-caja');
        if(!hayMotor()){
          cajaPq.innerHTML=`<div class="exp-caja">Necesitás cargar tu clave de Gemini en Ajustes (⚙️) para pedir explicaciones.</div>`;
          return;
        }
        bpq.disabled=true; bpq.textContent='Pensando…';
        try{
          const m=materias.find(x=>x.id===vista.mid);
          const dd=datosMateria(vista.mid);
          // Contexto barato: la lección de la unidad. Si no hay (examen final,
          // simulacro), caen los apuntes recortados como plan B.
          const uiCtx=(q.ui!==undefined)?q.ui:parseInt(vista.nid,10);
          let ctx=leccionContexto(dd, uiCtx);
          if(!ctx) ctx=recortar(await apuntesDe(dd), 30000);
          const r=await iaJSON(pPorQue(m, ctx, q, elegida), 512, false, 0.5);
          const texto=(r.porque||'').trim();
          if(!texto) throw new Error('Respuesta vacía de la IA');
          const d2=datosMateria(vista.mid);
          if(!d2.explicRtas) d2.explicRtas={};
          d2.explicRtas[clavePq]=texto;
          guardarMateria(vista.mid,d2);
          cajaPq.innerHTML=`<div class="exp-caja"><strong>🤔 Por qué</strong>${esc(texto)}</div>`;
          bpq.remove();
        }catch(e){
          cajaPq.innerHTML=`<div class="exp-caja">${esc(mensajeError(e))}</div>`;
          bpq.disabled=false; bpq.textContent='🤔 ¿Por qué está mal la mía?';
        }
      };
    };
  });
  });
}

function renderResultado(total){
  const m=materias.find(x=>x.id===vista.mid);
  const ex=exigencia(m?m.objetivo:'8+');
  const pct=Math.round(vista.aciertos/total*100);
  const aprobado=pct>=ex.umbral;
  const nota=Math.max(1,Math.round(pct/10));

  // --- REPASO ESPACIADO: no es un nodo del camino, tiene su propio cierre ---
  if(vista.esRepaso){
    const quedan=pendientesDeRepaso(vista.mid).length;
    // contar cuántas preguntas quedaron dominadas en este repaso
    const dd=datosMateria(vista.mid);
    const enColaAhora=((dd&&dd.desempenio&&dd.desempenio.fallos)||[]).length;
    const dominadas=Math.max(0,(vista.enColaAntes||0)-enColaAhora);
    chequearLogros({esRepaso:true, dominadas});
    const html=`
      <div class="card resultado">
        <div class="nota">${vista.aciertos}/${total}</div>
        <p><strong>Repaso terminado</strong></p>
        <p class="sub">${vista.aciertos===total
            ? 'Perfecto. Las que acertaste tres veces seguidas salen de la cola: ya las tenés.'
            : 'Las que fallaste vuelven mañana. Las que acertaste se alejan en el tiempo.'}
          ${quedan>0?`<br>Te quedan <strong>${quedan}</strong> pendientes para hoy.`:'<br>No te queda nada más para repasar hoy. 💪'}</p>
        <div class="acciones-pie">
          <button class="btn sec" id="volverBtn">Volver al camino</button>
          ${quedan>0?'<button class="btn" id="seguirRepaso">Seguir repasando</button>':''}
        </div>
      </div>`;
    pintarContenido(html, ()=>{
      document.getElementById('volverBtn').onclick=()=>{vista={tipo:'diagnostico',id:vista.mid};render();};
      const sr=document.getElementById('seguirRepaso');
      if(sr) sr.onclick=()=>iniciarRepaso(vista.mid);
    });
    return;
  }

  const html=`
    <div class="card resultado">
      <div class="nota">${vista.aciertos}/${total}</div>
      <p><strong>${aprobado?'¡Aprobado!':'Todavía no'}</strong> — equivale a un ${nota} más o menos.</p>
      <p class="sub">${repasoLibre
          ?'Modo repaso: practicaste este quiz sin afectar tu progreso.'
          :(aprobado?'Nodo completado. Seguí el camino.':`Con objetivo ${esc(m?m.objetivo:'8+')} necesitás ${ex.umbral}% para avanzar. ${vista.nodo.tipo==='simulacro'?'Repasá las unidades flojas y volvé a rendir: el examen se arma de nuevo con otras preguntas.':`Repasá la lección y reintentá${vista.tandasTotales>1?': te esperan preguntas distintas':''}.`}`)}</p>
      <div class="acciones-pie">
        ${repasoLibre
          ?`<button class="btn sec" id="volverBtn">Volver al camino</button><button class="btn" id="reint">Practicar otra vez</button>`
          :(aprobado
            ?`<button class="btn" id="seguir">Seguir el camino →</button>`
            :`<button class="btn sec" id="volverBtn">Volver al camino</button>
              <button class="btn" id="reint">Reintentar</button>`)}
      </div>
    </div>`;
  pintarContenido(html, ()=>{
    if(repasoLibre){
      document.getElementById('volverBtn').onclick=()=>{vista={tipo:'camino',id:vista.mid};render();};
      document.getElementById('reint').onclick=()=>abrirNodo(vista.mid,vista.nid,true);
    }else if(aprobado){
      document.getElementById('seguir').onclick=()=>{
        const d=datosMateria(vista.mid);
        const esNuevo=!d.completados[vista.nid];
        d.completados[vista.nid]=true;

        // ¿es la primera vez que lo intenta? (no había fallos registrados de este nodo)
        const sinReintentos = esNuevo && (vista.tandaActual||0)===0 && !(d.intentos&&d.intentos[vista.nid]);
        const eraDesaprobado = !!(d.intentos && d.intentos[vista.nid]);

        // ¿completó la materia entera? (para el logro de segunda vuelta)
        const planos=nodosPlanos(d);
        const completaAhora = planos.length>0 && planos.every(n=>d.completados[n.id]);
        const segundaVuelta = completaAhora && (d.vueltas||0)>=1;

        guardarMateria(vista.mid,d);
        if(esNuevo) marcarRacha();
        const perfecto = vista.aciertos===total;
        const esSim = vista.nodo.tipo==='simulacro';
        vista={tipo:'camino',id:vista.mid};render();
        if(esNuevo) chequearLogros({
          quizPerfecto:perfecto, esSimulacro:esSim, esQuiz:true,
          sinReintentos, eraDesaprobado, segundaVuelta
        });
      };
    }else{
      // desaprobó: registrar el intento fallido (habilita el logro "Remontada")
      if(!repasoLibre && vista.nid){
        const dd=datosMateria(vista.mid);
        if(dd){
          if(!dd.intentos) dd.intentos={};
          dd.intentos[vista.nid]=(dd.intentos[vista.nid]||0)+1;
          guardarMateria(vista.mid,dd);
        }
      }
      document.getElementById('volverBtn').onclick=()=>{vista={tipo:'camino',id:vista.mid};render();};
      document.getElementById('reint').onclick=()=>abrirNodo(vista.mid,vista.nid,true);
    }
  });
}

/* ---------- PWA: registrar service worker + botón instalar ---------- */

// Pedirle al navegador que NO borre los datos por presión de almacenamiento.
// Sin esto, Android/Chrome puede vaciar el localStorage de una PWA que no se
// abre por semanas, y el usuario pierde materias y progreso sin aviso.
// Es un pedido silencioso: si lo rechaza, todo sigue igual que antes.
if(navigator.storage && navigator.storage.persist){
  navigator.storage.persist().catch(()=>{});
}

if('serviceWorker' in navigator){
  let regGlobal=null;
  window.addEventListener('load',async ()=>{
    try{
      const reg=await navigator.serviceWorker.register('sw.js?v='+APP_VERSION);
      regGlobal=reg;
      // Detectar cuando hay una versión nueva esperando
      reg.addEventListener('updatefound',()=>{
        const nuevo=reg.installing;
        if(!nuevo) return;
        nuevo.addEventListener('statechange',()=>{
          if(nuevo.state==='installed' && navigator.serviceWorker.controller){
            mostrarAvisoUpdate(reg);
          }
        });
      });
      // Si ya hay una esperando al cargar
      if(reg.waiting && navigator.serviceWorker.controller) mostrarAvisoUpdate(reg);
      // Buscar actualizaciones al abrir
      reg.update().catch(()=>{});

      // ...y cada 30 minutos mientras la app está abierta
      setInterval(()=>{ reg.update().catch(()=>{}); }, 30*60*1000);
    }catch(e){ console.warn('SW no registrado:',e); }
  });

  // Al volver a la app (cambiar de pestaña, minimizar y volver), buscar versión nueva.
  // Esto es clave en la PWA del celu, que casi nunca se cierra del todo.
  document.addEventListener('visibilitychange',()=>{
    if(document.visibilityState==='visible' && regGlobal){
      regGlobal.update().catch(()=>{});
      if(regGlobal.waiting && navigator.serviceWorker.controller) mostrarAvisoUpdate(regGlobal);
    }
  });

  // cuando el SW nuevo toma control, recargar
  let recargando=false;
  navigator.serviceWorker.addEventListener('controllerchange',()=>{
    if(recargando) return;
    recargando=true;
    location.reload();
  });
}

function mostrarAvisoUpdate(reg){
  if(document.getElementById('banner-update')) return;
  const b=document.createElement('div');
  b.className='banner-update';
  b.id='banner-update';
  b.innerHTML=`<span>✨</span><span>Hay una versión nueva de EstudioTrack.</span>
    <button id="bu-si">Actualizar</button>`;
  document.body.appendChild(b);
  document.getElementById('bu-si').onclick=()=>{
    b.remove();
    if(reg.waiting) reg.waiting.postMessage({tipo:'ACTIVAR_YA'});
    else location.reload();
  };
}
let promptInstalar=null;
window.addEventListener('beforeinstallprompt',(e)=>{
  e.preventDefault();
  promptInstalar=e;
  if(st.get('et:instalar-no')==='1') return; // el usuario ya lo descartó
  mostrarBannerInstalar();
});
function mostrarBannerInstalar(){
  if(document.getElementById('instalar-banner')||!promptInstalar) return;
  const b=document.createElement('div');
  b.className='instalar-banner';
  b.id='instalar-banner';
  b.innerHTML=`<span class="ib-ico">📲</span>
    <span class="ib-tx">Instalá EstudioTrack en tu celu para abrirla como una app.</span>
    <button class="ib-si" id="ib-si">Instalar</button>
    <button class="ib-no" id="ib-no">Ahora no</button>`;
  document.body.appendChild(b);
  document.getElementById('ib-si').onclick=async ()=>{
    b.remove();
    if(promptInstalar){ promptInstalar.prompt(); await promptInstalar.userChoice; promptInstalar=null; }
  };
  document.getElementById('ib-no').onclick=()=>{ b.remove(); st.set('et:instalar-no','1'); };
}
window.addEventListener('appinstalled',()=>{ const b=document.getElementById('instalar-banner'); if(b)b.remove(); });

/* ---------- arranque ---------- */
let _rt;
window.addEventListener('resize',()=>{
  clearTimeout(_rt);
  _rt=setTimeout(()=>{
    if(vista.tipo==='leccion'||vista.tipo==='quiz'||vista.tipo==='camino') render();
  },200);
});
render();

// al abrir: avisar si la racha está por cortarse
setTimeout(avisarRacha, 1500);
</script>
