<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>EstudioTrack — Tu camino al examen</title>
<meta name="theme-color" content="#1B2A4A">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="apple-mobile-web-app-title" content="EstudioTrack">
<link rel="manifest" href="manifest.json">
<link rel="icon" type="image/png" sizes="32x32" href="favicon-32.png">
<link rel="apple-touch-icon" href="apple-touch-icon.png">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Bricolage+Grotesque:wght@500;700;800&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/mammoth/1.6.0/mammoth.browser.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>
<style>
  :root{
    --papel:#FAFAF6; --tinta:#1B2A4A; --resaltador:#FFD84D;
    --aprobado:#2E7D5B; --aprobado-claro:#E3F2EA;
    --error:#C94F4F; --error-claro:#F9E7E7;
    --borde:#E3E1D8; --carta:#FFFFFF; --sombra:0 2px 0 var(--borde);
    --tenue:#5A6780; --suave:#8A93A6;
  }
  /* --- modo oscuro --- */
  html[data-tema="oscuro"]{
    --papel:#12161F; --tinta:#E8ECF3; --resaltador:#D9B441;
    --aprobado:#4FA37C; --aprobado-claro:#1B2E27;
    --error:#D97070; --error-claro:#2E1E1E;
    --borde:#2A3140; --carta:#1A1F2B; --sombra:0 2px 0 #0D1017;
    --tenue:#9BA5B8; --suave:#6E7A8F;
  }
  html[data-tema="oscuro"] body{background:var(--papel)}
  html[data-tema="oscuro"] input,
  html[data-tema="oscuro"] select,
  html[data-tema="oscuro"] textarea{background:#141922;color:var(--tinta);border-color:var(--borde)}
  html[data-tema="oscuro"] input::placeholder,
  html[data-tema="oscuro"] textarea::placeholder{color:var(--suave)}
  html[data-tema="oscuro"] .info-cuota{background:#161D2B;border-color:#2C3546}
  html[data-tema="oscuro"] .exp-caja{background:#161F30;border-color:#2E415F;color:#CBD6E8}
  html[data-tema="oscuro"] .exp-caja strong{color:#8FB0E8}
  html[data-tema="oscuro"] .exp-caja .ex-mas{color:#9FB6DC}
  html[data-tema="oscuro"] .codigo-box{background:#141922;color:var(--tenue)}
  html[data-tema="oscuro"] .diag-u.medio{background:#2B2716;border-color:#6E6128}
  html[data-tema="oscuro"] .diag-global.amarillo .dg-num{color:#E0BC4C}
  html[data-tema="oscuro"] .diag-u.medio .du-pct{color:#E0BC4C}
  html[data-tema="oscuro"] .ejemplo{background:#20283A}
  html[data-tema="oscuro"] .opcion:hover:not(:disabled){border-color:var(--tinta)}
  html[data-tema="oscuro"] .nodo.bloq{opacity:.4}
  html[data-tema="oscuro"] .barra{background:#232A38}
  html[data-tema="oscuro"] input[type="date"]{color-scheme:dark}
  /* elementos con fondo claro fijo: adaptarlos para que el texto se lea */
  html[data-tema="oscuro"] .aviso-clave{background:#2B2416;border-color:#8A6528;color:#E8C48A}
  html[data-tema="oscuro"] .aviso-clave strong{color:#F0D79E}
  html[data-tema="oscuro"] .ejemplo{background:#2B2416;border-color:#6E5A28;color:#E0D2AE}
  html[data-tema="oscuro"] .banner-repaso{background:#182238;border-color:#3D5A8C;color:#B8CBEA}
  html[data-tema="oscuro"] .info-cuota{background:#161D2B;border-color:#3A4A66;color:#B8C4D8}
  html[data-tema="oscuro"] .info-cuota strong{color:#D6E0F0}
  html[data-tema="oscuro"] .diag-u.flojo{background:#2E1B1B;border-color:#8A4444}
  html[data-tema="oscuro"] .nodo.sel{background:#1F2534}
  html[data-tema="oscuro"] .dropzone.arrastrando{background:#2B2416}
  html[data-tema="oscuro"] .btn.repaso-on{background:#3A5BA0;box-shadow:0 3px 0 #263A66}
  .info-cuota.alerta{background:#FFF4E5;border-color:#E8A33D;color:#7A5418}
  html[data-tema="oscuro"] .info-cuota.alerta{background:#2B2416;border-color:#8A6528;color:#E8C48A}
  html[data-tema="oscuro"] .nodo.bloq::before{border-color:#3A4356}
  html[data-tema="oscuro"] .racha{color:var(--tinta);background:var(--carta)}
  html[data-tema="oscuro"] .ajustes{background:var(--carta);border-color:var(--borde)}
  html[data-tema="oscuro"] .estado-motor{background:var(--carta);border-color:var(--borde)}
  html[data-tema="oscuro"] .dropzone{border-color:var(--borde)}
  html[data-tema="oscuro"] .archivo{background:var(--carta);border-color:var(--borde)}
  html[data-tema="oscuro"] .chip{background:var(--carta);border-color:var(--borde)}
  html[data-tema="oscuro"] .fc-nav button{background:var(--carta);border-color:var(--borde);color:var(--tinta)}
  html[data-tema="oscuro"] .est-caja{background:var(--carta);border-color:var(--borde)}
  html[data-tema="oscuro"] .est-b .eb-barra{background:#232A38}
  html[data-tema="oscuro"] .punto .exp-btn{border-color:var(--borde);color:var(--tenue)}
  html[data-tema="oscuro"] .punto .exp-btn:hover{background:var(--resaltador);color:#12161F;border-color:var(--resaltador)}
  *{box-sizing:border-box;margin:0;padding:0}
  /* --- animaciones --- */
  @keyframes aparecer{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:none}}
  @keyframes pop{0%{transform:scale(.9)}55%{transform:scale(1.06)}100%{transform:scale(1)}}
  @keyframes tiemble{0%,100%{transform:translateX(0)}20%{transform:translateX(-5px)}40%{transform:translateX(5px)}60%{transform:translateX(-3px)}80%{transform:translateX(3px)}}
  @keyframes latir{0%,100%{transform:scale(1)}50%{transform:scale(1.14)}}
  .card{animation:aparecer .3s ease both}
  .nodo{animation:aparecer .28s ease both}
  .nodo:nth-child(1){animation-delay:.02s}
  .nodo:nth-child(2){animation-delay:.05s}
  .nodo:nth-child(3){animation-delay:.08s}
  .nodo:nth-child(4){animation-delay:.11s}
  .nodo:nth-child(5){animation-delay:.14s}
  .opcion{transition:transform .12s ease, border-color .12s ease, background .12s ease}
  .opcion:active:not(:disabled){transform:scale(.985)}
  .opcion.correcta{animation:pop .34s ease}
  .opcion.mal{animation:tiemble .34s ease}
  .resultado .nota{animation:pop .45s ease both}
  .racha{transition:transform .2s ease}
  .racha.sube{animation:latir .5s ease}
  .btn{transition:transform .12s ease, opacity .15s ease}
  .btn:active:not(:disabled){transform:scale(.98)}
  .nodo:not(.bloq){transition:transform .12s ease, box-shadow .15s ease}
  .nodo:not(.bloq):active{transform:scale(.99)}
  @media (prefers-reduced-motion: reduce){
    *,*::before,*::after{animation-duration:.01ms !important;animation-iteration-count:1 !important;transition-duration:.01ms !important}
  }
  body{font-family:'Inter',system-ui,sans-serif;background:var(--papel);color:var(--tinta);min-height:100vh;line-height:1.5}
  .wrap{max-width:520px;margin:0 auto;padding:20px 16px 80px}
  /* --- layout de escritorio --- */
  @media (min-width:900px){
    /* vista del camino sola: dos columnas (info a la izquierda, nodos a la derecha) */
    .wrap.camino-solo{max-width:940px}
    .camino-solo .camino-grid{display:grid;grid-template-columns:300px 1fr;gap:32px;align-items:start}
    .camino-solo .camino-info{position:sticky;top:20px}
    .camino-solo .camino-info .materia-head{margin-top:0}
    .camino-solo .camino-info .acciones-pie{margin-top:20px;flex-direction:column}
    .camino-solo .camino-info .acciones-pie .btn{width:100%}
    .camino-solo .camino-lista .camino{margin-top:0}
    .camino-solo .camino-lista .unidad-titulo:first-child{margin-top:0}
    .wrap.split{max-width:1040px}
    .split .split-grid{display:grid;grid-template-columns:340px 1fr;gap:24px;align-items:start}
    .split .panel-camino{position:sticky;top:20px;max-height:calc(100vh - 40px);overflow-y:auto;padding-right:4px}
    .split .panel-camino .camino{margin-top:14px}
    .split .panel-camino .materia-head h2{font-size:20px}
    .split .panel-camino .nodo{padding:11px 13px}
    .split .panel-camino .nodo .icono{width:32px;height:32px;font-size:16px}
    .split .panel-camino .nodo .tit{font-size:13.5px}
    .split .panel-contenido{min-width:0}
    .split .panel-contenido .card{margin-top:0}
    .split .panel-camino .acciones-pie{margin-top:18px}
    .split .panel-camino .acciones-pie .btn{font-size:12.5px;padding:8px 10px;min-width:0}
  }
  h1,h2,h3{font-family:'Bricolage Grotesque','Inter',sans-serif}
  .marca{display:flex;align-items:center;gap:8px;margin-bottom:6px}
  /* El resaltador va como background del propio texto: nunca lo puede tapar. */
  .marca .logo{
    font-family:'Bricolage Grotesque',sans-serif;font-weight:800;font-size:22px;
    display:inline-block;padding:0 5px;cursor:pointer;
    color:var(--tinta);
    background-image:linear-gradient(var(--resaltador), var(--resaltador));
    background-repeat:no-repeat;
    background-size:100% 10px;
    background-position:0 92%;
  }
  .racha{margin-left:auto;font-weight:700;font-size:14px;color:var(--tinta);background:var(--carta);border:1.5px solid var(--borde);border-radius:999px;padding:4px 12px;box-shadow:var(--sombra)}
  .ajustes{background:var(--carta);border:1.5px solid var(--borde);border-radius:999px;width:32px;height:32px;cursor:pointer;font-size:15px;box-shadow:var(--sombra)}
  .card{background:var(--carta);border:1.5px solid var(--borde);border-radius:16px;padding:20px;box-shadow:var(--sombra);margin-top:14px}
  .card h2{font-size:26px;font-weight:800;line-height:1.15;margin-bottom:4px}
  .sub{color:var(--tenue);font-size:14px;margin-bottom:16px}
  label{display:block;font-size:13px;font-weight:600;margin:14px 0 5px}
  input,textarea,select{width:100%;font-family:inherit;font-size:15px;color:var(--tinta);background:var(--papel);border:1.5px solid var(--borde);border-radius:10px;padding:10px 12px}
  input:focus,textarea:focus,select:focus,button:focus-visible{outline:3px solid var(--resaltador);outline-offset:1px;border-color:var(--tinta)}
  textarea{min-height:80px;resize:vertical}
  .fila{display:flex;gap:10px}
  .fila>div{flex:1}
  .hint{font-size:12px;color:var(--suave);margin-top:4px}
  .btn{display:block;width:100%;margin-top:20px;padding:14px;font-family:'Bricolage Grotesque',sans-serif;font-weight:700;font-size:16px;color:var(--papel);background:var(--tinta);border:none;border-radius:12px;cursor:pointer;box-shadow:0 3px 0 #0F1B33}
  .btn:active{transform:translateY(2px);box-shadow:0 1px 0 #0F1B33}
  .btn[disabled]{opacity:.55;cursor:wait}
  .btn.sec{background:var(--carta);color:var(--tinta);border:1.5px solid var(--borde);box-shadow:var(--sombra)}
  .btn.chico{width:auto;padding:9px 16px;font-size:14px;margin-top:0}
  .pasos{margin:12px 0}
  .paso{display:flex;gap:10px;margin-bottom:10px;font-size:14px}
  .paso .n{flex-shrink:0;width:24px;height:24px;border-radius:50%;background:var(--resaltador);font-weight:800;font-size:13px;display:flex;align-items:center;justify-content:center}
  .estado-motor{display:flex;align-items:center;gap:8px;font-size:13.5px;background:var(--papel);border:1.5px solid var(--borde);border-radius:10px;padding:10px 12px;margin-top:8px}
  .estado-motor .punto-v{width:9px;height:9px;border-radius:50%;background:var(--aprobado);flex-shrink:0}
  .estado-motor .punto-a{width:9px;height:9px;border-radius:50%;background:#E8A93D;flex-shrink:0}
  .dropzone{border:2px dashed #C9CFDC;border-radius:12px;background:var(--papel);padding:18px 14px;text-align:center;cursor:pointer;font-size:14px;color:var(--tenue)}
  .dropzone.arrastrando{border-color:var(--tinta);background:#FFF9E3}
  .dropzone strong{color:var(--tinta)}
  .dropzone input{display:none}
  .archivos{margin-top:8px}
  .archivo{display:flex;align-items:center;gap:8px;font-size:13px;background:var(--carta);border:1.5px solid var(--borde);border-radius:9px;padding:7px 11px;margin-top:6px}
  .archivo .ok-a{color:var(--aprobado);font-weight:800}
  .archivo .err-a{color:var(--error);font-weight:800}
  .archivo .quitar{margin-left:auto;background:none;border:none;cursor:pointer;color:var(--suave);font-size:15px;font-weight:700;padding:0 4px}
  .archivo .estado-a{margin-left:auto;color:var(--suave);font-size:12px;text-align:right}
  .materia-item{background:var(--carta);border:1.5px solid var(--borde);border-radius:14px;padding:16px;margin-top:12px;cursor:pointer;box-shadow:var(--sombra);width:100%;text-align:left;font-family:inherit;color:var(--tinta);transition:transform .12s ease}
  .materia-item:hover{transform:translateX(3px)}
  .materia-item .nombre{font-family:'Bricolage Grotesque',sans-serif;font-weight:700;font-size:17px}
  .materia-item .datos{display:flex;gap:8px;flex-wrap:wrap;margin-top:6px;font-size:12px;color:var(--tenue)}
  .mini-barra{height:8px;background:var(--papel);border:1.5px solid var(--borde);border-radius:999px;overflow:hidden;margin-top:10px}
  .mini-barra>div{height:100%;background:var(--aprobado);border-radius:999px}
  .materia-head{margin:18px 0 6px}
  .materia-head h2{font-size:24px;font-weight:800}
  .meta{display:flex;gap:8px;flex-wrap:wrap;margin-top:8px}
  .pill{font-size:12.5px;font-weight:600;background:var(--carta);border:1.5px solid var(--borde);border-radius:999px;padding:4px 11px}
  .pill.obj{background:var(--resaltador);border-color:#E8C22E}
  .barra{height:12px;background:var(--carta);border:1.5px solid var(--borde);border-radius:999px;overflow:hidden;margin-top:14px}
  .barra>div{height:100%;background:var(--aprobado);border-radius:999px;transition:width .5s ease}
  .barra-label{font-size:12px;color:var(--tenue);margin-top:5px}
  .camino{position:relative;margin-top:26px;padding-left:34px}
  .camino::before{content:"";position:absolute;left:15px;top:10px;bottom:10px;width:0;border-left:3px dashed #C9CFDC}
  .unidad-titulo{font-family:'Bricolage Grotesque',sans-serif;font-weight:700;font-size:13px;letter-spacing:.08em;text-transform:uppercase;color:var(--tenue);margin:26px 0 10px;position:relative}
  .unidad-titulo::before{content:"";position:absolute;left:-27px;top:5px;width:11px;height:11px;background:var(--papel);border:3px solid #C9CFDC;border-radius:50%}
  .nodo{position:relative;background:var(--carta);border:1.5px solid var(--borde);border-radius:14px;padding:14px 16px;margin-bottom:12px;cursor:pointer;box-shadow:var(--sombra);display:flex;align-items:center;gap:12px;transition:transform .12s ease;width:100%;text-align:left;font-family:inherit;color:var(--tinta)}
  .nodo:hover:not(.bloq){transform:translateX(3px)}
  .nodo::before{content:"";position:absolute;left:-27px;top:50%;transform:translateY(-50%);width:13px;height:13px;border-radius:50%;background:var(--carta);border:3px solid var(--tinta)}
  .nodo.ok::before{background:var(--aprobado);border-color:var(--aprobado)}
  .nodo.bloq{opacity:.5;cursor:not-allowed}
  .nodo.bloq::before{border-color:#C9CFDC}
  .nodo.actual{border-color:var(--tinta);border-width:2px}
  .nodo.sel{border-color:var(--tinta);border-width:2px;background:#FFFDF3}
  .nodo.actual::after{content:"ACÁ";position:absolute;top:-9px;right:12px;font-family:'Bricolage Grotesque',sans-serif;font-weight:800;font-size:10px;letter-spacing:.1em;background:var(--resaltador);padding:2px 8px;border-radius:6px}
  .nodo .icono{width:38px;height:38px;flex-shrink:0;border-radius:10px;display:flex;align-items:center;justify-content:center;font-size:19px;background:var(--papel);border:1.5px solid var(--borde)}
  .nodo.ok .icono{background:var(--aprobado-claro);border-color:var(--aprobado)}
  .nodo .txt{flex:1;min-width:0}
  .nodo .tipo{font-size:11px;font-weight:700;letter-spacing:.07em;text-transform:uppercase;color:var(--suave)}
  .nodo .tit{font-weight:600;font-size:14.5px;line-height:1.3}
  .nodo .check{font-size:18px;color:var(--aprobado);font-weight:800}
  .volver{background:none;border:none;font-family:inherit;font-weight:600;font-size:14px;color:var(--tenue);cursor:pointer;padding:6px 0;margin-bottom:8px}
  .contenido h2{font-size:23px;font-weight:800;margin-bottom:12px}
  .contenido p{margin-bottom:12px;font-size:15px}
  .puntos{margin:12px 0}
  .punto{background:var(--carta);border:1.5px solid var(--borde);border-radius:12px;padding:12px 14px;margin-bottom:9px;font-size:14.5px;box-shadow:var(--sombra);display:flex;gap:10px}
  .punto .b{color:var(--tinta);font-weight:800;flex-shrink:0}
  .ejemplo{background:#FFF9E3;border:1.5px solid #E8C22E;border-radius:12px;padding:13px 15px;font-size:14px;margin-top:14px}
  .ejemplo strong{display:block;font-size:11px;letter-spacing:.08em;text-transform:uppercase;margin-bottom:5px}
  .q-num{font-size:12px;font-weight:700;letter-spacing:.08em;color:var(--suave);text-transform:uppercase;margin-bottom:6px}
  .q-texto{font-size:17px;font-weight:600;margin-bottom:16px;line-height:1.4}
  .opcion{display:block;width:100%;text-align:left;font-family:inherit;font-size:14.5px;color:var(--tinta);background:var(--carta);border:1.5px solid var(--borde);border-radius:12px;padding:13px 15px;margin-bottom:10px;cursor:pointer;box-shadow:var(--sombra)}
  .opcion:hover:not([disabled]){border-color:var(--tinta)}
  .opcion.correcta{background:var(--aprobado-claro);border-color:var(--aprobado);font-weight:600}
  .opcion.mal{background:var(--error-claro);border-color:var(--error)}
  .explic{border-radius:12px;padding:13px 15px;font-size:14px;margin:6px 0 14px;border:1.5px solid}
  .explic.bien{background:var(--aprobado-claro);border-color:var(--aprobado)}
  .explic.mal{background:var(--error-claro);border-color:var(--error)}
  .explic strong{display:block;margin-bottom:3px}
  .resultado{text-align:center;padding:26px 0 10px}
  .resultado .nota{font-family:'Bricolage Grotesque',sans-serif;font-weight:800;font-size:56px;line-height:1;display:inline-block;position:relative;padding:0 10px}
  .resultado .nota::before{content:"";position:absolute;left:0;right:0;bottom:6px;height:20px;background:var(--resaltador);z-index:-1;transform:rotate(-1.5deg)}
  .resultado p{margin-top:12px;font-size:15px}
  .cargando{text-align:center;padding:44px 20px}
  .lapiz{font-size:40px;display:inline-block;animation:escribir 1s ease-in-out infinite}
  @keyframes escribir{0%,100%{transform:rotate(-6deg) translateY(0)}50%{transform:rotate(6deg) translateY(-4px)}}
  .cargando p{margin-top:14px;font-weight:600;font-size:15px}
  .cargando .sub{margin-top:4px}
  .err{background:var(--error-claro);border:1.5px solid var(--error);border-radius:12px;padding:13px 15px;font-size:14px;margin-top:14px}
  .vacio{text-align:center;padding:36px 16px;color:var(--tenue);font-size:14px}
  .vacio .emoji{font-size:44px;display:block;margin-bottom:10px}
  /* --- seguí acá (qué toca hoy) --- */
  .seguir-hoy{background:var(--tinta);color:var(--papel);border:none;border-radius:16px;padding:18px 20px;width:100%;text-align:left;cursor:pointer;font-family:inherit;box-shadow:0 3px 0 #0F1B33;display:flex;align-items:center;gap:14px;margin-top:14px}
  .seguir-hoy:active{transform:translateY(2px);box-shadow:0 1px 0 #0F1B33}
  .seguir-hoy .ico{font-size:30px;flex-shrink:0}
  .seguir-hoy .tx{flex:1;min-width:0}
  .seguir-hoy .et{font-family:'Bricolage Grotesque',sans-serif;font-size:11px;font-weight:800;letter-spacing:.1em;text-transform:uppercase;opacity:.7}
  .seguir-hoy .ti{font-family:'Bricolage Grotesque',sans-serif;font-weight:700;font-size:18px;line-height:1.2;margin-top:2px}
  .seguir-hoy .ma{font-size:12.5px;opacity:.75;margin-top:3px}
  .seguir-hoy .flecha{font-size:22px;opacity:.8}
  /* --- meta diaria --- */
  .meta-diaria{display:flex;align-items:center;gap:14px;background:var(--carta);border:1.5px solid var(--borde);border-radius:16px;padding:14px 16px;box-shadow:var(--sombra);margin-top:14px}

<body>
<div class="wrap" id="app"></div>

<script>
/* =========================================================
   EstudioTrack — camino de estudio con IA, gratis
   Motor: la clave propia de Gemini de cada usuario (se carga en Ajustes).
   No hay backend: todo corre en el navegador, los datos en localStorage.
   ========================================================= */

const $app = document.getElementById('app');

/* ---------- almacenamiento (localStorage + fallback en memoria) ---------- */
const mem = {};
let ultimoErrorGuardado = null;   // para avisar si el almacenamiento se llenó

const st = {
  get(k){ try{ return localStorage.getItem(k); }catch(e){ return mem[k] ?? null; } },
  set(k,v){
    mem[k]=v;
    try{
      localStorage.setItem(k,v);
      ultimoErrorGuardado=null;
      return true;
    }catch(e){
      // QuotaExceededError: el navegador se quedó sin espacio.
      // NO fallar en silencio: el usuario tiene que enterarse o pierde datos.
      ultimoErrorGuardado = e;
      avisarSinEspacio();
      return false;
    }
  },
  del(k){ delete mem[k]; try{ localStorage.removeItem(k); }catch(e){} }
};
const J = {
  get(k,def){ const v=st.get(k); if(!v) return def; try{ return JSON.parse(v); }catch(e){ return def; } },
  set(k,obj){ return st.set(k, JSON.stringify(obj)); }
};

// Cuánto espacio ocupan los datos de la app (en bytes)
function espacioUsado(){
  let total=0;
  try{
    for(let i=0;i<localStorage.length;i++){
      const k=localStorage.key(i);
      if(k && k.startsWith('et:')){
        total += k.length + (localStorage.getItem(k)||'').length;
      }
    }
  }catch(e){}
  return total*2;   // UTF-16: 2 bytes por caracter
}
function espacioUsadoMB(){ return espacioUsado()/1048576; }

let avisoEspacioMostrado=false;
function avisarSinEspacio(){
  if(avisoEspacioMostrado) return;
  avisoEspacioMostrado=true;
  setTimeout(()=>{
    alert('⚠️ Se llenó el espacio de tu navegador.\n\nNo pude guardar los últimos cambios. Para liberar lugar:\n\n• Borrá alguna materia que ya no uses (Ajustes → o desde la materia)\n• Antes, hacé un respaldo: Ajustes → Pasar mis datos a otro dispositivo\n\nTu progreso actual sigue a salvo, pero lo nuevo no se está guardando.');
    avisoEspacioMostrado=false;
  },100);
}

/* ---------- compresión de apuntes ----------
   Los apuntes son lo que más pesa en localStorage (~5MB de límite).
   Con gzip nativo comprimen ~90%: pasás de ~20 materias a cientos.
   Guardamos {c:true, d:'...'} cuando están comprimidos. */
async function comprimirTexto(txt){
  if(!txt) return {c:false, d:''};
  if(typeof CompressionStream==='undefined') return {c:false, d:txt};
  try{
    const datos=new TextEncoder().encode(txt);
    const cs=new CompressionStream('gzip');
    const w=cs.writable.getWriter();
    w.write(datos); w.close();
    const comp=new Uint8Array(await new Response(cs.readable).arrayBuffer());
    return {c:true, d:bytesABase64(comp)};
  }catch(e){
    return {c:false, d:txt};    // si falla, guardar sin comprimir
  }
}
async function descomprimirTexto(campo){
  if(!campo) return '';
  if(typeof campo==='string') return campo;          // formato viejo: texto plano
  if(!campo.c) return campo.d||'';                   // guardado sin comprimir
  try{
    const bytes=base64ABytes(campo.d);
    const ds=new DecompressionStream('gzip');
    const w=ds.writable.getWriter();
    w.write(bytes); w.close();
    return await new Response(ds.readable).text();
  }catch(e){
    return '';
  }
}
// Lee los apuntes de una materia (maneja formato viejo y comprimido)
async function apuntesDe(datos){
  if(!datos) return '';
  return await descomprimirTexto(datos.apuntes);
}
// Parciales/exámenes viejos guardados con la materia (referencia de estilo del profe)
async function parcialesDe(datos){
  if(!datos || !datos.parciales) return '';
  try{ return await descomprimirTexto(datos.parciales); }catch(e){ return ''; }
}
// Bloque de instrucción para los prompts, solo si hay parciales viejos
function bloqueParciales(parciales){
  if(!parciales || !parciales.trim()) return '';
  return `

EXÁMENES ANTERIORES DE ESTE PROFESOR (referencia de estilo, MUY IMPORTANTE):
Abajo van parciales o finales que este profesor ya tomó. Usalos para calcar SU forma de evaluar:
- Qué temas prioriza y cuáles casi no toca.
- Si pregunta teoría, casos prácticos, cálculos, o una mezcla.
- El nivel de detalle y cómo redacta las consignas.
Las preguntas que armes tienen que PARECERSE a las de estos exámenes (mismo estilo y foco), pero SIN copiarlas textuales: son para practicar, no para memorizar la respuesta.
---
${recortar(parciales, 100000)}
---`;
}

/* ---------- migración: limpiar explicaciones con formato viejo ----------
   Antes se guardaban por posición del punto (0,1,2...). Si la lección se
   regeneraba, quedaban pegadas a un texto que no correspondía.
   Ahora se indexan por el texto del punto. Las viejas se descartan. */
function migrarExplicaciones(){
  if(st.get('et:mig-expl')==='1') return;
  try{
    const ms=J.get('et:materias',[]);
    ms.forEach(m=>{
      const d=J.get('et:m:'+m.id,null);
      if(!d||!d.explicaciones) return;
      let cambio=false;
      Object.keys(d.explicaciones).forEach(nid=>{
        const porNodo=d.explicaciones[nid]||{};
        // si alguna clave es un número, es el formato viejo: descartar el nodo entero
        if(Object.keys(porNodo).some(k=>/^\d+$/.test(k))){
          delete d.explicaciones[nid];
          cambio=true;
        }
      });
      if(cambio) J.set('et:m:'+m.id, d);
    });
  }catch(e){}
  st.set('et:mig-expl','1');
}
migrarExplicaciones();

/* Versión de la app. Al cambiarla, el service worker se registra con una URL
   distinta y el navegador detecta la actualización automáticamente.
   Se muestra en Ajustes para poder verificar qué versión tiene cada uno. */
const APP_VERSION = '2026.07.21a';

/* ---------- estado global ---------- */
// Tema: 'auto' sigue al sistema, o 'claro'/'oscuro' forzado
let tema = st.get('et:tema') || 'auto';
function temaEfectivo(){
  if(tema==='auto'){
    return window.matchMedia && window.matchMedia('(prefers-color-scheme: dark)').matches ? 'oscuro' : 'claro';
  }
  return tema;
}
function aplicarTema(){
  document.documentElement.setAttribute('data-tema', temaEfectivo());
  const meta=document.querySelector('meta[name="theme-color"]');
  if(meta) meta.setAttribute('content', temaEfectivo()==='oscuro' ? '#12161F' : '#FAFAF6');
}
function ciclarTema(){
  tema = tema==='auto' ? 'claro' : tema==='claro' ? 'oscuro' : 'auto';
  st.set('et:tema', tema);
  aplicarTema();
  render();
}

/* =========================================================
   COMPARTIR MATERIAS
   Exporta plan + apuntes + contenido ya generado.
   Quien lo importa NO gasta cuota en regenerar nada.
   ========================================================= */
function bytesABase64(bytes){
  let bin='';
  const chunk=8192;
  for(let i=0;i<bytes.length;i+=chunk){
    bin+=String.fromCharCode.apply(null, bytes.subarray(i,i+chunk));
  }
  return btoa(bin).replace(/\+/g,'-').replace(/\//g,'_').replace(/=+$/,'');
}
function base64ABytes(txt){
  let b=txt.trim().replace(/-/g,'+').replace(/_/g,'/');
  while(b.length%4) b+='=';
  const bin=atob(b);
  const bytes=new Uint8Array(bin.length);
  for(let i=0;i<bin.length;i++) bytes[i]=bin.charCodeAt(i);
  return bytes;
}
// comprime con gzip nativo del navegador: un código de 20k caracteres queda en ~600
async function codificar(obj){
  const json=JSON.stringify(obj);
  const datos=new TextEncoder().encode(json);
  if(typeof CompressionStream==='undefined'){
    return 'R0_'+bytesABase64(datos);   // sin compresión (navegador viejo)
  }
  const cs=new CompressionStream('gzip');
  const w=cs.writable.getWriter();
  w.write(datos); w.close();
  const comprimido=new Uint8Array(await new Response(cs.readable).arrayBuffer());
  return 'R1_'+bytesABase64(comprimido);
}
async function decodificar(txt){
  const t=txt.trim();
  if(t.startsWith('R0_')){
    return JSON.parse(new TextDecoder().decode(base64ABytes(t.slice(3))));
  }
  if(!t.startsWith('R1_')) throw new Error('El código no tiene el formato de EstudioTrack');
  const bytes=base64ABytes(t.slice(3));
  const ds=new DecompressionStream('gzip');
  const w=ds.writable.getWriter();
  w.write(bytes); w.close();
  const json=await new Response(ds.readable).text();
  return JSON.parse(json);
}

async function exportarMateria(mid){

  return await codificar({
    v:1,

    fecha:m.fecha,
    objetivo:m.objetivo,
    estilo:m.estilo||'mc',

    parciales:parcialesTxt||'',   // referencia de estilo del profe
    plan:d.plan,

}

async function importarMateria(codigo){
  const p=await decodificar(codigo);
  if(!p||!p.plan||!p.plan.unidades) throw new Error('El código no es válido o está incompleto');
  const id='m'+Date.now();
  const m={id, nombre:p.nombre||'Materia importada', fecha:p.fecha||new Date().toISOString().slice(0,10), objetivo:p.objetivo||'8+', estilo:p.estilo||'mc', tieneParciales:!!(p.parciales&&p.parciales.trim())};
  materias.push(m);
  chequearLogros({importada:true});
  J.set('et:materias',materias);
  const apuntesComp=await comprimirTexto(p.apuntes||'');
  const datos={
    apuntes:apuntesComp,
    plan:p.plan,
    completados:{},              // el progreso es de cada uno, arranca en cero
    contenido:p.contenido||{},
    usadas:p.usadas||{}
  };
  if(p.parciales&&p.parciales.trim()) datos.parciales=await comprimirTexto(p.parciales);
  guardarMateria(id,datos);
  return m;
}

  return await codificar({
    v:1,
    tipo:'perfil',
    materias, datos,
    racha, logros,
    meta:metaDiaria,
    clave: incluirClave ? clavePropia : ''
  });
}

async function importarPerfil(codigo, modo){
  const p=await decodificar(codigo);
  if(!p||p.tipo!=='perfil') throw new Error('Ese código no es un respaldo de perfil (¿será el de una materia suelta?)');

  if(modo==='reemplazar'){
    // borrar lo que hay antes de restaurar
    materias.forEach(m=>st.del('et:m:'+m.id));
    materias=[];
  }

  // traer materias, evitando pisar ids existentes
  const existentes=new Set(materias.map(m=>m.id));
  (p.materias||[]).forEach(m=>{
    let id=m.id;
    if(existentes.has(id)) id='m'+Date.now()+Math.floor(Math.random()*1000);
    const d=(p.datos||{})[m.id];
    if(!d) return;
    materias.push({...m, id});
    guardarMateria(id, d);
    existentes.add(id);
  });
  J.set('et:materias',materias);

  // racha, logros y meta: quedarse con lo mejor de cada uno
  if(p.racha && (p.racha.dias||0) > (racha.dias||0)){ racha=p.racha; J.set('et:racha',racha); }
  if(p.logros){ logros={...logros, ...p.logros}; J.set('et:logros',logros); }
  if(p.meta && modo==='reemplazar'){ metaDiaria=p.meta; J.set('et:meta',metaDiaria); }

  // clave de API (solo si venía incluida y acá no hay ninguna)
  if(p.clave && !clavePropia){ clavePropia=p.clave; st.set('et:key',clavePropia); }

  return (p.materias||[]).length;
}

/* =========================================================
   REGISTRO DE DESEMPEÑO + REPASO ESPACIADO
   Guarda qué preguntas fallaste, de qué unidad, y cuándo toca repasarlas.
   Es la base de "Listo para rendir" y del repaso espaciado.
   ========================================================= */

// Estructura por materia: d.desempenio = {
//   porUnidad: { "0": {ok:5, mal:2}, "1": {...} },
//   fallos: [ {q, opciones, correcta, explicacion, uid, ui, vistas, aciertos, proximo} ]
// }
function desempenioDe(d){
  if(!d.desempenio) d.desempenio={porUnidad:{}, fallos:[]};
  if(!d.desempenio.porUnidad) d.desempenio.porUnidad={};
  if(!d.desempenio.fallos) d.desempenio.fallos=[];
  return d.desempenio;
}

// Intervalos de repaso espaciado (en días): 1, 3, 7, 16
// Cada vez que acertás una pregunta que habías fallado, se aleja más en el tiempo.
const INTERVALOS=[1,3,7,16];
function proximaFecha(aciertosSeguidos){
  const dias=INTERVALOS[Math.min(aciertosSeguidos, INTERVALOS.length-1)];
  return Date.now() + dias*86400000;
}

// Registra el resultado de una pregunta respondida
function registrarRespuesta(mid, nid, pregunta, acerto){
  const d=datosMateria(mid);
  if(!d) return;
  const des=desempenioDe(d);
  const ui=String(nid).split('-')[0];   // índice de la unidad

  // 1. estadística por unidad (para "Listo para rendir")
  if(!des.porUnidad[ui]) des.porUnidad[ui]={ok:0, mal:0};
  if(acerto) des.porUnidad[ui].ok++;
  else des.porUnidad[ui].mal++;

  // 2. cola de repaso espaciado
  const uid=normQ(pregunta.q);                     // identificador de la pregunta
  const idx=des.fallos.findIndex(f=>f.uid===uid);

  if(!acerto){
    if(idx===-1){
      // primera vez que la fallás: entra a la cola para mañana
      des.fallos.push({
        uid, ui,
        q:pregunta.q, opciones:pregunta.opciones, correcta:pregunta.correcta,
        explicacion:pregunta.explicacion||'',
        vistas:1, aciertos:0,
        proximo: proximaFecha(0)
      });
    }else{
      // la volviste a fallar: se reinicia el ciclo
      des.fallos[idx].vistas++;
      des.fallos[idx].aciertos=0;
      des.fallos[idx].proximo=proximaFecha(0);
    }
  }else if(idx!==-1){
    // acertaste una que habías fallado: se aleja en el tiempo
    const f=des.fallos[idx];
    f.vistas++;
    f.aciertos++;
    if(f.aciertos>=3){
      des.fallos.splice(idx,1);        // dominada: sale de la cola
    }else{
      f.proximo=proximaFecha(f.aciertos);
    }
  }
  guardarMateria(mid,d);
}

// Preguntas que toca repasar hoy (de todas las materias, o de una)
function pendientesDeRepaso(mid){
  const ahora=Date.now();
  const lista=[];
  const ms = mid ? materias.filter(m=>m.id===mid) : materias;
  ms.forEach(m=>{
    const d=datosMateria(m.id);
    if(!d||!d.desempenio) return;
    (d.desempenio.fallos||[]).forEach(f=>{
      if(f.proximo<=ahora) lista.push({...f, mid:m.id, materia:m.nombre});
    });
  });
  return lista;
}

// Diagnóstico por unidad para "Listo para rendir"
function diagnostico(mid){
  const m=materias.find(x=>x.id===mid);
  const d=datosMateria(mid);
  if(!m||!d||!d.plan) return null;
  const des=desempenioDe(d);
  const unidades=d.plan.unidades.map((u,ui)=>{
    const st=des.porUnidad[String(ui)]||{ok:0,mal:0};
    const total=st.ok+st.mal;
    const pct= total>0 ? Math.round(st.ok/total*100) : null;
    const planos=nodosPlanos(d);
    const nodosU=planos.filter(n=>n.id.startsWith(ui+'-'));
    const hechos=nodosU.filter(n=>d.completados[n.id]).length;
    return {
      ui, titulo:u.titulo,
      ok:st.ok, mal:st.mal, total, pct,
      completada: nodosU.length>0 && hechos===nodosU.length,
      sinDatos: total===0
    };
  }).filter(u=>u.titulo!=='Recta final');
  const conDatos=unidades.filter(u=>!u.sinDatos);
  const global = conDatos.length
    ? Math.round(conDatos.reduce((a,u)=>a+u.ok,0) / Math.max(1,conDatos.reduce((a,u)=>a+u.total,0)) * 100)
    : null;
  return {materia:m, unidades, global, aRepasar:pendientesDeRepaso(mid).length};
}

function tieneLogro(id){ return !!logros[id]; }
function darLogro(id){
  if(logros[id]) return false;
  logros[id]=new Date().toISOString();
  J.set('et:logros',logros);
  colaLogros.push(CATALOGO_LOGROS.find(l=>l.id===id));
  return true;
}
function materiasCompletas(){
  return materias.filter(m=>{
    const d=datosMateria(m.id);
    if(!d||!d.plan) return false;
    const planos=nodosPlanos(d);
    return planos.length>0 && planos.every(n=>d.completados[n.id]);
  }).length;
}

// Contadores acumulados (para logros de volumen)
function contador(k, sumar){
  const c=J.get('et:cont',{});
  if(sumar){ c[k]=(c[k]||0)+sumar; J.set('et:cont',c); }
  return c[k]||0;
}
// Total de preguntas respondidas en todas las materias
function totalPreguntas(){
  let t=0;
  materias.forEach(m=>{
    const d=datosMateria(m.id);
    if(!d||!d.desempenio) return;
    Object.values(d.desempenio.porUnidad||{}).forEach(u=>{ t+=(u.ok||0)+(u.mal||0); });
  });
  return t;
}
// Total de nodos completados en todas las materias
function totalNodos(){
  let t=0;
  materias.forEach(m=>{
    const d=datosMateria(m.id);
    if(!d) return;
    t+=Object.keys(d.completados||{}).length;
  });
  return t;
}
// ¿Hay alguna materia con TODAS las unidades en verde?
function hayMateriaEnVerde(){
  return materias.some(m=>{
    const dg=diagnostico(m.id);
    if(!dg||dg.global===null) return false;
    const conDatos=dg.unidades.filter(u=>!u.sinDatos);
    if(!conDatos.length || conDatos.length<dg.unidades.length) return false;
    return conDatos.every(u=>u.pct>=85);
  });
}
// ¿Alguna unidad con 100% de aciertos (y al menos 5 preguntas)?
function hayUnidad100(){
  return materias.some(m=>{
    const d=datosMateria(m.id);
    if(!d||!d.desempenio) return false;
    return Object.values(d.desempenio.porUnidad||{}).some(u=>{
      const total=(u.ok||0)+(u.mal||0);
      return total>=5 && u.mal===0;
    });
  });
}
// ¿Queda algo pendiente de repaso en todas las materias?
function colaRepasoVacia(){
  const enCola=materias.reduce((a,m)=>{
    const d=datosMateria(m.id);
    return a + ((d&&d.desempenio&&d.desempenio.fallos)||[]).length;
  },0);
  // solo cuenta si alguna vez hubo preguntas en cola
  return contador('dominadas')>0 && enCola===0;
}

// Revisa todas las condiciones.
// ctx puede traer: {quizPerfecto, esSimulacro, esLeccion, sinReintentos, eraDesaprobado,
//                   esRepaso, notaAbierta, materiaCreada, compartida, importada, flashcards}
function chequearLogros(ctx){
  ctx=ctx||{};
  darLogro('primer_paso');

  // --- horarios ---
  const ahora=new Date();
  const h=ahora.getHours();
  const dow=ahora.getDay();   // 0=domingo, 6=sábado
  if(h>=0 && h<5) darLogro('nocturno');
  if(h>=5 && h<7) darLogro('madrugador');
  if(h>=7 && h<9) darLogro('mate_cocido');

  // fines de semana: hay que haber estudiado sábado Y domingo
  if(dow===6||dow===0){
    const fs=J.get('et:finde',{});
    fs[dow===6?'sab':'dom']=true;
    J.set('et:finde',fs);
    if(fs.sab && fs.dom) darLogro('finde');
  }

  // --- primeros pasos ---
  if(ctx.esLeccion) darLogro('primera_leccion');
  if(ctx.esQuiz) darLogro('primer_quiz');
  if(ctx.materiaCreada) darLogro('primera_materia');

  // --- volumen del día ---
  const mh=metaHoy();
  if(mh.hechos>=5) darLogro('maraton');
  if(mh.hechos>=10) darLogro('ultramaraton');
  if(mh.hechos>=(metaDiaria.objetivo||2)) darLogro('meta_cumplida');

  // días con la meta cumplida
  if(mh.hechos===(metaDiaria.objetivo||2)){
    const dias=contador('metas_ok',1);
    if(dias>=7) darLogro('meta_7');
  }

  // --- volumen total ---
  const nodos=totalNodos();
  if(nodos>=25) darLogro('nodos_25');
  if(nodos>=50) darLogro('nodos_50');
  if(nodos>=100) darLogro('nodos_100');

  const pregs=totalPreguntas();
  if(pregs>=100) darLogro('preg_100');
  if(pregs>=500) darLogro('preg_500');

  // --- rachas ---
  if(racha.dias>=3) darLogro('racha_3');
  if(racha.dias>=7) darLogro('racha_7');
  if(racha.dias>=14) darLogro('racha_14');
  if(racha.dias>=30) darLogro('racha_30');

  // --- precisión ---
  if(ctx.quizPerfecto){
    darLogro('sin_errores');
    const p=contador('perfectos',1);
    if(p>=3) darLogro('tres_perfectos');
    if(p>=10) darLogro('diez_perfectos');
  }
  if(ctx.quizPerfecto && ctx.esSimulacro) darLogro('final_perfecto');
  if(ctx.sinReintentos) darLogro('primera_toma');

  if(ctx.flashcards){

  }

  // --- materias ---
  const completas=materiasCompletas();
  if(completas>=1) darLogro('materia_full');
  if(completas>=3) darLogro('tres_materias');
  if(completas>=5) darLogro('cinco_materias');
  if(completas>=10) darLogro('diez_materias');
  if(ctx.segundaVuelta) darLogro('dos_veces');

  // --- fechas de examen ---
  materias.forEach(m=>{
    const dias=diasRestantes(m.fecha);
    const d=datosMateria(m.id);
    if(!d) return;
    const hechos=Object.keys(d.completados||{}).length;
    if(dias===0 && hechos>0) darLogro('ultimo_dia');
  });
  if(ctx.diasAlCrear!==undefined && ctx.diasAlCrear>20) darLogro('anticipado');

  // --- social ---
  if(ctx.compartida) darLogro('compartir');
  if(ctx.importada) darLogro('importar');

  if(colaLogros.length) mostrarCartelLogro();
}

   MOTOR DE IA
   Orden: 1) worker compartido  2) clave propia (plan B)

// Flash-Lite tiene la cuota gratuita más alta; se prueba primero.
// IMPORTANTE: nombres EXPLÍCITOS, nunca aliases "latest".
// Los alias resuelven al modelo más nuevo (Flash 3.5 = $1.50/$9 por millón),
// que es 20x más caro que Flash-Lite ($0.10/$0.40). Para esta app, Flash-Lite sobra.
// SOLO modelos Flash-Lite (baratos). NUNCA metas acá un Flash normal:
// el fallback automático los usaría al saturarse el barato y dispararía el costo.
const MODELOS = [
  'gemini-3.1-flash-lite',        // el Flash-Lite vigente: $0.10 in / $0.40 out
  'gemini-3-flash-lite',          // variante alternativa (mismo precio)
  'gemini-2.5-flash-lite'         // más barato aún, pero retirado para cuentas nuevas
];
// Modelos caros que NO se deben usar nunca en modo automático (solo referencia).
const MODELOS_CAROS = ['gemini-2.5-flash','gemini-3.5-flash','gemini-3-flash'];
// NUNCA usar aliases 'latest': resuelven al modelo más nuevo (Flash 3.5),
// que cuesta $1.50/$9 por millón — 6 veces más caro que Flash-Lite.
let modeloActivo = st.get('et:modelo') || MODELOS[0];
// Forzar modelo económico: descartar aliases 'latest', modelos caros guardados
// de antes, y cualquiera que no sea Flash-Lite de la lista vigente.
if(!MODELOS.includes(modeloActivo) || /latest/.test(modeloActivo) || !/lite/.test(modeloActivo) || MODELOS_CAROS.includes(modeloActivo)){
  modeloActivo=MODELOS[0];
  st.set('et:modelo',modeloActivo);
}

async function llamadaCruda(modelo, partes, generationConfig){
  // Gemini espera contents:[{parts:[...]}] — las partes van envueltas
  const contents=[{parts:partes}];
  const res = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/${modelo}:generateContent`,{
    method:'POST',
    headers:{'Content-Type':'application/json','x-goog-api-key':clavePropia.trim()},
    body:JSON.stringify({contents, generationConfig})
  });
  const data = await res.json().catch(()=>({error:{message:'Respuesta ilegible (HTTP '+res.status+')'}}));
  if(data.error){
    const msg = data.error.message||'Error de la API';
    if(res.status===429){
      const detalles=JSON.stringify(data.error.details||[]);
      const esDiario = /per day|PerDay|RPD|GenerateRequestsPerDay/i.test(msg+detalles);
      const err=new Error(esDiario ? 'LIMITE_DIA' : 'LIMITE');
      err.crudo = msg + ' || ' + detalles;   // mensaje textual de Google, para el diagnóstico
      err.http = res.status;
      throw err;
    }
    const mkErr=(code)=>{ const e=new Error(code); e.crudo=msg; e.http=res.status; return e; };
    if(res.status===503 || /overloaded|high demand|UNAVAILABLE/i.test(msg)) throw mkErr('SATURADO');
    if(res.status===403 || /permission/i.test(msg)) throw mkErr('SIN_PERMISO');
    if(res.status===400 && /API key/i.test(msg)) throw mkErr('CLAVE_INVALIDA');
    if(res.status===404) throw mkErr('MODELO_404');
    throw mkErr(msg);
  }
  const texto = (data.candidates?.[0]?.content?.parts||[]).map(p=>p.text||'').join('');
  if(!texto) throw new Error('Respuesta vacía de la IA');
  return texto;
}

// prueba modelos alternativos si el activo devuelve 404 (nombres cambian con el tiempo)
async function llamadaConModelos(contents, generationConfig){
  // candidatos: el activo + el resto de Flash-Lite. Filtro final anti-caro por las dudas.
  const candidatos=[modeloActivo, ...MODELOS.filter(m=>m!==modeloActivo)]
    .filter(m=>/lite/.test(m) && !MODELOS_CAROS.includes(m));
  let ultimoErr;
  for(const modelo of candidatos){
    try{
      const r = await llamadaCruda(modelo, contents, generationConfig);
      if(modelo!==modeloActivo){modeloActivo=modelo;st.set('et:modelo',modelo);}
      return r;
    }catch(e){
      ultimoErr=e;
      // Probar el siguiente modelo si: no existe (404), está saturado, o
      // ESE modelo puntual está limitado en este proyecto (429).
      // Otros errores (clave inválida, sin permiso) sí cortan: cambiar de modelo no ayuda.
      if(e.message==='MODELO_404'||e.message==='SATURADO'||e.message==='LIMITE'||e.message==='LIMITE_DIA'){
        continue;
      }
      throw e;
    }
  }
  throw ultimoErr||new Error('Ningún modelo disponible');
}

// capa principal: backend primero, clave propia como plan B, reintento en 429
async function gemini(contents, generationConfig){
  if(!clavePropia) throw new Error('SIN_MOTOR');
  let ultimoErr=null;
  for(let intento=0;intento<2;intento++){
    try{
      return await llamadaConModelos(contents, generationConfig);
    }catch(e){
      ultimoErr=e;
      if(e.message==='LIMITE'){
        if(intento===0){ await new Promise(r=>setTimeout(r,5000)); continue; }
        break;
      }
      if(e.message==='CLAVE_INVALIDA'||e.message==='SIN_PERMISO'||e.message==='LIMITE_DIA'){ break; }
      if(intento===0){ await new Promise(r=>setTimeout(r,1200)); continue; }
      break;
    }
  }
  throw ultimoErr;
}

function parsearJSON(texto){
  const limpio = texto.replace(/```json|```/g,'').trim();
  const ini = limpio.indexOf('{');
  if(ini===-1) throw new Error('Respuesta sin JSON');

  // 1) intento directo
  const cuerpo = limpio.slice(ini, limpio.lastIndexOf('}')+1);
  try{ return JSON.parse(cuerpo); }catch(e){}

  // 2) La respuesta vino cortada (típico al pedir muchas preguntas).
  //    Recorro el texto y me quedo con el ÚLTIMO punto donde el JSON estaba sano,
  //    descartando el objeto incompleto del final.
  const s = limpio.slice(ini);
  const pila=[];
  let enStr=false, escp=false;
  let cortes=[];   // posiciones donde se cerró un objeto dentro de un array
  for(let i=0;i<s.length;i++){
    const ch=s[i];
    if(escp){ escp=false; continue; }
    if(ch==='\\'){ escp=true; continue; }
    if(ch==='"'){ enStr=!enStr; continue; }
    if(enStr) continue;
    if(ch==='{'||ch==='['){ pila.push(ch); }
    else if(ch==='}'||ch===']'){
      pila.pop();
      // si al cerrar quedamos dentro de un array, este es un elemento completo
      if(ch==='}' && pila.length && pila[pila.length-1]==='[') cortes.push(i);
    }
  }

  // reconstruir cerrando en el último elemento completo del array
  if(cortes.length){
    const fin=cortes[cortes.length-1];
    let recon=s.slice(0,fin+1);
    // cerrar lo que haya quedado abierto (arrays y objetos externos)
    const pila2=[]; let e2=false, s2=false;
    for(const ch of recon){
      if(s2){ if(e2){e2=false;continue;} if(ch==='\\'){e2=true;continue;} if(ch==='"'){s2=false;} continue; }
      if(ch==='"'){ s2=true; continue; }
      if(ch==='{') pila2.push('}');
      else if(ch==='[') pila2.push(']');
      else if(ch==='}'||ch===']') pila2.pop();
    }
    while(pila2.length) recon+=pila2.pop();
    try{ return JSON.parse(recon); }catch(e){}
  }

  throw new Error('La IA devolvió una respuesta cortada. Probá de nuevo.');
}

/* ---------- sanitización ---------- */
function sanitizarTexto(txt){
  return (txt||'')
    .replace(/[\u0000-\u0008\u000B-\u001F\u007F]/g,' ')
    .replace(/[\uD800-\uDFFF]/g,'')
    .replace(/[ \t]{3,}/g,'  ')
    .replace(/\n{4,}/g,'\n\n\n');
}
// Extrae del material la porción relevante a una unidad (evita mandar TODO en cada pedido).
// Busca las palabras clave del título/temas y devuelve el fragmento alrededor.
function fragmentoRelevante(apuntes, unidad, maxChars=18000){
  if(!apuntes || apuntes.length<=maxChars) return apuntes;
  const claves=[];
  claves.push(unidad.titulo||'');
  (unidad.nodos||[]).forEach(n=>{ claves.push(n.titulo||''); claves.push(n.temas||''); });
  const palabras=claves.join(' ')
    .toLowerCase().normalize('NFD').replace(/[\u0300-\u036f]/g,'')
    .split(/[^a-z0-9]+/)
    .filter(w=>w.length>4);              // palabras significativas
  if(!palabras.length) return apuntes.slice(0,maxChars);

  const texto=apuntes.toLowerCase().normalize('NFD').replace(/[\u0300-\u036f]/g,'');
  // puntuar bloques del material según cuántas palabras clave contienen
  const BLOQUE=3000;
  const bloques=[];
  for(let i=0;i<apuntes.length;i+=BLOQUE){
    const trozo=texto.slice(i,i+BLOQUE);
    let puntos=0;
    palabras.forEach(p=>{ if(trozo.includes(p)) puntos++; });
    bloques.push({i, puntos});
  }
  bloques.sort((a,b)=>b.puntos-a.puntos);
  const elegidos=bloques.slice(0, Math.ceil(maxChars/BLOQUE)).sort((a,b)=>a.i-b.i);
  if(!elegidos.length || elegidos[0].puntos===0) return apuntes.slice(0,maxChars);
  return elegidos.map(b=>apuntes.slice(b.i,b.i+BLOQUE)).join('\n[...]\n');
}

function recortar(txt, max=400000){
  txt = sanitizarTexto(txt);
  return txt.length>max ? txt.slice(0,max)+'\n[apuntes recortados]' : txt;
}

if(window.pdfjsLib){
  pdfjsLib.GlobalWorkerOptions.workerSrc='https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js';
}
function leerComoBase64(file){
  return new Promise((res,rej)=>{
    const r=new FileReader();
    r.onload=()=>res(r.result.split(',')[1]);
    r.onerror=()=>rej(new Error('No se pudo leer el archivo'));
    r.readAsDataURL(file);
  });
}
async function extraerPDF(file){
  const buf=await file.arrayBuffer();
  const pdf=await pdfjsLib.getDocument({data:buf}).promise;
  let texto='';
  const maxPag=Math.min(pdf.numPages,50);
  for(let i=1;i<=maxPag;i++){
    const pag=await pdf.getPage(i);
    const cont=await pag.getTextContent();
    texto+=cont.items.map(it=>it.str).join(' ')+'\n';
  }
  return texto.trim();
}
async function extraerDocx(file){
  const buf=await file.arrayBuffer();
  const res=await mammoth.extractRawText({arrayBuffer:buf});
  return res.value.trim();
}
async function extraerPptx(file){
  const zip=await JSZip.loadAsync(await file.arrayBuffer());
  // texto de un XML de PowerPoint: los runs de texto son <a:t>...</a:t>
  const textoDeXml=xml=>{
    const runs=[...xml.matchAll(/<a:t[^>]*>([^<]*)<\/a:t>/g)].map(m=>m[1]);
    return runs.join(' ').replace(/\s+/g,' ').trim();
  };
  // ordenar slides numéricamente (slide1, slide2, ... slide10)
  const numDe=ruta=>parseInt((ruta.match(/(\d+)\.xml$/)||[])[1]||0,10);
  const slides=Object.keys(zip.files)
    .filter(r=>/^ppt\/slides\/slide\d+\.xml$/.test(r))
    .sort((a,b)=>numDe(a)-numDe(b));
  if(!slides.length) throw new Error('El PowerPoint no tiene diapositivas legibles');
  const notas=Object.keys(zip.files)
    .filter(r=>/^ppt\/notesSlides\/notesSlide\d+\.xml$/.test(r))
    .sort((a,b)=>numDe(a)-numDe(b));
  const mapaNotas={};
  for(const r of notas){
    mapaNotas[numDe(r)]=textoDeXml(await zip.files[r].async('string'));
  }
  let texto='';
  for(const r of slides){
    const n=numDe(r);
    const t=textoDeXml(await zip.files[r].async('string'));
    if(t) texto+=`[Diapositiva ${n}] ${t}\n`;
    const nota=mapaNotas[n];
    if(nota&&nota.length>10) texto+=`[Notas ${n}] ${nota}\n`;
  }
  return texto.trim();
}
function extraerTextoPlano(file){
  return new Promise((res,rej)=>{
    const r=new FileReader();
    r.onload=()=>res(r.result.trim());
    r.onerror=()=>rej(new Error('No se pudo leer'));
    r.readAsText(file);
  });
}
async function extraerImagen(file){
  const b64=await leerComoBase64(file);
  const t = await gemini(
    [{inline_data:{mime_type:file.type,data:b64}},
     {text:'Transcribí TODO el texto de estos apuntes tal cual está, sin comentarios ni formato extra. Solo el texto.'}],
    {temperature:0.1, maxOutputTokens:4096}
  );
  const limpio=t.trim();
  if(!limpio) throw new Error('No pude leer texto en la foto');
  return limpio;
}
async function procesarArchivo(file, lista, repintar){
  lista=lista||archivosSubidos;
  repintar=repintar||pintarArchivos;
  const item={nombre:file.name,texto:'',estado:'leyendo',msg:''};
  lista.push(item);
  repintar();
  try{
    const nom=file.name.toLowerCase();
    // archivo demasiado grande: avisar antes de intentar leerlo
    if(file.size > 25*1024*1024) throw new Error('El archivo pesa más de 25 MB. Probá comprimirlo o subirlo por partes.');

    if(file.type==='application/pdf'||nom.endsWith('.pdf')) item.texto=await extraerPDF(file);
    else if(nom.endsWith('.docx')) item.texto=await extraerDocx(file);
    else if(nom.endsWith('.doc')) throw new Error('Formato .doc viejo. Abrilo en Word y guardalo como .docx.');
    else if(nom.endsWith('.pptx')) item.texto=await extraerPptx(file);
    else if(nom.endsWith('.ppt')) throw new Error('Formato .ppt viejo. Guardalo como .pptx y volvé a subirlo.');
    else if(file.type.startsWith('image/')){
      if(!hayMotor()) throw new Error('Para transcribir fotos necesitás cargar tu clave en Ajustes (⚙️).');
      item.texto=await extraerImagen(file);
    }
    else if(file.type.startsWith('text/')||nom.endsWith('.txt')||nom.endsWith('.md')) item.texto=await extraerTextoPlano(file);
    else throw new Error('No puedo leer este tipo de archivo. Subí PDF, Word (.docx), PowerPoint (.pptx), texto o una foto.');

    if(!item.texto || item.texto.trim().length<20){
      // distinguir el caso más común: PDF escaneado (imagen, sin texto)
      if(nom.endsWith('.pdf')) throw new Error('Este PDF no tiene texto: parece escaneado o son imágenes. Sacale fotos a las páginas y subilas como imágenes.');
      if(nom.endsWith('.pptx')) throw new Error('Esta presentación no tiene texto legible: las diapositivas parecen ser imágenes. Subilas como fotos.');
      throw new Error('No encontré texto legible en el archivo.');
    }
    item.estado='ok';
  }catch(e){
    item.estado='error';
    const m=e.message||'';
    if(m==='LIMITE') item.msg='Gemini te frenó un minuto. Esperá y reintentá.';
    else if(m==='LIMITE_DIA') item.msg='Se acabó tu cuota de hoy.';
    else if(m==='SIN_MOTOR') item.msg='Cargá tu clave en Ajustes (⚙️) para transcribir fotos.';
    else if(m==='SATURADO') item.msg='Google está saturado. Reintentá en un rato.';
    else item.msg = m || 'No pude leer el archivo.';
  }
  repintar();
}

function diasRestantes(fecha){
  const hoy=new Date();hoy.setHours(0,0,0,0);

function hoyISO(){ return new Date().toISOString().slice(0,10); }
function marcarRacha(){
  const hoy=hoyISO();
  // contar el nodo del día (para la meta diaria) siempre
  if(metaDiaria.dia!==hoy){ metaDiaria.dia=hoy; metaDiaria.hechos=0; }
  metaDiaria.hechos++;
  J.set('et:meta',metaDiaria);

  // historial diario (para las estadísticas): {"2026-07-14": 3, ...}
  const hist=J.get('et:hist',{});
  hist[hoy]=(hist[hoy]||0)+1;
  // conservar solo los últimos 120 días
  const limite=new Date(Date.now()-120*86400000).toISOString().slice(0,10);
  Object.keys(hist).forEach(k=>{ if(k<limite) delete hist[k]; });
  J.set('et:hist',hist);

  // la racha se incrementa una vez por día
  if(racha.ultima===hoy) return;
  const ayer=new Date(Date.now()-86400000).toISOString().slice(0,10);
  const rachaVieja=racha.dias;
  racha.dias=(racha.ultima===ayer)?racha.dias+1:1;
  racha.ultima=hoy;
  J.set('et:racha',racha);
  // récord de racha
  const rec=J.get('et:racha-record',0);
  if(racha.dias>rec) J.set('et:racha-record',racha.dias);
  if(racha.dias>rachaVieja) rachaSubio=true;   // para la animación
}

// normaliza para comparar preguntas (ignora tildes, mayúsculas y puntuación)
function normQ(t){
  return (t||'').toLowerCase()
    .normalize('NFD').replace(/[\u0300-\u036f]/g,'')
    .replace(/[^a-z0-9 ]/g,' ').replace(/\s+/g,' ').trim();
}
// filtra las preguntas que ya se usaron antes
function quitarRepetidas(preguntas, usadasStr){
  if(!usadasStr) return preguntas;
  const usadas=new Set(usadasStr.split(' | ').map(normQ).filter(Boolean));
  return preguntas.filter(p=>!usadas.has(normQ(p.q)));
}

// Descarta preguntas incompletas (opciones vacías, faltantes o índice inválido)
function limpiarPreguntas(preguntas){
  if(!Array.isArray(preguntas)) return [];
  return preguntas.filter(p=>{
    if(!p||typeof p.q!=='string'||!p.q.trim()) return false;

    // pregunta a desarrollar
    if(p.tipo==='abierta'){
      if(!Array.isArray(p.clave)) return false;
      const cl=p.clave.filter(c=>typeof c==='string'&&c.trim());
      if(cl.length<1) return false;      // necesita al menos un punto clave para corregir
      p.clave=cl;
      return true;
    }

    // multiple choice (por defecto)
    if(!Array.isArray(p.opciones)) return false;
    const ops=p.opciones.filter(o=>typeof o==='string'&&o.trim());
    if(ops.length<3) return false;
    if(ops.length!==p.opciones.length) return false;
    if(typeof p.correcta!=='number'||p.correcta<0||p.correcta>=p.opciones.length) return false;
    p.tipo='mc';
    return true;
  });
}

function barajar(preguntas){
  const mezcla=[...preguntas].sort(()=>Math.random()-.5);
  return mezcla.map(p=>{
    // las preguntas a desarrollar no tienen opciones: se devuelven tal cual
    if(p.tipo==='abierta' || !Array.isArray(p.opciones)){
      return {...p};
    }
    // multiple choice: mezclar el orden de las opciones
    const idx=p.opciones.map((_,i)=>i).sort(()=>Math.random()-.5);
    return {
      ...p,
      opciones: idx.map(i=>p.opciones[i]),
      correcta: idx.indexOf(p.correcta)
    };
  });
}

  if(rachaSubio) setTimeout(()=>{rachaSubio=false;},600);
  return `<div class="marca">
    <span class="logo" id="ir-inicio">EstudioTrack</span>${r}
    <button class="ajustes" id="btn-tema" title="Tema: ${tema}" aria-label="Cambiar tema">${iconoTema()}</button>
    <button class="ajustes" id="btn-ajustes" title="Ajustes" aria-label="Ajustes">⚙️</button>
  </div>`;
}
function wireMarca(){
  const l=document.getElementById('ir-inicio');
  if(l) l.onclick=()=>{vista={tipo:'inicio'};render();};
  const t=document.getElementById('btn-tema');
  if(t) t.onclick=ciclarTema;
  const a=document.getElementById('btn-ajustes');
  if(a) a.onclick=()=>{vista={tipo:'ajustes',volver:vista};render();};
}

/* ---------- inicio ---------- */
function renderInicio(){
  const _w=document.querySelector('.wrap'); if(_w){_w.classList.remove('split');_w.classList.remove('camino-solo');}
  let lista='';
  if(!materias.length){
    lista=`<div class="vacio"><span class="emoji">🎓</span>Todavía no tenés materias.<br>Creá la primera y subí tus apuntes.</div>`;
  }else{
    lista=materias.map(m=>{
      const d=datosMateria(m.id);
      let pct=0, pendiente='';
      if(d&&d.plan){
        const planos=nodosPlanos(d);
        const hechos=planos.filter(n=>d.completados[n.id]).length;
        pct=Math.round(hechos/planos.length*100);
        const prox=planos.find(n=>!d.completados[n.id]);
        pendiente=prox?`Seguís en: ${prox.titulo}`:'¡Camino completo! 🎉';
      }
      const dias=diasRestantes(m.fecha);
      const dm=datosMateria(m.id);
      const vueltas=(dm&&dm.vueltas)||0;
      return `<button class="materia-item" data-id="${m.id}">
        <div class="nombre">${esc(m.nombre)}</div>
        <div class="datos">
          <span>📅 ${dias===0?'¡Es hoy!':`Faltan ${dias} día${dias===1?'':'s'}`}</span>
          <span>🎯 ${esc(m.objetivo)}</span>
          <span>${esc(pendiente)}</span>
          ${vueltas>0?`<span>🔂 ${vueltas}ª vuelta</span>`:''}
        </div>
        <div class="mini-barra"><div style="width:${pct}%"></div></div>
      </button>`;
    }).join('');
  }
  // --- "seguí acá": próximo nodo pendiente de cualquier materia ---
  const prox=proximoNodoGlobal();
  let seguirHTML='';
  if(prox){
    seguirHTML=`<button class="seguir-hoy" id="seguir-hoy">
      <span class="ico">${iconoNodo(prox.nodo.tipo)}</span>
      <span class="tx">
        <span class="et">Seguí acá</span>
        <span class="ti">${esc(prox.nodo.titulo)}</span>
        <span class="ma">${esc(prox.materia.nombre)} · ${nombreTipo(prox.nodo.tipo)}</span>
      </span>
      <span class="flecha">→</span>
    </button>`;
  }
  // --- meta diaria ---
  let metaHTML='';
  if(materias.length){
    const mh=metaHoy();
    const p=Math.min(100,Math.round(mh.hechos/mh.objetivo*100));
    metaHTML=`<div class="meta-diaria ${mh.cumplida?'cumplida':''}">
      <div class="anillo ${mh.cumplida?'ok':''}" style="--p:${p}"><span>${mh.hechos}/${mh.objetivo}</span></div>
      <div class="info">
        <div class="t">${mh.cumplida?'¡Meta del día cumplida! 🎉':'Meta de hoy'}</div>
        <div class="s">${mh.cumplida?'Seguí sumando si querés, ya cumpliste.':`Completá ${mh.objetivo-mh.hechos} nodo${(mh.objetivo-mh.hechos)===1?'':'s'} más hoy`}</div>
      </div>
      <button class="cfg" id="cfg-meta" title="Cambiar meta">⚙️</button>
    </div>`;
    if(editandoMeta){
      const obj=mh.objetivo;
      const ops=[{n:1,l:'tranqui'},{n:2,l:'normal'},{n:3,l:'a full'},{n:5,l:'crack'}];
      metaHTML+=`<div class="meta-editor">
        <div class="t">¿Cuántos nodos por día?</div>
        <div class="s">Cada lección o quiz completado suma uno.</div>
        <div class="chips">
          ${ops.map(o=>`<button class="chip ${o.n===obj?'sel':''}" data-meta="${o.n}"><div class="num">${o.n}</div><div class="lbl">${o.l}</div></button>`).join('')}
        </div>
      </div>`;
    }
  }
  const nGanados=CATALOGO_LOGROS.filter(l=>tieneLogro(l.id)).length;
  const ultimos=CATALOGO_LOGROS.filter(l=>tieneLogro(l.id)).slice(-3).map(l=>l.emoji).join(' ');
  const logrosHTML=materias.length?`<button class="logros-resumen" id="ver-logros">
      <span class="lr-ico">🏆</span>
      <span class="lr-tx">
        <span class="lr-t">Logros</span>
        <span class="lr-s">${nGanados} de ${CATALOGO_LOGROS.length} desbloqueados ${ultimos}</span>
      </span>
      <span class="lr-fl">→</span>
    </button>`:'';
  $app.innerHTML=`
    ${marcaHTML()}
    ${(()=>{
      const er=estadoRacha();
      if(!er||er.estado!=='en-riesgo') return '';
      return `<div class="racha-riesgo">
        <span class="rr-ico">🔥</span>
        <span><strong>Tu racha de ${er.dias} día${er.dias===1?'':'s'} está en juego.</strong><br>
        Completá un nodo hoy para mantenerla viva.</span>
      </div>`;
    })()}
    ${seguirHTML}
    ${metaHTML}
    ${logrosHTML}
    <div class="card">
      <h2>Tus materias</h2>
      <p class="sub">Tocá una para seguir el camino donde lo dejaste.</p>
      ${lista}
      <button class="btn" id="nueva">+ Nueva materia</button>
      <button class="btn sec" id="importar-btn">📥 Importar materia de un compañero</button>
      <button class="btn sec" id="ver-stats">📊 Mis estadísticas</button>
    </div>
    ${!tieneClavePropia()?`<button class="aviso-clave" id="ir-clave">
        <span class="ac-ico">🔑</span>
        <span class="ac-tx"><strong>Activá tu IA gratis (2 min)</strong><br>Cargá tu clave de Google Gemini para tener tu propia cuota diaria.</span>
        <span class="ac-fl">→</span>
      </button>`:''}`;
  wireMarca();
  const ib=document.getElementById('importar-btn');
  if(ib) ib.onclick=()=>{ vista={tipo:'importar'}; render(); };
  const vs=document.getElementById('ver-stats');
  if(vs) vs.onclick=()=>{ vista={tipo:'estadisticas'}; render(); };
  const vl=document.getElementById('ver-logros');
  if(vl) vl.onclick=()=>{ vista={tipo:'logros'}; render(); };
  const ic=document.getElementById('ir-clave');
  if(ic) ic.onclick=()=>{ vista={tipo:'ajustes',volver:{tipo:'inicio'}}; render(); };
  const sh=document.getElementById('seguir-hoy');
  if(sh) sh.onclick=()=>{ vista={tipo:'camino',id:prox.materia.id}; render(); };
  const cm=document.getElementById('cfg-meta');
  if(cm) cm.onclick=()=>{ editandoMeta=!editandoMeta; render(); };
  document.querySelectorAll('.chip[data-meta]').forEach(c=>{
    c.onclick=()=>{ setObjetivoMeta(+c.dataset.meta); editandoMeta=false; render(); };
  });
  document.getElementById('nueva').onclick=()=>{
    if(!hayMotor()){vista={tipo:'ajustes',volver:{tipo:'nueva'}};render();return;}
    archivosSubidos=[];
    vista={tipo:'nueva'};render();
  };
  $app.querySelectorAll('.materia-item').forEach(b=>{
    b.onclick=()=>{vista={tipo:'camino',id:b.dataset.id};render();};
  });
}

/* ---------- ajustes ---------- */
function renderAjustes(err){
  const _w=document.querySelector('.wrap'); if(_w){_w.classList.remove('split');_w.classList.remove('camino-solo');}
  const volver=vista.volver||{tipo:'inicio'};
  const tiene=tieneClavePropia();
  const estado = tiene
    ? `<div class="estado-motor"><span class="punto-v"></span><span><strong>Tu clave está activa.</strong> Tenés tu propia cuota gratuita de Gemini, sin compartirla con nadie.</span></div>`
    : `<div class="estado-motor"><span class="punto-a"></span><span><strong>Todavía no cargaste tu clave.</strong> Es gratis, tarda 2 minutos y te da tu propia cuota diaria. Seguí los pasos de abajo.</span></div>`;
  $app.innerHTML=`
    ${marcaHTML()}
    <div class="card">
      <h2>Tu clave de IA (gratis)</h2>
      <p class="sub">EstudioTrack usa Google Gemini. Necesitás tu propia clave (es gratis y tarda 2 minutos): así tenés tu cuota y no la compartís con nadie.</p>
      ${estado}
      <div class="pasos" style="margin-top:18px">
        <div class="paso"><span class="n">1</span><span>Entrá a <strong>aistudio.google.com/apikey</strong> e iniciá sesión con tu cuenta de Google (es gratis, <strong>no pide tarjeta</strong>).</span></div>
        <div class="paso"><span class="n">2</span><span>Tocá <strong>"Crear clave de API"</strong> y después <strong>"Copiar clave"</strong>.</span></div>
        <div class="paso"><span class="n">3</span><span>Pegala acá abajo y tocá Guardar. Listo, ya podés estudiar.</span></div>
      </div>
      <label for="clave">Pegá tu clave acá</label>
      <input id="clave" type="password" placeholder="AIza… o AQ.…" value="${esc(clavePropia)}">
      <p class="hint">Se guarda solo en este dispositivo, nadie más la ve. En el plan gratuito, Google puede usar lo que envíes para mejorar sus modelos: no subas nada privado.</p>
      <div class="info-cuota">
        <strong>📊 Cómo funciona la cuota</strong>
        Tu clave gratuita tiene un límite de pedidos por día. La app consume 1 pedido al armar el camino y 1 por cada unidad que abrís, así que rinde bastante. Si se te acaba, se renueva a la madrugada.<br><br>
        <strong>Truco:</strong> si un compañero ya armó la materia, que te pase el código con "Compartir" — te llega con el contenido hecho y <strong>no gastás nada de tu cuota</strong>. Podés estudiarla entera sin usar un solo pedido.
      </div>
      <div id="err-clave">${err?`<div class="err">${esc(err)}</div>`:''}</div>
      <button class="btn" id="guardar">Guardar y probar</button>
      ${tiene?'<button class="btn sec" id="quitar-clave">Quitar mi clave</button>':''}
      ${tiene?`<p class="hint" style="margin-top:12px">⚙️ Modelo en uso: <strong>${esc(modeloActivo)}</strong>${/lite/.test(modeloActivo)?' <span style="color:var(--aprobado)">(económico ✓)</span>':' <span style="color:var(--error)">(¡ojo, este es caro!)</span>'}</p>`:''}
      ${tiene?'<button class="btn sec" id="diagnostico">🔍 Probar qué modelos funcionan</button>':''}
      <div id="salida-diag"></div>
      <hr style="border:none;border-top:1.5px solid var(--borde);margin:22px 0">
      ${('Notification' in window)?`
        <button class="btn sec" id="notis">
          ${Notification.permission==='granted'?'🔔 Recordatorios activados':'🔔 Activar recordatorio de racha'}
        </button>
        <p class="hint">Te avisa cuando tu racha está por cortarse. Funciona mejor con la app instalada.</p>
      `:''}
      <button class="btn sec" id="buscar-update">🔄 Buscar actualización</button>
      <p class="hint">Versión ${APP_VERSION}. Si quedó en una versión vieja, tocá acá o cerrá y volvé a abrir la app. <strong>Nunca hace falta desinstalarla</strong>: eso borra tus materias y tu progreso.</p>
      <button class="btn sec" id="ir-respaldo">📦 Pasar mis datos a otro dispositivo</button>
      <button class="btn sec" id="cancelar">Volver</button>
    </div>`;
  wireMarca();
  document.getElementById('cancelar').onclick=()=>{vista=volver;render();};
  const dg=document.getElementById('diagnostico');
  if(dg) dg.onclick=async ()=>{
    const out=document.getElementById('salida-diag');
    dg.disabled=true; dg.textContent='Probando…';
    out.innerHTML='<p class="hint">Probando cada modelo con tu clave…</p>';
    const lineas=[];
    for(const modelo of MODELOS){
      try{
        await llamadaCruda(modelo, [{text:'Decí solo: ok'}], {maxOutputTokens:20});
        lineas.push(`<div style="color:var(--aprobado);font-weight:600">✓ ${modelo} — funciona</div>`);
      }catch(e){
        const detalle = e.crudo ? e.crudo : (e.message||'');
        lineas.push(`<div style="color:var(--error);margin-bottom:8px">✗ <strong>${modelo}</strong> (HTTP ${e.http||'?'})<br><span style="font-size:11.5px;font-family:ui-monospace,monospace;word-break:break-all">${esc(String(detalle).slice(0,500))}</span></div>`);
      }
    }
    out.innerHTML=`<div class="codigo-box" style="font-family:inherit;font-size:13px;max-height:none">${lineas.join('')}</div>`;
    dg.disabled=false; dg.textContent='🔍 Probar qué modelos funcionan';
  };
  const bn=document.getElementById('notis');
  if(bn) bn.onclick=async ()=>{
    if(Notification.permission==='granted'){
      alert('Ya están activados. Si querés desactivarlos, hacelo desde la configuración del navegador.');
      return;
    }
    if(Notification.permission==='denied'){
      alert('Los bloqueaste antes. Para activarlos, entrá a la configuración del sitio en tu navegador y permití las notificaciones.');
      return;
    }
    const ok=await pedirPermisoNotis();
    if(ok){
      try{ new Notification('🔥 ¡Listo!', {body:'Te voy a avisar cuando tu racha esté en juego.', icon:'icon-192.png'}); }catch(e){}
      render();
    }
  };
  const bup=document.getElementById('buscar-update');
  if(bup) bup.onclick=async ()=>{
    bup.disabled=true; bup.textContent='Buscando…';
    try{
      // Leer el index.html VIVO del servidor y comparar su APP_VERSION con la nuestra.
      // (reg.update() acá no sirve: re-chequea sw.js?v=VERSION_VIEJA, que nunca cambia.)
      // El ?chk= evita que el service worker nos devuelva el HTML cacheado.
      const res=await fetch('index.html?chk='+Date.now(),{cache:'no-store'});
      if(!res.ok) throw new Error('HTTP '+res.status);
      const txt=await res.text();
      const mm=txt.match(/APP_VERSION\s*=\s*'([^']+)'/);
      const remota=mm&&mm[1];
      if(remota && remota!==APP_VERSION){
        bup.textContent='✨ ¡Versión '+remota+' disponible! Actualizando…';
        setTimeout(()=>location.reload(),800);   // el HTML va red-primero: recargar ya la trae
      }else{
        bup.textContent='✓ Ya tenés la última ('+APP_VERSION+')';
        // de paso, empujar el SW por si quedó uno esperando activar
        const reg=await navigator.serviceWorker.getRegistration().catch(()=>null);
        if(reg){ reg.update().catch(()=>{}); if(reg.waiting) reg.waiting.postMessage({tipo:'ACTIVAR_YA'}); }
        setTimeout(()=>{bup.textContent='🔄 Buscar actualización';bup.disabled=false;},2500);
      }
    }catch(e){
      bup.textContent='No pude verificar (¿sin conexión?)';
      setTimeout(()=>{bup.textContent='🔄 Buscar actualización';bup.disabled=false;},2500);
    }
  };
  const irb=document.getElementById('ir-respaldo');
  if(irb) irb.onclick=()=>{vista={tipo:'respaldo'};render();};
  const q=document.getElementById('quitar-clave');
  if(q) q.onclick=()=>{clavePropia='';st.del('et:key');renderAjustes();};
  document.getElementById('guardar').onclick=async ()=>{
    const btn=document.getElementById('guardar');
    const k=document.getElementById('clave').value.trim();
    if(!k){
      document.getElementById('err-clave').innerHTML='<div class="err">Pegá tu clave primero. Seguí los 3 pasos de arriba.</div>';
      return;
    }
    clavePropia=k;
    st.set('et:key',k);              // guardar SIEMPRE: si la prueba falla, igual queda cargada
    btn.disabled=true;btn.textContent='Probando…';
    try{
      await llamadaConModelos([{text:'Respondé solo con este JSON: {"ok":true}'}],{maxOutputTokens:50});
      vista=volver;render();
    }catch(e){
      btn.disabled=false;btn.textContent='Guardar y probar';
      document.getElementById('err-clave').innerHTML=`<div class="err"><strong>Tu clave quedó guardada</strong>, pero la prueba falló: ${esc(mensajeError(e))}<br><br>Podés tocar "🔍 Probar qué modelos funcionan" para ver el detalle.</div>`;
      // re-render para que aparezca el botón de diagnóstico
      const dgBtn=document.getElementById('diagnostico');
      if(!dgBtn) renderAjustes(null);
    }
  };
}

/* ---------- recordatorio de racha ----------
   Nota: las notificaciones push programadas necesitan un servidor.
   Sin backend, lo que SÍ podemos hacer es:
   1. Avisar dentro de la app cuando la racha está por cortarse.
   2. Mandar una notificación si la app está abierta/instalada y el usuario dio permiso. */
function estadoRacha(){
  if(!racha.dias || !racha.ultima) return null;
  const hoy=hoyISO();
  const ayer=new Date(Date.now()-86400000).toISOString().slice(0,10);
  if(racha.ultima===hoy) return {estado:'ok'};                    // ya estudió hoy
  if(racha.ultima===ayer) return {estado:'en-riesgo', dias:racha.dias};  // si no estudia hoy, se corta
  return {estado:'cortada'};
}

async function pedirPermisoNotis(){
  if(!('Notification' in window)) return false;
  if(Notification.permission==='granted') return true;
  if(Notification.permission==='denied') return false;
  const p=await Notification.requestPermission();
  return p==='granted';
}

function avisarRacha(){
  const er=estadoRacha();
  if(!er || er.estado!=='en-riesgo') return;
  if(!('Notification' in window) || Notification.permission!=='granted') return;
  // no repetir el aviso el mismo día
  const hoy=hoyISO();
  if(st.get('et:aviso-racha')===hoy) return;
  st.set('et:aviso-racha',hoy);
  try{
    new Notification('🔥 No cortes tu racha', {
      body: `Llevás ${er.dias} día${er.dias===1?'':'s'} seguidos. Hacé un nodo hoy para mantenerla.`,
      icon: 'icon-192.png',
      tag: 'racha'
    });
  }catch(e){}
}

/* ---------- estadísticas personales ---------- */
function renderEstadisticas(){
  const _w=document.querySelector('.wrap'); if(_w){_w.classList.remove('split');_w.classList.remove('camino-solo');}
  const hist=J.get('et:hist',{});
  const record=Math.max(J.get('et:racha-record',0), racha.dias||0);

  // Los totales salen de los datos REALES de las materias (no del historial),
  // así reflejan también lo que estudiaste antes de que existiera el registro diario.
  const nodosReales=totalNodos();
  const nodosHist=Object.values(hist).reduce((a,b)=>a+b,0);
  const totalNodosMostrar=Math.max(nodosReales, nodosHist);
  const diasActivos=Object.keys(hist).length;

  // últimos 28 días (4 semanas)
  const celdas=[];
  for(let i=27;i>=0;i--){
    const f=new Date(Date.now()-i*86400000).toISOString().slice(0,10);
    const n=hist[f]||0;
    celdas.push({f, n, nivel: n===0?0 : n<=1?1 : n<=3?2 : 3});
  }

  // esta semana vs la anterior
  const suma=(desde,hasta)=>{
    let t=0;
    for(let i=desde;i<hasta;i++){
      const f=new Date(Date.now()-i*86400000).toISOString().slice(0,10);
      t+=hist[f]||0;
    }
    return t;
  };
  const estaSem=suma(0,7), semAnt=suma(7,14);
  const dif = semAnt>0 ? Math.round((estaSem-semAnt)/semAnt*100) : (estaSem>0?100:0);

  // desempeño por materia (aciertos en quizzes)
  const porMateria=materias.map(m=>{
    const d=datosMateria(m.id);
    if(!d||!d.desempenio) return null;
    const pu=d.desempenio.porUnidad||{};
    let ok=0,total=0;
    Object.values(pu).forEach(u=>{ ok+=u.ok||0; total+=(u.ok||0)+(u.mal||0); });
    if(total===0) return null;
    return {nombre:m.nombre, pct:Math.round(ok/total*100), total};
  }).filter(Boolean).sort((a,b)=>b.pct-a.pct);

  const totalPreg=totalPreguntas();
  const completas=materiasCompletas();
  const aRepasar=pendientesDeRepaso().length;

  $app.innerHTML=`
    ${marcaHTML()}
    <button class="volver" id="volver">← Volver</button>
    <div class="card">
      <h2>Tus estadísticas</h2>
      <p class="sub">Todo lo que llevás hecho en EstudioTrack.</p>

      <div class="est-grid">
        <div class="est-caja">
          <div class="ec-n">🔥 ${racha.dias}</div>
          <div class="ec-l">racha actual${record>racha.dias?` · récord ${record}`:''}</div>
        </div>
        <div class="est-caja">
          <div class="ec-n">${totalNodosMostrar}</div>
          <div class="ec-l">lecciones y quizzes hechos</div>
        </div>
        <div class="est-caja">
          <div class="ec-n">${completas}</div>
          <div class="ec-l">materia${completas===1?'':'s'} completa${completas===1?'':'s'}</div>
        </div>
        <div class="est-caja">
          <div class="ec-n">${totalPreg}</div>
          <div class="ec-l">preguntas respondidas</div>
        </div>
      </div>

      <h2 style="font-size:19px;margin-top:24px">Últimas 4 semanas</h2>
      <p class="sub">${estaSem} nodo${estaSem===1?'':'s'} esta semana${semAnt>0?` · ${dif>=0?'+':''}${dif}% vs la anterior`:''}${diasActivos===0?' · el mapa se empieza a llenar desde hoy':''}</p>
      <div class="heat">
        ${celdas.map(c=>`<i data-n="${c.nivel}" title="${c.f}: ${c.n} nodo${c.n===1?'':'s'}"></i>`).join('')}
      </div>
      <div class="heat-dias"><span>L</span><span>M</span><span>M</span><span>J</span><span>V</span><span>S</span><span>D</span></div>

      ${porMateria.length?`
        <h2 style="font-size:19px;margin-top:24px">Cómo vas por materia</h2>
        <p class="sub">Porcentaje de aciertos en los quizzes.</p>
        <div class="est-barras">
          ${porMateria.map(m=>`
            <div class="est-b">
              <span class="eb-t">${esc(m.nombre)}</span>
              <span class="eb-barra"><i style="width:${m.pct}%"></i></span>
              <span class="eb-p">${m.pct}%</span>
            </div>`).join('')}
        </div>`:''}

      ${aRepasar>0?`<div class="info-cuota" style="margin-top:20px">
        <strong>🔁 Tenés ${aRepasar} pregunta${aRepasar===1?'':'s'} para repasar</strong>
        Son las que fallaste y toca volver a verlas hoy. Entrá a la materia y tocá "¿Listo para rendir?".
      </div>`:''}
    </div>`;
  wireMarca();
  document.getElementById('volver').onclick=()=>{vista={tipo:'inicio'};render();};
}

/* ---------- flashcards ----------
   Se arman con el contenido YA generado de las lecciones: no gastan cuota. */
function flashcardsDe(mid){
  const d=datosMateria(mid);
  if(!d||!d.plan) return [];
  const cards=[];
  const planos=nodosPlanos(d);
  planos.forEach(n=>{
    if(n.tipo!=='leccion') return;
    const c=d.contenido[n.id];
    if(!c||!c.puntos) return;
    const ui=n.id.split('-')[0];
    const unidad=d.plan.unidades[+ui];
    c.puntos.forEach((p,i)=>{
      cards.push({
        frente:n.titulo,
        dorso:p,
        unidad:unidad?unidad.titulo:'',
        uid:n.id+'-'+i
      });
    });
    // el ejemplo también sirve como tarjeta
    if(c.ejemplo){
      cards.push({frente:'Caso de examen — '+n.titulo, dorso:c.ejemplo, unidad:unidad?unidad.titulo:'', uid:n.id+'-ej'});
    }
  });
  return cards;
}
