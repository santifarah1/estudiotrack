<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>EstudioTrack — Tu camino al examen</title>
<meta name="theme-color" content="#1B2A4A">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="apple-mobile-web-app-title" content="EstudioTrack">
<link rel="manifest" href="manifest.json">
<link rel="icon" type="image/png" sizes="32x32" href="favicon-32.png">
<link rel="apple-touch-icon" href="apple-touch-icon.png">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Bricolage+Grotesque:wght@500;700;800&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/mammoth/1.6.0/mammoth.browser.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>
<style>
  :root{
    --papel:#FAFAF6; --tinta:#1B2A4A; --resaltador:#FFD84D;
    --aprobado:#2E7D5B; --aprobado-claro:#E3F2EA;
    --error:#C94F4F; --error-claro:#F9E7E7;
    --borde:#E3E1D8; --carta:#FFFFFF; --sombra:0 2px 0 var(--borde);
  }
  *{box-sizing:border-box;margin:0;padding:0}
  body{font-family:'Inter',system-ui,sans-serif;background:var(--papel);color:var(--tinta);min-height:100vh;line-height:1.5}
  .wrap{max-width:520px;margin:0 auto;padding:20px 16px 80px}
  /* --- layout de escritorio --- */
  @media (min-width:900px){
    /* vista del camino sola: dos columnas (info a la izquierda, nodos a la derecha) */
    .wrap.camino-solo{max-width:940px}
    .camino-solo .camino-grid{display:grid;grid-template-columns:300px 1fr;gap:32px;align-items:start}
    .camino-solo .camino-info{position:sticky;top:20px}
    .camino-solo .camino-info .materia-head{margin-top:0}
    .camino-solo .camino-info .acciones-pie{margin-top:20px;flex-direction:column}
    .camino-solo .camino-info .acciones-pie .btn{width:100%}
    .camino-solo .camino-lista .camino{margin-top:0}
    .camino-solo .camino-lista .unidad-titulo:first-child{margin-top:0}
    .wrap.split{max-width:1040px}
    .split .split-grid{display:grid;grid-template-columns:340px 1fr;gap:24px;align-items:start}
    .split .panel-camino{position:sticky;top:20px;max-height:calc(100vh - 40px);overflow-y:auto;padding-right:4px}
    .split .panel-camino .camino{margin-top:14px}
    .split .panel-camino .materia-head h2{font-size:20px}
    .split .panel-camino .nodo{padding:11px 13px}
    .split .panel-camino .nodo .icono{width:32px;height:32px;font-size:16px}
    .split .panel-camino .nodo .tit{font-size:13.5px}
    .split .panel-contenido{min-width:0}
    .split .panel-contenido .card{margin-top:0}
    .split .panel-camino .acciones-pie{margin-top:18px}
    .split .panel-camino .acciones-pie .btn{font-size:12.5px;padding:8px 10px;min-width:0}
  }
  h1,h2,h3{font-family:'Bricolage Grotesque','Inter',sans-serif}
  .marca{display:flex;align-items:center;gap:8px;margin-bottom:6px}
  .marca .logo{font-family:'Bricolage Grotesque',sans-serif;font-weight:800;font-size:22px;position:relative;display:inline-block;padding:0 4px;cursor:pointer}
  .marca .logo::before{content:"";position:absolute;left:0;right:0;bottom:2px;height:12px;background:var(--resaltador);z-index:-1;transform:skew(-8deg) rotate(-1deg)}
  .racha{margin-left:auto;font-weight:700;font-size:14px;background:var(--carta);border:1.5px solid var(--borde);border-radius:999px;padding:4px 12px;box-shadow:var(--sombra)}
  .ajustes{background:var(--carta);border:1.5px solid var(--borde);border-radius:999px;width:32px;height:32px;cursor:pointer;font-size:15px;box-shadow:var(--sombra)}
  .card{background:var(--carta);border:1.5px solid var(--borde);border-radius:16px;padding:20px;box-shadow:var(--sombra);margin-top:14px}
  .card h2{font-size:26px;font-weight:800;line-height:1.15;margin-bottom:4px}
  .sub{color:#5A6780;font-size:14px;margin-bottom:16px}
  label{display:block;font-size:13px;font-weight:600;margin:14px 0 5px}
  input,textarea,select{width:100%;font-family:inherit;font-size:15px;color:var(--tinta);background:var(--papel);border:1.5px solid var(--borde);border-radius:10px;padding:10px 12px}
  input:focus,textarea:focus,select:focus,button:focus-visible{outline:3px solid var(--resaltador);outline-offset:1px;border-color:var(--tinta)}
  textarea{min-height:80px;resize:vertical}
  .fila{display:flex;gap:10px}
  .fila>div{flex:1}
  .hint{font-size:12px;color:#8A93A5;margin-top:4px}
  .btn{display:block;width:100%;margin-top:20px;padding:14px;font-family:'Bricolage Grotesque',sans-serif;font-weight:700;font-size:16px;color:var(--papel);background:var(--tinta);border:none;border-radius:12px;cursor:pointer;box-shadow:0 3px 0 #0F1B33}
  .btn:active{transform:translateY(2px);box-shadow:0 1px 0 #0F1B33}
  .btn[disabled]{opacity:.55;cursor:wait}
  .btn.sec{background:var(--carta);color:var(--tinta);border:1.5px solid var(--borde);box-shadow:var(--sombra)}
  .btn.chico{width:auto;padding:9px 16px;font-size:14px;margin-top:0}
  .pasos{margin:12px 0}
  .paso{display:flex;gap:10px;margin-bottom:10px;font-size:14px}
  .paso .n{flex-shrink:0;width:24px;height:24px;border-radius:50%;background:var(--resaltador);font-weight:800;font-size:13px;display:flex;align-items:center;justify-content:center}
  .estado-motor{display:flex;align-items:center;gap:8px;font-size:13.5px;background:var(--papel);border:1.5px solid var(--borde);border-radius:10px;padding:10px 12px;margin-top:8px}
  .estado-motor .punto-v{width:9px;height:9px;border-radius:50%;background:var(--aprobado);flex-shrink:0}
  .estado-motor .punto-a{width:9px;height:9px;border-radius:50%;background:#E8A93D;flex-shrink:0}
  .dropzone{border:2px dashed #C9CFDC;border-radius:12px;background:var(--papel);padding:18px 14px;text-align:center;cursor:pointer;font-size:14px;color:#5A6780}
  .dropzone.arrastrando{border-color:var(--tinta);background:#FFF9E3}
  .dropzone strong{color:var(--tinta)}
  .dropzone input{display:none}
  .archivos{margin-top:8px}
  .archivo{display:flex;align-items:center;gap:8px;font-size:13px;background:var(--carta);border:1.5px solid var(--borde);border-radius:9px;padding:7px 11px;margin-top:6px}
  .archivo .ok-a{color:var(--aprobado);font-weight:800}
  .archivo .err-a{color:var(--error);font-weight:800}
  .archivo .quitar{margin-left:auto;background:none;border:none;cursor:pointer;color:#8A93A5;font-size:15px;font-weight:700;padding:0 4px}
  .archivo .estado-a{margin-left:auto;color:#8A93A5;font-size:12px;text-align:right}
  .materia-item{background:var(--carta);border:1.5px solid var(--borde);border-radius:14px;padding:16px;margin-top:12px;cursor:pointer;box-shadow:var(--sombra);width:100%;text-align:left;font-family:inherit;color:var(--tinta);transition:transform .12s ease}
  .materia-item:hover{transform:translateX(3px)}
  .materia-item .nombre{font-family:'Bricolage Grotesque',sans-serif;font-weight:700;font-size:17px}
  .materia-item .datos{display:flex;gap:8px;flex-wrap:wrap;margin-top:6px;font-size:12px;color:#5A6780}
  .mini-barra{height:8px;background:var(--papel);border:1.5px solid var(--borde);border-radius:999px;overflow:hidden;margin-top:10px}
  .mini-barra>div{height:100%;background:var(--aprobado);border-radius:999px}
  .materia-head{margin:18px 0 6px}
  .materia-head h2{font-size:24px;font-weight:800}
  .meta{display:flex;gap:8px;flex-wrap:wrap;margin-top:8px}
  .pill{font-size:12.5px;font-weight:600;background:var(--carta);border:1.5px solid var(--borde);border-radius:999px;padding:4px 11px}
  .pill.obj{background:var(--resaltador);border-color:#E8C22E}
  .barra{height:12px;background:var(--carta);border:1.5px solid var(--borde);border-radius:999px;overflow:hidden;margin-top:14px}
  .barra>div{height:100%;background:var(--aprobado);border-radius:999px;transition:width .5s ease}
  .barra-label{font-size:12px;color:#5A6780;margin-top:5px}
  .camino{position:relative;margin-top:26px;padding-left:34px}
  .camino::before{content:"";position:absolute;left:15px;top:10px;bottom:10px;width:0;border-left:3px dashed #C9CFDC}
  .unidad-titulo{font-family:'Bricolage Grotesque',sans-serif;font-weight:700;font-size:13px;letter-spacing:.08em;text-transform:uppercase;color:#5A6780;margin:26px 0 10px;position:relative}
  .unidad-titulo::before{content:"";position:absolute;left:-27px;top:5px;width:11px;height:11px;background:var(--papel);border:3px solid #C9CFDC;border-radius:50%}
  .nodo{position:relative;background:var(--carta);border:1.5px solid var(--borde);border-radius:14px;padding:14px 16px;margin-bottom:12px;cursor:pointer;box-shadow:var(--sombra);display:flex;align-items:center;gap:12px;transition:transform .12s ease;width:100%;text-align:left;font-family:inherit;color:var(--tinta)}
  .nodo:hover:not(.bloq){transform:translateX(3px)}
  .nodo::before{content:"";position:absolute;left:-27px;top:50%;transform:translateY(-50%);width:13px;height:13px;border-radius:50%;background:var(--carta);border:3px solid var(--tinta)}
  .nodo.ok::before{background:var(--aprobado);border-color:var(--aprobado)}
  .nodo.bloq{opacity:.5;cursor:not-allowed}
  .nodo.bloq::before{border-color:#C9CFDC}
  .nodo.actual{border-color:var(--tinta);border-width:2px}
  .nodo.sel{border-color:var(--tinta);border-width:2px;background:#FFFDF3}
  .nodo.actual::after{content:"ACÁ";position:absolute;top:-9px;right:12px;font-family:'Bricolage Grotesque',sans-serif;font-weight:800;font-size:10px;letter-spacing:.1em;background:var(--resaltador);padding:2px 8px;border-radius:6px}
  .nodo .icono{width:38px;height:38px;flex-shrink:0;border-radius:10px;display:flex;align-items:center;justify-content:center;font-size:19px;background:var(--papel);border:1.5px solid var(--borde)}
  .nodo.ok .icono{background:var(--aprobado-claro);border-color:var(--aprobado)}
  .nodo .txt{flex:1;min-width:0}
  .nodo .tipo{font-size:11px;font-weight:700;letter-spacing:.07em;text-transform:uppercase;color:#8A93A5}
  .nodo .tit{font-weight:600;font-size:14.5px;line-height:1.3}
  .nodo .check{font-size:18px;color:var(--aprobado);font-weight:800}
  .volver{background:none;border:none;font-family:inherit;font-weight:600;font-size:14px;color:#5A6780;cursor:pointer;padding:6px 0;margin-bottom:8px}
  .contenido h2{font-size:23px;font-weight:800;margin-bottom:12px}
  .contenido p{margin-bottom:12px;font-size:15px}
  .puntos{margin:12px 0}
  .punto{background:var(--carta);border:1.5px solid var(--borde);border-radius:12px;padding:12px 14px;margin-bottom:9px;font-size:14.5px;box-shadow:var(--sombra);display:flex;gap:10px}
  .punto .b{color:var(--tinta);font-weight:800;flex-shrink:0}
  .ejemplo{background:#FFF9E3;border:1.5px solid #E8C22E;border-radius:12px;padding:13px 15px;font-size:14px;margin-top:14px}
  .ejemplo strong{display:block;font-size:11px;letter-spacing:.08em;text-transform:uppercase;margin-bottom:5px}
  .q-num{font-size:12px;font-weight:700;letter-spacing:.08em;color:#8A93A5;text-transform:uppercase;margin-bottom:6px}
  .q-texto{font-size:17px;font-weight:600;margin-bottom:16px;line-height:1.4}
  .opcion{display:block;width:100%;text-align:left;font-family:inherit;font-size:14.5px;color:var(--tinta);background:var(--carta);border:1.5px solid var(--borde);border-radius:12px;padding:13px 15px;margin-bottom:10px;cursor:pointer;box-shadow:var(--sombra)}
  .opcion:hover:not([disabled]){border-color:var(--tinta)}
  .opcion.correcta{background:var(--aprobado-claro);border-color:var(--aprobado);font-weight:600}
  .opcion.mal{background:var(--error-claro);border-color:var(--error)}
  .explic{border-radius:12px;padding:13px 15px;font-size:14px;margin:6px 0 14px;border:1.5px solid}
  .explic.bien{background:var(--aprobado-claro);border-color:var(--aprobado)}
  .explic.mal{background:var(--error-claro);border-color:var(--error)}
  .explic strong{display:block;margin-bottom:3px}
  .resultado{text-align:center;padding:26px 0 10px}
  .resultado .nota{font-family:'Bricolage Grotesque',sans-serif;font-weight:800;font-size:56px;line-height:1;display:inline-block;position:relative;padding:0 10px}
  .resultado .nota::before{content:"";position:absolute;left:0;right:0;bottom:6px;height:20px;background:var(--resaltador);z-index:-1;transform:rotate(-1.5deg)}
  .resultado p{margin-top:12px;font-size:15px}
  .cargando{text-align:center;padding:44px 20px}
  .lapiz{font-size:40px;display:inline-block;animation:escribir 1s ease-in-out infinite}
  @keyframes escribir{0%,100%{transform:rotate(-6deg) translateY(0)}50%{transform:rotate(6deg) translateY(-4px)}}
  .cargando p{margin-top:14px;font-weight:600;font-size:15px}
  .cargando .sub{margin-top:4px}
  .err{background:var(--error-claro);border:1.5px solid var(--error);border-radius:12px;padding:13px 15px;font-size:14px;margin-top:14px}
  .vacio{text-align:center;padding:36px 16px;color:#5A6780;font-size:14px}
  .vacio .emoji{font-size:44px;display:block;margin-bottom:10px}
  /* --- seguí acá (qué toca hoy) --- */
  .seguir-hoy{background:var(--tinta);color:var(--papel);border:none;border-radius:16px;padding:18px 20px;width:100%;text-align:left;cursor:pointer;font-family:inherit;box-shadow:0 3px 0 #0F1B33;display:flex;align-items:center;gap:14px;margin-top:14px}
  .seguir-hoy:active{transform:translateY(2px);box-shadow:0 1px 0 #0F1B33}
  .seguir-hoy .ico{font-size:30px;flex-shrink:0}
  .seguir-hoy .tx{flex:1;min-width:0}
  .seguir-hoy .et{font-family:'Bricolage Grotesque',sans-serif;font-size:11px;font-weight:800;letter-spacing:.1em;text-transform:uppercase;opacity:.7}
  .seguir-hoy .ti{font-family:'Bricolage Grotesque',sans-serif;font-weight:700;font-size:18px;line-height:1.2;margin-top:2px}
  .seguir-hoy .ma{font-size:12.5px;opacity:.75;margin-top:3px}
  .seguir-hoy .flecha{font-size:22px;opacity:.8}
  /* --- meta diaria --- */
  .meta-diaria{display:flex;align-items:center;gap:14px;background:var(--carta);border:1.5px solid var(--borde);border-radius:16px;padding:14px 16px;box-shadow:var(--sombra);margin-top:14px}
  .anillo{--p:0;width:52px;height:52px;flex-shrink:0;border-radius:50%;background:conic-gradient(var(--aprobado) calc(var(--p)*1%), #EDECE4 0);display:flex;align-items:center;justify-content:center;position:relative}
  .anillo::after{content:"";width:40px;height:40px;background:var(--carta);border-radius:50%;position:absolute}
  .anillo span{position:relative;z-index:1;font-family:'Bricolage Grotesque',sans-serif;font-weight:800;font-size:14px}
  .anillo.ok{--p:100}
  .meta-diaria .info{flex:1;min-width:0}
  .meta-diaria .info .t{font-weight:700;font-size:14.5px}
  .meta-diaria .info .s{font-size:12.5px;color:#5A6780;margin-top:1px}
  .meta-diaria .cfg{background:none;border:none;cursor:pointer;font-size:16px;color:#8A93A5;padding:4px}
  .meta-diaria.cumplida{background:var(--aprobado-claro);border-color:var(--aprobado)}
  .meta-editor{background:var(--carta);border:1.5px solid var(--borde);border-radius:16px;padding:16px;box-shadow:var(--sombra);margin-top:14px}
  .meta-editor .t{font-family:'Bricolage Grotesque',sans-serif;font-weight:700;font-size:15px;margin-bottom:3px}
  .meta-editor .s{font-size:12.5px;color:#5A6780;margin-bottom:12px}
  .chips{display:flex;gap:8px;flex-wrap:wrap}
  .chip{flex:1;min-width:60px;border:1.5px solid var(--borde);background:var(--papel);border-radius:12px;padding:12px 8px;text-align:center;cursor:pointer;font-family:inherit;transition:transform .1s ease}
  .chip:active{transform:scale(.96)}
  .chip .num{font-family:'Bricolage Grotesque',sans-serif;font-weight:800;font-size:22px;line-height:1}
  .chip .lbl{font-size:11px;color:#5A6780;margin-top:2px}
  .chip.sel{background:var(--tinta);border-color:var(--tinta);color:var(--papel)}
  .chip.sel .lbl{color:rgba(255,255,255,.8)}
  .acciones-pie{display:flex;gap:10px;margin-top:26px;flex-wrap:wrap}
  .acciones-pie .btn{margin-top:0;flex:1;min-width:130px}
  .banner-repaso{display:flex;align-items:center;gap:8px;background:#EEF3FF;border:1.5px solid #7FA0E0;border-radius:12px;padding:11px 14px;font-size:13.5px;margin-top:14px}
  .banner-repaso strong{font-weight:700}
  .banner-repaso button{margin-left:auto;background:var(--tinta);color:var(--papel);border:none;border-radius:8px;padding:6px 12px;font-family:inherit;font-weight:600;font-size:13px;cursor:pointer;flex-shrink:0}
  .btn.repaso-on{background:#3A5BA0;box-shadow:0 3px 0 #2A447D}
  /* --- cartel de logro desbloqueado --- */
  .cartel-logro{position:fixed;left:50%;top:24px;transform:translateX(-50%) translateY(-140%);z-index:100;display:flex;align-items:center;gap:14px;background:var(--tinta);color:var(--papel);border-radius:16px;padding:14px 18px;box-shadow:0 8px 28px rgba(0,0,0,.3);max-width:440px;width:calc(100% - 32px);cursor:pointer;animation:bajarLogro .5s cubic-bezier(.2,1.3,.4,1) forwards}
  .cartel-logro.saliendo{animation:subirLogro .35s ease-in forwards}
  @keyframes bajarLogro{to{transform:translateX(-50%) translateY(0)}}
  @keyframes subirLogro{to{transform:translateX(-50%) translateY(-140%)}}
  .cartel-logro .cl-emoji{font-size:34px;flex-shrink:0;animation:latir 1s ease-in-out infinite}
  @keyframes latir{0%,100%{transform:scale(1)}50%{transform:scale(1.15)}}
  .cartel-logro .cl-tx{flex:1;min-width:0}
  .cartel-logro .cl-et{font-family:'Bricolage Grotesque',sans-serif;font-size:10.5px;font-weight:800;letter-spacing:.12em;text-transform:uppercase;color:var(--resaltador)}
  .cartel-logro .cl-no{font-family:'Bricolage Grotesque',sans-serif;font-weight:700;font-size:17px;line-height:1.2;margin-top:1px}
  .cartel-logro .cl-de{font-size:12.5px;opacity:.75;margin-top:2px}
  /* --- grilla de logros --- */
  .logros-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(140px,1fr));gap:10px;margin-top:14px}
  .logro-card{background:var(--papel);border:1.5px solid var(--borde);border-radius:14px;padding:14px 12px;text-align:center}
  .logro-card.ganado{background:var(--carta);border-color:var(--aprobado);box-shadow:var(--sombra)}
  .logro-card .lc-emoji{font-size:32px;display:block;filter:grayscale(1);opacity:.35}
  .logro-card.ganado .lc-emoji{filter:none;opacity:1}
  .logro-card .lc-no{font-family:'Bricolage Grotesque',sans-serif;font-weight:700;font-size:13.5px;margin-top:6px}
  .logro-card .lc-de{font-size:11.5px;color:#5A6780;margin-top:3px;line-height:1.35}
  .logro-card .lc-fe{font-size:10.5px;color:var(--aprobado);font-weight:700;margin-top:5px}
  .logros-resumen{display:flex;align-items:center;gap:12px;background:var(--carta);border:1.5px solid var(--borde);border-radius:16px;padding:14px 16px;box-shadow:var(--sombra);margin-top:14px;cursor:pointer;width:100%;text-align:left;font-family:inherit;color:var(--tinta)}
  .logros-resumen .lr-ico{font-size:26px}
  .logros-resumen .lr-tx{flex:1}
  .logros-resumen .lr-t{font-weight:700;font-size:14.5px}
  .logros-resumen .lr-s{font-size:12.5px;color:#5A6780;margin-top:1px}
  .logros-resumen .lr-fl{font-size:18px;opacity:.5}
  .codigo-box{background:var(--papel);border:1.5px solid var(--borde);border-radius:12px;padding:12px;font-family:ui-monospace,monospace;font-size:11px;word-break:break-all;max-height:120px;overflow-y:auto;color:#5A6780;margin-top:10px}
  .info-cuota{background:#EEF3FF;border:1.5px solid #7FA0E0;border-radius:12px;padding:13px 15px;font-size:13px;margin-top:12px;line-height:1.45}
  .info-cuota strong{display:block;margin-bottom:4px}

/* =========================================================
   COMPARTIR MATERIAS
   Exporta plan + apuntes + contenido ya generado.
   Quien lo importa NO gasta cuota en regenerar nada.

function bytesABase64(bytes){
  let bin='';
  const chunk=8192;
  for(let i=0;i<bytes.length;i+=chunk){
    bin+=String.fromCharCode.apply(null, bytes.subarray(i,i+chunk));
  }
  return btoa(bin).replace(/\+/g,'-').replace(/\//g,'_').replace(/=+$/,'');
}
function base64ABytes(txt){
  let b=txt.trim().replace(/-/g,'+').replace(/_/g,'/');
  while(b.length%4) b+='=';
  const bin=atob(b);
  const bytes=new Uint8Array(bin.length);
  for(let i=0;i<bin.length;i++) bytes[i]=bin.charCodeAt(i);
  return bytes;
}
// comprime con gzip nativo del navegador: un código de 20k caracteres queda en ~600
async function codificar(obj){
  const json=JSON.stringify(obj);
  const datos=new TextEncoder().encode(json);
  if(typeof CompressionStream==='undefined'){
    return 'R0_'+bytesABase64(datos);   // sin compresión (navegador viejo)
  }
  const cs=new CompressionStream('gzip');
  const w=cs.writable.getWriter();
  w.write(datos); w.close();
  const comprimido=new Uint8Array(await new Response(cs.readable).arrayBuffer());
  return 'R1_'+bytesABase64(comprimido);
}
async function decodificar(txt){
  const t=txt.trim();
  if(t.startsWith('R0_')){
    return JSON.parse(new TextDecoder().decode(base64ABytes(t.slice(3))));
  }
  if(!t.startsWith('R1_')) throw new Error('El código no tiene el formato de EstudioTrack');
  const bytes=base64ABytes(t.slice(3));
  const ds=new DecompressionStream('gzip');
  const w=ds.writable.getWriter();
  w.write(bytes); w.close();
  const json=await new Response(ds.readable).text();
  return JSON.parse(json);
}

async function exportarMateria(mid){

}

async function importarMateria(codigo){

  materias.push(m);

}

}

async function importarPerfil(codigo, modo){
  const p=await decodificar(codigo);
  if(!p||p.tipo!=='perfil') throw new Error('Ese código no es un respaldo de perfil (¿será el de una materia suelta?)');

  if(modo==='reemplazar'){
    // borrar lo que hay antes de restaurar
    materias.forEach(m=>st.del('et:m:'+m.id));
    materias=[];
  }

  // traer materias, evitando pisar ids existentes
  const existentes=new Set(materias.map(m=>m.id));
  (p.materias||[]).forEach(m=>{
    let id=m.id;
    if(existentes.has(id)) id='m'+Date.now()+Math.floor(Math.random()*1000);
    const d=(p.datos||{})[m.id];
    if(!d) return;
    materias.push({...m, id});
    guardarMateria(id, d);
    existentes.add(id);
  });
  J.set('et:materias',materias);

  // racha, logros y meta: quedarse con lo mejor de cada uno
  if(p.racha && (p.racha.dias||0) > (racha.dias||0)){ racha=p.racha; J.set('et:racha',racha); }
  if(p.logros){ logros={...logros, ...p.logros}; J.set('et:logros',logros); }
  if(p.meta && modo==='reemplazar'){ metaDiaria=p.meta; J.set('et:meta',metaDiaria); }

  // clave de API (solo si venía incluida y acá no hay ninguna)
  if(p.clave && !clavePropia){ clavePropia=p.clave; st.set('et:key',clavePropia); }

  return (p.materias||[]).length;
}

let vista = {tipo:'inicio'};

function datosMateria(id){ return J.get('et:m:'+id, null); }
function guardarMateria(id, datos){ J.set('et:m:'+id, datos); }
function borrarMateria(id){

function hayMotor(){ return !!clavePropia || !!BACKEND_URL; }
function tieneClavePropia(){ return !!clavePropia; }

/* =========================================================
   MOTOR DE IA
   Orden: 1) worker compartido  2) clave propia (plan B)
   ========================================================= */
// Flash-Lite tiene la cuota gratuita más alta; se prueba primero.
// IMPORTANTE: nombres EXPLÍCITOS, nunca aliases "latest".
// Los alias resuelven al modelo más nuevo (Flash 3.5 = $1.50/$9 por millón),
// que es 20x más caro que Flash-Lite ($0.10/$0.40). Para esta app, Flash-Lite sobra.
const MODELOS = [
  'gemini-3.1-flash-lite',        // el Flash-Lite vigente: $0.25 in / $1.50 out
  'gemini-2.5-flash-lite',        // más barato aún, pero retirado para cuentas nuevas
  'gemini-3-flash-lite',          // variante alternativa
  'gemini-2.5-flash'              // respaldo viejo
];
// NUNCA usar aliases 'latest': resuelven al modelo más nuevo (Flash 3.5),
// que cuesta $1.50/$9 por millón — 6 veces más caro que Flash-Lite.
let modeloActivo = st.get('et:modelo') || MODELOS[0];
// Forzar el modelo económico: descartar aliases 'latest' (resuelven al Flash caro)
// y cualquier modelo que ya no esté en la lista vigente.
if(!MODELOS.includes(modeloActivo) || /latest/.test(modeloActivo) || !/lite/.test(modeloActivo)){
  modeloActivo=MODELOS[0];
  st.set('et:modelo',modeloActivo);
}

async function llamadaCruda(via, modelo, partes, generationConfig){
  // Gemini espera contents:[{parts:[...]}] — las partes van envueltas
  const contents=[{parts:partes}];
  let res;
  if(via==='backend'){
    res = await fetch(BACKEND_URL, {
      method:'POST',
      headers:{'Content-Type':'application/json'},
      body:JSON.stringify({model:modelo, contents, generationConfig})
    });
  }else{
    res = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/${modelo}:generateContent`,{
      method:'POST',
      headers:{'Content-Type':'application/json','x-goog-api-key':clavePropia.trim()},
      body:JSON.stringify({contents, generationConfig})
    });
  }
  const data = await res.json().catch(()=>({error:{message:'Respuesta ilegible (HTTP '+res.status+')'}}));
  if(data.error){
    const msg = data.error.message||'Error de la API';
    if(res.status===429){
      const detalles=JSON.stringify(data.error.details||[]);
      const esDiario = /per day|PerDay|RPD|GenerateRequestsPerDay/i.test(msg+detalles);
      const err=new Error(esDiario ? 'LIMITE_DIA' : 'LIMITE');
      err.crudo = msg + ' || ' + detalles;   // mensaje textual de Google, para el diagnóstico
      err.http = res.status;
      throw err;
    }
    const mkErr=(code)=>{ const e=new Error(code); e.crudo=msg; e.http=res.status; return e; };
    if(res.status===503 || /overloaded|high demand|UNAVAILABLE/i.test(msg)) throw mkErr('SATURADO');
    if(res.status===403 || /permission/i.test(msg)) throw mkErr('SIN_PERMISO');
    if(res.status===400 && /API key/i.test(msg)) throw mkErr('CLAVE_INVALIDA');
    if(res.status===404) throw mkErr('MODELO_404');
    throw mkErr(msg);
  }
  const texto = (data.candidates?.[0]?.content?.parts||[]).map(p=>p.text||'').join('');
  if(!texto) throw new Error('Respuesta vacía de la IA');
  return texto;
}

// prueba modelos alternativos si el activo devuelve 404 (nombres cambian con el tiempo)
async function llamadaConModelos(via, contents, generationConfig){
  const candidatos=[modeloActivo, ...MODELOS.filter(m=>m!==modeloActivo)];
  let ultimoErr;
  for(const modelo of candidatos){
    try{
      const r = await llamadaCruda(via, modelo, contents, generationConfig);
      if(modelo!==modeloActivo){modeloActivo=modelo;st.set('et:modelo',modelo);}
      return r;
    }catch(e){
      ultimoErr=e;
      // Probar el siguiente modelo si: no existe (404), está saturado, o
      // ESE modelo puntual está limitado en este proyecto (429).
      // Otros errores (clave inválida, sin permiso) sí cortan: cambiar de modelo no ayuda.
      if(e.message==='MODELO_404'||e.message==='SATURADO'||e.message==='LIMITE'||e.message==='LIMITE_DIA'){
        continue;
      }
      throw e;
    }
  }
  throw ultimoErr||new Error('Ningún modelo disponible');
}

// capa principal: backend primero, clave propia como plan B, reintento en 429
async function gemini(contents, generationConfig){
  const vias=[];
  if(clavePropia) vias.push('propia');      // la clave del usuario va primero (su cuota es solo suya)
  if(BACKEND_URL) vias.push('backend');     // el motor compartido queda como respaldo
  if(!vias.length) throw new Error('SIN_MOTOR');

  let errPropia=null, ultimoErr=null;
  for(const via of vias){
    for(let intento=0;intento<2;intento++){
      try{
        return await llamadaConModelos(via, contents, generationConfig);
      }catch(e){
        ultimoErr=e;
        if(via==='propia') errPropia=e;     // guardar el error REAL de la clave del usuario
        if(e.message==='LIMITE'){
          if(intento===0){ await new Promise(r=>setTimeout(r,5000)); continue; }
          break;
        }
        if(e.message==='CLAVE_INVALIDA'||e.message==='SIN_PERMISO'){ break; }
        if(intento===0){ await new Promise(r=>setTimeout(r,1200)); continue; }
        break;
      }
    }
  }
  // Si el usuario tiene clave propia, mostrar SU error (no el del worker compartido),
  // que es el único que puede accionar.
  throw (errPropia || ultimoErr);
}

function parsearJSON(texto){
  const limpio = texto.replace(/```json|```/g,'').trim();
  const ini = limpio.indexOf('{');
  if(ini===-1) throw new Error('Respuesta sin JSON');

  // 1) intento directo
  const cuerpo = limpio.slice(ini, limpio.lastIndexOf('}')+1);
  try{ return JSON.parse(cuerpo); }catch(e){}

  // 2) La respuesta vino cortada (típico al pedir muchas preguntas).
  //    Recorro el texto y me quedo con el ÚLTIMO punto donde el JSON estaba sano,
  //    descartando el objeto incompleto del final.
  const s = limpio.slice(ini);
  const pila=[];
  let enStr=false, escp=false;
  let cortes=[];   // posiciones donde se cerró un objeto dentro de un array
  for(let i=0;i<s.length;i++){
    const ch=s[i];
    if(escp){ escp=false; continue; }
    if(ch==='\\'){ escp=true; continue; }
    if(ch==='"'){ enStr=!enStr; continue; }
    if(enStr) continue;
    if(ch==='{'||ch==='['){ pila.push(ch); }
    else if(ch==='}'||ch===']'){
      pila.pop();
      // si al cerrar quedamos dentro de un array, este es un elemento completo
      if(ch==='}' && pila.length && pila[pila.length-1]==='[') cortes.push(i);
    }
  }

  // reconstruir cerrando en el último elemento completo del array
  if(cortes.length){
    const fin=cortes[cortes.length-1];
    let recon=s.slice(0,fin+1);
    // cerrar lo que haya quedado abierto (arrays y objetos externos)
    const pila2=[]; let e2=false, s2=false;
    for(const ch of recon){
      if(s2){ if(e2){e2=false;continue;} if(ch==='\\'){e2=true;continue;} if(ch==='"'){s2=false;} continue; }
      if(ch==='"'){ s2=true; continue; }
      if(ch==='{') pila2.push('}');
      else if(ch==='[') pila2.push(']');
      else if(ch==='}'||ch===']') pila2.pop();
    }
    while(pila2.length) recon+=pila2.pop();
    try{ return JSON.parse(recon); }catch(e){}
  }

  throw new Error('La IA devolvió una respuesta cortada. Probá de nuevo.');
}

async function iaJSON(prompt, maxTokens, sinJsonMime, temp){
  const cfg={temperature:(typeof temp==='number'?temp:0.4), maxOutputTokens:maxTokens||3072};
  if(!sinJsonMime) cfg.responseMimeType='application/json';
  const texto = await gemini([{text:prompt}], cfg);
  return parsearJSON(texto);
}

function mensajeError(e){
  const m=e.message||'';
  if(m==='LIMITE_DIA') return 'Se te acabó la cuota gratuita de Gemini por hoy. Se renueva a la madrugada (medianoche hora del Pacífico). Mañana podés seguir.';
  if(m==='LIMITE') return 'Gemini te frenó por límite de uso. Esperá un minuto y reintentá. Si sigue igual, es que se agotó tu cuota gratuita del día: se renueva a la madrugada.';
  if(m==='SATURADO') return 'Los servidores de Google están saturados en este momento. No es tu clave: probá de nuevo en un rato.';
  if(m==='CLAVE_INVALIDA') return 'Esa clave no es válida. Fijate de copiarla completa desde aistudio.google.com/apikey (empieza con "AIza" o "AQ.").';
  if(m==='SIN_PERMISO') return 'Tu clave no tiene permiso para usar Gemini. Suele pasar con claves recién creadas: esperá unos minutos, o creá una nueva en aistudio.google.com/apikey.';
  if(m==='SIN_MOTOR') return 'Todavía no cargaste tu clave gratuita de Gemini. Entrá a Ajustes (⚙️) y seguí los 2 pasos.';
  return m||'Error desconocido';
}

/* ---------- sanitización ---------- */
function sanitizarTexto(txt){
  return (txt||'')
    .replace(/[\u0000-\u0008\u000B-\u001F\u007F]/g,' ')
    .replace(/[\uD800-\uDFFF]/g,'')
    .replace(/[ \t]{3,}/g,'  ')
    .replace(/\n{4,}/g,'\n\n\n');
}
// Extrae del material la porción relevante a una unidad (evita mandar TODO en cada pedido).
// Busca las palabras clave del título/temas y devuelve el fragmento alrededor.
function fragmentoRelevante(apuntes, unidad, maxChars=18000){
  if(!apuntes || apuntes.length<=maxChars) return apuntes;
  const claves=[];
  claves.push(unidad.titulo||'');
  (unidad.nodos||[]).forEach(n=>{ claves.push(n.titulo||''); claves.push(n.temas||''); });
  const palabras=claves.join(' ')
    .toLowerCase().normalize('NFD').replace(/[\u0300-\u036f]/g,'')
    .split(/[^a-z0-9]+/)
    .filter(w=>w.length>4);              // palabras significativas
  if(!palabras.length) return apuntes.slice(0,maxChars);

  const texto=apuntes.toLowerCase().normalize('NFD').replace(/[\u0300-\u036f]/g,'');
  // puntuar bloques del material según cuántas palabras clave contienen
  const BLOQUE=3000;
  const bloques=[];
  for(let i=0;i<apuntes.length;i+=BLOQUE){
    const trozo=texto.slice(i,i+BLOQUE);
    let puntos=0;
    palabras.forEach(p=>{ if(trozo.includes(p)) puntos++; });
    bloques.push({i, puntos});
  }
  bloques.sort((a,b)=>b.puntos-a.puntos);
  const elegidos=bloques.slice(0, Math.ceil(maxChars/BLOQUE)).sort((a,b)=>a.i-b.i);
  if(!elegidos.length || elegidos[0].puntos===0) return apuntes.slice(0,maxChars);
  return elegidos.map(b=>apuntes.slice(b.i,b.i+BLOQUE)).join('\n[...]\n');
}

function recortar(txt, max=120000){
  txt = sanitizarTexto(txt);
  return txt.length>max ? txt.slice(0,max)+'\n[apuntes recortados]' : txt;
}

/* ---------- lectura de archivos ---------- */
if(window.pdfjsLib){
  pdfjsLib.GlobalWorkerOptions.workerSrc='https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js';
}
function leerComoBase64(file){
  return new Promise((res,rej)=>{
    const r=new FileReader();
    r.onload=()=>res(r.result.split(',')[1]);
    r.onerror=()=>rej(new Error('No se pudo leer el archivo'));
    r.readAsDataURL(file);
  });
}
async function extraerPDF(file){
  const buf=await file.arrayBuffer();
  const pdf=await pdfjsLib.getDocument({data:buf}).promise;
  let texto='';
  const maxPag=Math.min(pdf.numPages,50);
  for(let i=1;i<=maxPag;i++){
    const pag=await pdf.getPage(i);
    const cont=await pag.getTextContent();
    texto+=cont.items.map(it=>it.str).join(' ')+'\n';
  }
  return texto.trim();
}
async function extraerDocx(file){
  const buf=await file.arrayBuffer();
  const res=await mammoth.extractRawText({arrayBuffer:buf});
  return res.value.trim();
}
async function extraerPptx(file){
  const zip=await JSZip.loadAsync(await file.arrayBuffer());
  // texto de un XML de PowerPoint: los runs de texto son <a:t>...</a:t>
  const textoDeXml=xml=>{
    const runs=[...xml.matchAll(/<a:t[^>]*>([^<]*)<\/a:t>/g)].map(m=>m[1]);
    return runs.join(' ').replace(/\s+/g,' ').trim();
  };
  // ordenar slides numéricamente (slide1, slide2, ... slide10)
  const numDe=ruta=>parseInt((ruta.match(/(\d+)\.xml$/)||[])[1]||0,10);
  const slides=Object.keys(zip.files)
    .filter(r=>/^ppt\/slides\/slide\d+\.xml$/.test(r))
    .sort((a,b)=>numDe(a)-numDe(b));
  if(!slides.length) throw new Error('El PowerPoint no tiene diapositivas legibles');
  const notas=Object.keys(zip.files)
    .filter(r=>/^ppt\/notesSlides\/notesSlide\d+\.xml$/.test(r))
    .sort((a,b)=>numDe(a)-numDe(b));
  const mapaNotas={};
  for(const r of notas){
    mapaNotas[numDe(r)]=textoDeXml(await zip.files[r].async('string'));
  }
  let texto='';
  for(const r of slides){
    const n=numDe(r);
    const t=textoDeXml(await zip.files[r].async('string'));
    if(t) texto+=`[Diapositiva ${n}] ${t}\n`;
    const nota=mapaNotas[n];
    if(nota&&nota.length>10) texto+=`[Notas ${n}] ${nota}\n`;
  }
  return texto.trim();
}
function extraerTextoPlano(file){
  return new Promise((res,rej)=>{
    const r=new FileReader();
    r.onload=()=>res(r.result.trim());
    r.onerror=()=>rej(new Error('No se pudo leer'));
    r.readAsText(file);
  });
}
async function extraerImagen(file){
  const b64=await leerComoBase64(file);
  const t = await gemini(
    [{inline_data:{mime_type:file.type,data:b64}},
     {text:'Transcribí TODO el texto de estos apuntes tal cual está, sin comentarios ni formato extra. Solo el texto.'}],
    {temperature:0.1, maxOutputTokens:4096}
  );
  const limpio=t.trim();
  if(!limpio) throw new Error('No pude leer texto en la foto');
  return limpio;
}
async function procesarArchivo(file){
  const item={nombre:file.name,texto:'',estado:'leyendo',msg:''};
  archivosSubidos.push(item);
  pintarArchivos();
  try{
    const nom=file.name.toLowerCase();
    if(file.type==='application/pdf'||nom.endsWith('.pdf')) item.texto=await extraerPDF(file);
    else if(nom.endsWith('.docx')) item.texto=await extraerDocx(file);
    else if(nom.endsWith('.pptx')) item.texto=await extraerPptx(file);
    else if(nom.endsWith('.ppt')) throw new Error('Formato .ppt viejo: guardalo como .pptx y volvé a subirlo');
    else if(file.type.startsWith('image/')){
      if(!hayMotor()) throw new Error('Falta motor de IA para transcribir fotos');
      item.texto=await extraerImagen(file);
    }
    else if(file.type.startsWith('text/')||nom.endsWith('.txt')||nom.endsWith('.md')) item.texto=await extraerTextoPlano(file);
    else throw new Error('Formato no soportado');
    if(!item.texto||item.texto.length<20) throw new Error('No encontré texto legible');
    item.estado='ok';
  }catch(e){
    item.estado='error';
    item.msg=e.message==='LIMITE'?'Límite por minuto: reintentá':e.message||'Error al leer';
  }
  pintarArchivos();
}
function textoDeArchivos(){
  return archivosSubidos.filter(a=>a.estado==='ok').map(a=>`--- ${a.nombre} ---\n${a.texto}`).join('\n\n');
}
function pintarArchivos(){
  const cont=document.getElementById('lista-archivos');
  if(!cont) return;
  cont.innerHTML=archivosSubidos.map((a,i)=>`
    <div class="archivo">
      ${a.estado==='ok'?'<span class="ok-a">✓</span>':a.estado==='error'?'<span class="err-a">✗</span>':'<span>⏳</span>'}
      <span>${esc(a.nombre)}</span>
      ${a.estado==='leyendo'?'<span class="estado-a">leyendo…</span>':''}
      ${a.estado==='ok'?`<span class="estado-a">${(a.texto.length/1000).toFixed(1)}k caracteres</span>`:''}
      ${a.estado==='error'?`<span class="estado-a">${esc(a.msg)}</span>`:''}
      ${a.estado!=='leyendo'?`<button class="quitar" data-i="${i}" aria-label="Quitar">✕</button>`:''}
    </div>`).join('');
  cont.querySelectorAll('.quitar').forEach(b=>{
    b.onclick=()=>{archivosSubidos.splice(+b.dataset.i,1);pintarArchivos();};
  });
}

function nodosPlanos(datos){
  const lista=[];
  datos.plan.unidades.forEach((u,ui)=>u.nodos.forEach((n,ni)=>lista.push({...n,id:`${ui}-${ni}`})));

function diasRestantes(fecha){
  const hoy=new Date();hoy.setHours(0,0,0,0);
  const f=new Date(fecha+'T00:00:00');
  return Math.max(0,Math.round((f-hoy)/86400000));
}
function hoyISO(){ return new Date().toISOString().slice(0,10); }
function marcarRacha(){
  const hoy=hoyISO();
  // contar el nodo del día (para la meta diaria) siempre
  if(metaDiaria.dia!==hoy){ metaDiaria.dia=hoy; metaDiaria.hechos=0; }
  metaDiaria.hechos++;
  J.set('et:meta',metaDiaria);
  // la racha se incrementa una vez por día
  if(racha.ultima===hoy) return;
  const ayer=new Date(Date.now()-86400000).toISOString().slice(0,10);
  racha.dias=(racha.ultima===ayer)?racha.dias+1:1;
  racha.ultima=hoy;
  J.set('et:racha',racha);
}
function metaHoy(){
  const hoy=hoyISO();
  const hechos = metaDiaria.dia===hoy ? metaDiaria.hechos : 0;
  return {hechos, objetivo:metaDiaria.objetivo||2, cumplida:hechos>=(metaDiaria.objetivo||2)};
}

// normaliza para comparar preguntas (ignora tildes, mayúsculas y puntuación)
function normQ(t){
  return (t||'').toLowerCase()
    .normalize('NFD').replace(/[\u0300-\u036f]/g,'')
    .replace(/[^a-z0-9 ]/g,' ').replace(/\s+/g,' ').trim();
}
// filtra las preguntas que ya se usaron antes
function quitarRepetidas(preguntas, usadasStr){
  if(!usadasStr) return preguntas;
  const usadas=new Set(usadasStr.split(' | ').map(normQ).filter(Boolean));
  return preguntas.filter(p=>!usadas.has(normQ(p.q)));
}

// Descarta preguntas incompletas (opciones vacías, faltantes o índice inválido)
function limpiarPreguntas(preguntas){
  if(!Array.isArray(preguntas)) return [];
  return preguntas.filter(p=>{
    if(!p||typeof p.q!=='string'||!p.q.trim()) return false;
    if(!Array.isArray(p.opciones)) return false;
    const ops=p.opciones.filter(o=>typeof o==='string'&&o.trim());
    if(ops.length<3) return false;                 // al menos 3 opciones válidas
    if(ops.length!==p.opciones.length) return false; // alguna vino vacía -> descartar
    if(typeof p.correcta!=='number'||p.correcta<0||p.correcta>=p.opciones.length) return false;
    return true;
  });
}

function barajar(preguntas){
  const mezcla=[...preguntas].sort(()=>Math.random()-.5);
  return mezcla.map(p=>{
    const idx=p.opciones.map((_,i)=>i).sort(()=>Math.random()-.5);
    return{q:p.q,opciones:idx.map(i=>p.opciones[i]),correcta:idx.indexOf(p.correcta),explicacion:p.explicacion};
  });
}

    metaHTML=`<div class="meta-diaria ${mh.cumplida?'cumplida':''}">
      <div class="anillo ${mh.cumplida?'ok':''}" style="--p:${p}"><span>${mh.hechos}/${mh.objetivo}</span></div>
      <div class="info">
        <div class="t">${mh.cumplida?'¡Meta del día cumplida! 🎉':'Meta de hoy'}</div>
        <div class="s">${mh.cumplida?'Seguí sumando si querés, ya cumpliste.':`Completá ${mh.objetivo-mh.hechos} nodo${(mh.objetivo-mh.hechos)===1?'':'s'} más hoy`}</div>
      </div>
      <button class="cfg" id="cfg-meta" title="Cambiar meta">⚙️</button>
    </div>`;
    if(editandoMeta){
      const obj=mh.objetivo;
      const ops=[{n:1,l:'tranqui'},{n:2,l:'normal'},{n:3,l:'a full'},{n:5,l:'crack'}];
      metaHTML+=`<div class="meta-editor">
        <div class="t">¿Cuántos nodos por día?</div>
        <div class="s">Cada lección o quiz completado suma uno.</div>
        <div class="chips">
          ${ops.map(o=>`<button class="chip ${o.n===obj?'sel':''}" data-meta="${o.n}"><div class="num">${o.n}</div><div class="lbl">${o.l}</div></button>`).join('')}
        </div>
      </div>`;
    }
  }
  const nGanados=CATALOGO_LOGROS.filter(l=>tieneLogro(l.id)).length;
  const ultimos=CATALOGO_LOGROS.filter(l=>tieneLogro(l.id)).slice(-3).map(l=>l.emoji).join(' ');
  const logrosHTML=materias.length?`<button class="logros-resumen" id="ver-logros">
      <span class="lr-ico">🏆</span>
      <span class="lr-tx">
        <span class="lr-t">Logros</span>
        <span class="lr-s">${nGanados} de ${CATALOGO_LOGROS.length} desbloqueados ${ultimos}</span>
      </span>
      <span class="lr-fl">→</span>
    </button>`:'';
  $app.innerHTML=`
    ${marcaHTML()}
    ${seguirHTML}
    ${metaHTML}
    ${logrosHTML}
    <div class="card">
      <h2>Tus materias</h2>
      <p class="sub">Tocá una para seguir el camino donde lo dejaste.</p>
      ${lista}
      <button class="btn" id="nueva">+ Nueva materia</button>
      <button class="btn sec" id="importar-btn">📥 Importar materia de un compañero</button>
    </div>
    ${!tieneClavePropia()?`<button class="aviso-clave" id="ir-clave">
        <span class="ac-ico">🔑</span>
        <span class="ac-tx"><strong>Activá tu IA gratis (2 min)</strong><br>Cargá tu clave de Google Gemini para tener tu propia cuota diaria.</span>
        <span class="ac-fl">→</span>
      </button>`:''}`;
  wireMarca();
  const ib=document.getElementById('importar-btn');
  if(ib) ib.onclick=()=>{ vista={tipo:'importar'}; render(); };
  const vl=document.getElementById('ver-logros');
  if(vl) vl.onclick=()=>{ vista={tipo:'logros'}; render(); };
  const ic=document.getElementById('ir-clave');
  if(ic) ic.onclick=()=>{ vista={tipo:'ajustes',volver:{tipo:'inicio'}}; render(); };
  const sh=document.getElementById('seguir-hoy');
  if(sh) sh.onclick=()=>{ vista={tipo:'camino',id:prox.materia.id}; render(); };
  const cm=document.getElementById('cfg-meta');
  if(cm) cm.onclick=()=>{ editandoMeta=!editandoMeta; render(); };
  document.querySelectorAll('.chip[data-meta]').forEach(c=>{
    c.onclick=()=>{ setObjetivoMeta(+c.dataset.meta); editandoMeta=false; render(); };
  });
  document.getElementById('nueva').onclick=()=>{
    if(!hayMotor()){vista={tipo:'ajustes',volver:{tipo:'nueva'}};render();return;}
    archivosSubidos=[];
    vista={tipo:'nueva'};render();
  };
  $app.querySelectorAll('.materia-item').forEach(b=>{
    b.onclick=()=>{vista={tipo:'camino',id:b.dataset.id};render();};
  });
}

/* ---------- ajustes ---------- */
function renderAjustes(err){
  const _w=document.querySelector('.wrap'); if(_w){_w.classList.remove('split');_w.classList.remove('camino-solo');}
  const volver=vista.volver||{tipo:'inicio'};
  const tiene=tieneClavePropia();
  const estado = tiene
    ? `<div class="estado-motor"><span class="punto-v"></span><span><strong>Tu clave está activa.</strong> Tenés tu propia cuota gratuita de Gemini, sin compartirla con nadie.</span></div>`
    : `<div class="estado-motor"><span class="punto-a"></span><span><strong>Todavía no cargaste tu clave.</strong> Es gratis, tarda 2 minutos y te da tu propia cuota diaria. Seguí los pasos de abajo.</span></div>`;
  $app.innerHTML=`
    ${marcaHTML()}
    <div class="card">
      <h2>Tu clave de IA (gratis)</h2>
      <p class="sub">EstudioTrack usa Google Gemini. Cada uno usa su propia clave gratuita: así nadie se queda sin cuota.</p>
      ${estado}
      <div class="pasos" style="margin-top:18px">
        <div class="paso"><span class="n">1</span><span>Entrá a <strong>aistudio.google.com/apikey</strong> e iniciá sesión con tu cuenta de Google (es gratis, <strong>no pide tarjeta</strong>).</span></div>
        <div class="paso"><span class="n">2</span><span>Tocá <strong>"Crear clave de API"</strong> y después <strong>"Copiar clave"</strong>.</span></div>
        <div class="paso"><span class="n">3</span><span>Pegala acá abajo y tocá Guardar. Listo, ya podés estudiar.</span></div>
      </div>
      <label for="clave">Pegá tu clave acá</label>
      <input id="clave" type="password" placeholder="AIza… o AQ.…" value="${esc(clavePropia)}">
      <p class="hint">Se guarda solo en este dispositivo, nadie más la ve. En el plan gratuito, Google puede usar lo que envíes para mejorar sus modelos: no subas nada privado.</p>
      <div class="info-cuota">
        <strong>📊 Cómo funciona la cuota gratuita</strong>
        Tu clave tiene un límite de pedidos por día (depende de tu cuenta de Google). La app consume 1 pedido al armar el camino y 1 por cada unidad que abrís, así que rinde bastante. Si se te acaba, se renueva a la madrugada.<br><br>
        <strong>Truco:</strong> si un compañero ya armó la materia, que te pase el código con "Compartir" — te llega con el contenido hecho y <strong>no gastás nada de tu cuota</strong>.
      </div>
      <div id="err-clave">${err?`<div class="err">${esc(err)}</div>`:''}</div>
      <button class="btn" id="guardar">Guardar y probar</button>
      ${tiene?'<button class="btn sec" id="quitar-clave">Quitar mi clave</button>':''}
      ${tiene?`<p class="hint" style="margin-top:12px">⚙️ Modelo en uso: <strong>${esc(modeloActivo)}</strong>${/lite/.test(modeloActivo)?' <span style="color:var(--aprobado)">(económico ✓)</span>':' <span style="color:var(--error)">(¡ojo, este es caro!)</span>'}</p>`:''}
      ${tiene?'<button class="btn sec" id="diagnostico">🔍 Probar qué modelos funcionan</button>':''}
      <div id="salida-diag"></div>
      <hr style="border:none;border-top:1.5px solid var(--borde);margin:22px 0">
      <button class="btn sec" id="ir-respaldo">📦 Pasar mis datos a otro dispositivo</button>
      <button class="btn sec" id="cancelar">Volver</button>
    </div>`;
  wireMarca();
  document.getElementById('cancelar').onclick=()=>{vista=volver;render();};
  const dg=document.getElementById('diagnostico');
  if(dg) dg.onclick=async ()=>{
    const out=document.getElementById('salida-diag');
    dg.disabled=true; dg.textContent='Probando…';
    out.innerHTML='<p class="hint">Probando cada modelo con tu clave…</p>';
    const lineas=[];
    for(const modelo of MODELOS){
      try{
        await llamadaCruda('propia', modelo, [{text:'Decí solo: ok'}], {maxOutputTokens:20});
        lineas.push(`<div style="color:var(--aprobado);font-weight:600">✓ ${modelo} — funciona</div>`);
      }catch(e){
        const detalle = e.crudo ? e.crudo : (e.message||'');
        lineas.push(`<div style="color:var(--error);margin-bottom:8px">✗ <strong>${modelo}</strong> (HTTP ${e.http||'?'})<br><span style="font-size:11.5px;font-family:ui-monospace,monospace;word-break:break-all">${esc(String(detalle).slice(0,500))}</span></div>`);
      }
    }
    out.innerHTML=`<div class="codigo-box" style="font-family:inherit;font-size:13px;max-height:none">${lineas.join('')}</div>`;
    dg.disabled=false; dg.textContent='🔍 Probar qué modelos funcionan';
  };
  const irb=document.getElementById('ir-respaldo');
  if(irb) irb.onclick=()=>{vista={tipo:'respaldo'};render();};
  const q=document.getElementById('quitar-clave');
  if(q) q.onclick=()=>{clavePropia='';st.del('et:key');renderAjustes();};
  document.getElementById('guardar').onclick=async ()=>{
    const btn=document.getElementById('guardar');
    const k=document.getElementById('clave').value.trim();
    if(!k){
      document.getElementById('err-clave').innerHTML='<div class="err">Pegá tu clave primero. Seguí los 3 pasos de arriba.</div>';
      return;
    }
    clavePropia=k;
    st.set('et:key',k);              // guardar SIEMPRE: si la prueba falla, igual queda cargada
    btn.disabled=true;btn.textContent='Probando…';
    try{
      await llamadaConModelos('propia',[{text:'Respondé solo con este JSON: {"ok":true}'}],{maxOutputTokens:50});
      vista=volver;render();
    }catch(e){
      btn.disabled=false;btn.textContent='Guardar y probar';
      document.getElementById('err-clave').innerHTML=`<div class="err"><strong>Tu clave quedó guardada</strong>, pero la prueba falló: ${esc(mensajeError(e))}<br><br>Podés tocar "🔍 Probar qué modelos funcionan" para ver el detalle.</div>`;
      // re-render para que aparezca el botón de diagnóstico
      const dgBtn=document.getElementById('diagnostico');
      if(!dgBtn) renderAjustes(null);
    }
  };
}

/* ---------- respaldo / sincronizar dispositivos ---------- */
async function renderRespaldo(err, aviso){
  const _w=document.querySelector('.wrap'); if(_w){_w.classList.remove('split');_w.classList.remove('camino-solo');}
  const nMaterias=materias.length;
  const nLogros=CATALOGO_LOGROS.filter(l=>tieneLogro(l.id)).length;
  $app.innerHTML=`
    ${marcaHTML()}
    <button class="volver" id="volver">← Volver</button>
    <div class="card">
      <h2>Pasar a otro dispositivo</h2>
      <p class="sub">Llevá todo a tu celu o a la compu: materias, progreso, logros y tu clave.</p>
      <div class="info-cuota">
        <strong>📦 Qué se guarda</strong>
        Tus ${nMaterias} materia${nMaterias===1?'':'s'} con el contenido y el progreso, ${nLogros} logro${nLogros===1?'':'s'}, tu racha 🔥 ${racha.dias} y la meta diaria. Podés incluir también tu clave de Gemini para no tener que cargarla de nuevo.
      </div>
      <label style="display:flex;align-items:center;gap:8px;margin-top:16px;font-weight:600">
        <input type="checkbox" id="con-clave" checked style="width:auto">
        <span>Incluir mi clave de Gemini</span>
      </label>
      <p class="hint">Si vas a mandarte el código a vos mismo (mail, notas), dejalo tildado. Si se lo pasás a otra persona, destildalo: tu clave es tuya.</p>
      <button class="btn" id="generar">📤 Generar respaldo</button>
      <div id="salida"></div>
      <hr style="border:none;border-top:1.5px solid var(--borde);margin:24px 0">
      <h2 style="font-size:20px">Restaurar respaldo</h2>
      <p class="sub">Pegá acá el código que generaste en el otro dispositivo.</p>
      <textarea id="codigo-in" style="min-height:100px;font-family:ui-monospace,monospace;font-size:12px" placeholder="R1_..."></textarea>
      <button class="btn sec" id="archivo-btn">📂 Cargar archivo</button>
      <input type="file" id="archivo-in" accept=".txt" style="display:none">
      ${aviso?`<div class="info-cuota" style="background:var(--aprobado-claro);border-color:var(--aprobado)">${esc(aviso)}</div>`:''}
      <div id="err-resp">${err?`<div class="err">${esc(err)}</div>`:''}</div>
      <button class="btn" id="restaurar">📥 Restaurar (sumar a lo que tengo)</button>
      <button class="btn sec" id="restaurar-r">♻️ Restaurar reemplazando todo</button>
    </div>`;
  wireMarca();
  document.getElementById('volver').onclick=()=>{vista={tipo:'ajustes',volver:{tipo:'inicio'}};render();};

  document.getElementById('generar').onclick=async ()=>{
    const btn=document.getElementById('generar');
    btn.disabled=true; btn.textContent='Generando…';
    const conClave=document.getElementById('con-clave').checked;
    try{
      const cod=await exportarPerfil(conClave);
      document.getElementById('salida').innerHTML=`
        <div class="codigo-box" id="codigo">${esc(cod)}</div>
        <p class="hint">${(cod.length/1000).toFixed(1)}k caracteres</p>
        <button class="btn" id="copiar">📋 Copiar</button>
        <button class="btn sec" id="descargar">💾 Descargar archivo</button>`;
      document.getElementById('copiar').onclick=async ()=>{
        const b=document.getElementById('copiar');
        try{ await navigator.clipboard.writeText(cod); b.textContent='✓ ¡Copiado!'; setTimeout(()=>{b.textContent='📋 Copiar';},2000); }
        catch(e){ b.textContent='Copialo a mano del recuadro'; }
      };
      document.getElementById('descargar').onclick=()=>{
        const blob=new Blob([cod],{type:'text/plain'});
        const a=document.createElement('a');
        a.href=URL.createObjectURL(blob);
        a.download='estudiotrack-respaldo.txt';
        a.click();
        URL.revokeObjectURL(a.href);
      };
    }catch(e){
      document.getElementById('salida').innerHTML=`<div class="err">No pude generar el respaldo: ${esc(e.message||'')}</div>`;
    }
    btn.disabled=false; btn.textContent='📤 Generar respaldo';
  };

  const inp=document.getElementById('archivo-in');
  document.getElementById('archivo-btn').onclick=()=>inp.click();
  inp.onchange=()=>{
    const f=inp.files[0]; if(!f) return;
    const r=new FileReader();
    r.onload=()=>{ document.getElementById('codigo-in').value=String(r.result).trim(); };
    r.readAsText(f);
  };

  const hacerRestaurar=async (modo)=>{
    const cod=document.getElementById('codigo-in').value.trim();
    if(!cod){ renderRespaldo('Pegá el código o cargá el archivo primero.'); return; }
    if(modo==='reemplazar' && !confirm('Esto BORRA las materias que tenés en este dispositivo y las reemplaza por las del respaldo. ¿Seguimos?')) return;
    try{
      const n=await importarPerfil(cod, modo);
      vista={tipo:'inicio'};
      render();
      setTimeout(()=>alert(`Listo: se restauraron ${n} materia${n===1?'':'s'}.`),100);
    }catch(e){
      renderRespaldo('No pude restaurar: '+(e.message||'código inválido'));
    }
  };
  document.getElementById('restaurar').onclick=()=>hacerRestaurar('sumar');
  document.getElementById('restaurar-r').onclick=()=>hacerRestaurar('reemplazar');
}

/* ---------- compartir materia ---------- */
async function renderCompartir(){
  const _w=document.querySelector('.wrap'); if(_w){_w.classList.remove('split');_w.classList.remove('camino-solo');}
  const m=materias.find(x=>x.id===vista.id);
  if(!m){vista={tipo:'inicio'};render();return;}
  $app.innerHTML=`${marcaHTML()}
    <div class="card cargando"><span class="lapiz">📤</span><p>Preparando el código…</p></div>`;
  wireMarca();

  let codigo;
  try{ codigo=await exportarMateria(vista.id); }
  catch(e){ codigo=null; }
  if(!codigo){
    $app.innerHTML=`${marcaHTML()}<div class="card"><h2>Ups</h2><p class="sub">No pude generar el código.</p><button class="btn sec" id="v">Volver</button></div>`;
    wireMarca();
    document.getElementById('v').onclick=()=>{vista={tipo:'camino',id:m.id};render();};
    return;
  }

  const d=datosMateria(vista.id);
  const nodosListos=Object.keys(d.contenido||{}).length;
  const totalNodos=nodosPlanos(d).length;

  $app.innerHTML=`
    ${marcaHTML()}
    <button class="volver" id="volver">← Volver</button>
    <div class="card">
      <h2>Compartir "${esc(m.nombre)}"</h2>
      <p class="sub">Pasale este código a un amigo y va a tener la materia entera, lista para estudiar.</p>
      <div class="info-cuota">
        <strong>💡 Por qué conviene compartir</strong>
        Cada uno usa su propia clave gratuita de Gemini, que tiene un límite de pedidos por día. Cuando compartís una materia, va con el contenido <strong>ya generado</strong>: tu amigo no gasta nada de su cuota en armarla. Cuanto más contenido tengas hecho, más le ahorrás.
      </div>
      <p class="hint" style="margin-top:12px">De esta materia ya tenés generado: <strong>${nodosListos} de ${totalNodos}</strong> nodos. Los que falten, tu amigo los va a generar con su propia clave a medida que avance.</p>
      <div class="codigo-box" id="codigo">${esc(codigo)}</div>
      <p class="hint">${(codigo.length/1000).toFixed(1)}k caracteres</p>
      <button class="btn" id="copiar">📋 Copiar código</button>
      <button class="btn sec" id="descargar">💾 Descargar como archivo</button>
    </div>`;
  wireMarca();
  document.getElementById('volver').onclick=()=>{vista={tipo:'camino',id:m.id};render();};
  document.getElementById('copiar').onclick=async ()=>{
    const btn=document.getElementById('copiar');
    try{
      await navigator.clipboard.writeText(codigo);
      btn.textContent='✓ ¡Copiado!';
      setTimeout(()=>{btn.textContent='📋 Copiar código';},2000);
    }catch(e){
      // fallback: seleccionar el texto
      const r=document.createRange();
      r.selectNode(document.getElementById('codigo'));
      window.getSelection().removeAllRanges();
      window.getSelection().addRange(r);
      btn.textContent='Copialo a mano (está seleccionado)';
    }
  };
  document.getElementById('descargar').onclick=()=>{
    const blob=new Blob([codigo],{type:'text/plain'});
    const a=document.createElement('a');
    a.href=URL.createObjectURL(blob);
    a.download=`estudiotrack-${m.nombre.replace(/[^a-z0-9]/gi,'-').toLowerCase()}.txt`;
    a.click();
    URL.revokeObjectURL(a.href);
  };
}

          <select id="objetivo">
            <option value="4+">4+ · aprobar</option>
            <option value="6+">6+ · buena</option>
            <option value="8+" selected>8+ · muy buena</option>
            <option value="10">10 · promocionar</option>
          </select>
        </div>
      </div>
      <label>Tus apuntes</label>
      <div class="dropzone" id="dz">
        <strong>Subí tus resúmenes</strong> — PDF, Word, PowerPoint, texto o fotos de apuntes<br>
        <span class="hint">Tocá acá o arrastrá los archivos</span>
        <input type="file" id="inputArchivos" multiple accept=".pdf,.docx,.pptx,.txt,.md,image/png,image/jpeg,image/webp">
      </div>
      <div class="archivos" id="lista-archivos"></div>
      <label for="extra">¿Algo más? (opcional)</label>
      <textarea id="extra" placeholder="Pegá texto acá, o aclaraciones: qué temas entran, qué pesa más…"></textarea>
      <p class="hint">El objetivo cambia la exigencia real: con 4+ las preguntas van a lo esencial y aprobás con 60%; con 10 son de nivel promoción y necesitás 85%.</p>
      <p class="hint">Las fotos se transcriben con IA. PDFs escaneados o PowerPoints que son pura imagen: subí las páginas como fotos.</p>
      <div id="err-nueva">${err?`<div class="err">${esc(err)}</div>`:''}</div>
      <button class="btn" id="crear">Armar mi camino</button>
      <button class="btn sec" id="cancelar">Volver</button>
    </div>`;
  wireMarca();
  const dz=document.getElementById('dz');
  const inp=document.getElementById('inputArchivos');
  dz.onclick=()=>inp.click();
  dz.ondragover=e=>{e.preventDefault();dz.classList.add('arrastrando');};
  dz.ondragleave=()=>dz.classList.remove('arrastrando');
  dz.ondrop=e=>{e.preventDefault();dz.classList.remove('arrastrando');[...e.dataTransfer.files].forEach(procesarArchivo);};
  inp.onchange=()=>{[...inp.files].forEach(procesarArchivo);inp.value='';};
  pintarArchivos();
  document.getElementById('cancelar').onclick=()=>{vista={tipo:'inicio'};render();};

  document.getElementById('crear').onclick=async ()=>{
    const mostrarErr=m=>{const el=document.getElementById('err-nueva');if(el)el.innerHTML=`<div class="err">${esc(m)}</div>`;};
    const nombre=document.getElementById('materia').value.trim();
    const fecha=document.getElementById('fecha').value;
    const objetivo=document.getElementById('objetivo').value;
    const extra=document.getElementById('extra').value.trim();
    if(archivosSubidos.some(a=>a.estado==='leyendo')){mostrarErr('Esperá que terminen de leerse los archivos.');return;}
    const apuntes=[textoDeArchivos(),extra].filter(Boolean).join('\n\n');
    if(!nombre||!fecha||apuntes.length<100){mostrarErr('Completá la materia, la fecha y subí material con contenido (o pegá texto).');return;}

    vista={tipo:'generando',msg:'Leyendo tus apuntes y armando el plan…'};render();
    try{
      const m={id:'m'+Date.now(),nombre,fecha,objetivo};
      let plan=null;
      for(let intentoPlan=0;intentoPlan<3;intentoPlan++){
        const p=await iaJSON(pPlan(m,apuntes),6144,true);
        const unidades=(p&&p.unidades)||[];
        const conNodos=unidades.filter(u=>u.nodos&&u.nodos.length);
        if(unidades.length>=3 && conNodos.length>=3){ plan=p; break; }
      }
      if(!plan) throw new Error('La IA armó un plan demasiado corto. Reintentá, o subí apuntes con un poco más de contenido.');
      materias.push(m);
      J.set('et:materias',materias);
      guardarMateria(m.id,{apuntes:recortar(apuntes,200000),plan,completados:{},contenido:{},usadas:{}});
      archivosSubidos=[];
      vista={tipo:'camino',id:m.id};render();
    }catch(e){
      renderNueva(mensajeError(e));
    }
  };
}

/* ---------- camino ---------- */
function esDesktop(){ return window.matchMedia('(min-width:900px)').matches; }

// construye el HTML del camino (columna de nodos). Si compacto, sin acciones grandes.
function caminoHTML(m,d){
  const planos=nodosPlanos(d);
  const actual=planos.find(n=>!d.completados[n.id]);
  let html='';
  d.plan.unidades.forEach((u,ui)=>{
    html+=`<div class="unidad-titulo">${esc(u.titulo)}</div>`;
    u.nodos.forEach((n,ni)=>{
      const id=`${ui}-${ni}`;
      const idx=planos.findIndex(p=>p.id===id);
      const ok=!!d.completados[id];
      const desbloq=repasoLibre||ok||planos.slice(0,idx).every(p=>d.completados[p.id]);
      const esActual=!repasoLibre&&actual&&actual.id===id;
      const seleccionado=(vista.nid===id&&(vista.tipo==='leccion'||vista.tipo==='quiz'));
      html+=`
        <button class="nodo ${ok?'ok':''} ${!desbloq?'bloq':''} ${esActual?'actual':''} ${seleccionado?'sel':''}" data-id="${id}" ${!desbloq?'disabled':''}>
          <span class="icono">${iconoNodo(n.tipo)}</span>
          <span class="txt">
            <span class="tipo">${nombreTipo(n.tipo)}</span><br>
            <span class="tit">${esc(n.titulo)}</span>
          </span>
          ${ok?'<span class="check">✓</span>':''}
        </button>`;
    });
  });
  return html;
}

/* ---------- abrir nodo ---------- */
// avanza a la siguiente tanda del banco. Devuelve true si hay preguntas nuevas sin gastar cuota.
// cuántas tandas COMPLETAS de 5 entran en el banco (descarta el resto suelto)
function tandasDe(banco){ return Math.max(1, Math.floor(banco.length/5)); }

function siguienteTanda(mid,nid){
  const d=datosMateria(mid);
  const c=d.contenido[nid];
  if(!c||!c.preguntas) return false;
  const buenas=limpiarPreguntas(c.preguntas);
  const tandas=tandasDe(buenas);
  if(tandas<2) return false;                       // no hay banco extra: hay que pedir a la IA
  c.tanda=((c.tanda||0)+1)%tandas;
  guardarMateria(mid,d);
  return true;
}

async function abrirNodo(mid, nid, forzarNuevo){
  const m=materias.find(x=>x.id===mid);
  let d=datosMateria(mid);
  const planos=nodosPlanos(d);
  const nodo=planos.find(n=>n.id===nid);
  if(!nodo) return;

  const ui=parseInt(nid.split('-')[0],10);
  const unidad=d.plan.unidades[ui];
  const esSimulacro=nodo.tipo==='simulacro';

  // REINTENTO GRATIS: solo para quizzes de unidad (el examen final siempre se regenera entero)
  if(forzarNuevo && nodo.tipo==='quiz' && siguienteTanda(mid,nid)){
    forzarNuevo=false;      // no hace falta llamar a la IA
    d=datosMateria(mid);    // RELEER: siguienteTanda actualizó la tanda en disco
  }

  if(!d.contenido[nid]||forzarNuevo){
    vista={tipo:'generando',msg:esSimulacro?'Armando el examen final…':(forzarNuevo?'Generando preguntas nuevas…':'Preparando la unidad…')};
    render();
    try{
      if(esSimulacro){
        // el examen final se genera solo (cubre todos los temas)
        const evitar=d.usadas[nid]||'';
        const cont=await iaJSON(pQuiz(m,d.apuntes,nodo,true,evitar),8192,false,0.85);
        let ok=limpiarPreguntas(cont.preguntas);
        ok=quitarRepetidas(ok, evitar);          // el examen final nunca repite
        if(ok.length<6) throw new Error('El examen vino incompleto. Probá de nuevo.');
        d.usadas[nid]=[(d.usadas[nid]||''),ok.map(p=>p.q).join(' | ')].filter(Boolean).join(' | ');
        d.contenido[nid]={preguntas:ok};   // el examen final se rinde entero, sin tandas
      }else if(forzarNuevo && nodo.tipo==='quiz'){
        // reintento: pedir preguntas NUEVAS a la IA solo si el banco local ya se agotó
        const evitar=d.usadas[nid]||'';
        const cont=await iaJSON(pQuiz(m,d.apuntes,nodo,false,evitar),6144,false,0.9);
        let ok=limpiarPreguntas(cont.preguntas);
        ok=quitarRepetidas(ok, evitar);
        if(ok.length<3) throw new Error('La IA repitió las preguntas anteriores. Probá de nuevo en un momento.');
        d.usadas[nid]=[(d.usadas[nid]||''),ok.map(p=>p.q).join(' | ')].filter(Boolean).join(' | ');
        // sumar las nuevas al banco existente
        const previas=(d.contenido[nid]&&d.contenido[nid].preguntas)||[];
        d.contenido[nid]={preguntas:previas.concat(ok), tanda:Math.floor(previas.length/5)};
      }else{
        // UN SOLO PEDIDO genera la lección Y el quiz de toda la unidad (ahorra cuota)
        const cont=await iaJSON(pUnidad(m,d.apuntes,unidad),16384);
        if(!cont.leccion||!cont.quiz) throw new Error('La unidad vino incompleta');
        const banco=limpiarPreguntas(cont.quiz.preguntas);
        if(banco.length<3) throw new Error('La IA devolvió un quiz incompleto. Probá de nuevo.');
        unidad.nodos.forEach((n,ni)=>{
          const id=`${ui}-${ni}`;
          if(n.tipo==='leccion') d.contenido[id]=cont.leccion;
          else if(n.tipo==='quiz'){
            // banco completo (hasta 15). Se sirven de a 5: los reintentos no gastan cuota.
            d.contenido[id]={preguntas:banco, tanda:0};
            d.usadas[id]=banco.map(p=>p.q).join(' | ');
          }
        });
      }
      guardarMateria(mid,d);
    }catch(e){
      // Falló generar preguntas nuevas. NO mentir mostrando las viejas como si fueran nuevas:
      // avisar con honestidad y dejar que el usuario elija.
      if(forzarNuevo && d.contenido[nid] && (d.contenido[nid].preguntas||[]).length){
        const seguir=confirm(
          'No pude generar preguntas nuevas.\n\n'+mensajeError(e)+
          '\n\n¿Querés repasar con las MISMAS preguntas de antes (mezcladas)?\n\n'+
          'Aceptar = repasar las mismas\nCancelar = volver al camino'
        );
        if(seguir){
          vista={tipo:'quiz',mid,nid,nodo,preguntas:barajar(limpiarPreguntas(d.contenido[nid].preguntas)),i:0,aciertos:0,respondida:false,sonRepetidas:true};
          render();
          return;
        }
      }
      vista={tipo:'camino',id:mid};render();
      alert(mensajeError(e));
      return;
    }
  }
  const c=d.contenido[nid];
  if(!c){ vista={tipo:'camino',id:mid}; render(); alert('No se generó el contenido de este nodo. Probá de nuevo.'); return; }
  if(nodo.tipo==='leccion'){
    vista={tipo:'leccion',mid,nid,nodo,contenido:c};
  }else{
    const buenas=limpiarPreguntas(c.preguntas);
    if(buenas.length<3){
      if(!forzarNuevo){ return abrirNodo(mid,nid,true); }
      vista={tipo:'camino',id:mid}; render();
      alert('Este quiz quedó incompleto. Probá de nuevo en un momento.');
      return;
    }
    if(nodo.tipo==='simulacro'){
      // EXAMEN FINAL: se rinde entero, sin tandas. Todas las preguntas de una.
      vista={tipo:'quiz',mid,nid,nodo,preguntas:barajar(buenas),i:0,aciertos:0,respondida:false,
             tandaActual:0, tandasTotales:1};
    }else{
      // quiz de unidad: 5 preguntas por tanda (reintentos gratis con preguntas distintas)
      const POR_TANDA=5;
      const tandas=tandasDe(buenas);
      const t=((c.tanda||0)%tandas);
      let lote=buenas.slice(t*POR_TANDA,(t+1)*POR_TANDA);
      if(lote.length<POR_TANDA) lote=buenas.slice(0,POR_TANDA);
      vista={tipo:'quiz',mid,nid,nodo,preguntas:barajar(lote),i:0,aciertos:0,respondida:false,
             tandaActual:t, tandasTotales:tandas};
    }
  }
  render();
}

/* ---------- quiz / simulacro ---------- */
function renderQuiz(){
  const total=vista.preguntas.length;
  if(vista.i>=total){renderResultado(total);return;}
  const q=vista.preguntas[vista.i];
  const html=`
    <button class="volver" id="volver">← Volver al camino</button>
    <div class="card">
      <div class="q-num">${nombreTipo(vista.nodo.tipo)} · Pregunta ${vista.i+1} de ${total}${(vista.tandasTotales>1&&vista.nodo.tipo!=='simulacro')?` · serie ${(vista.tandaActual||0)+1}/${vista.tandasTotales}`:''}</div>
      <div class="q-texto">${esc(q.q)}</div>
      <div id="ops">
        ${q.opciones.map((o,i)=>`<button class="opcion" data-i="${i}">${esc(o)}</button>`).join('')}
      </div>
      <div id="feedback"></div>
    </div>`;
  pintarContenido(html, ()=>{
  const bv=document.getElementById('volver');
  if(bv) bv.onclick=()=>{vista={tipo:'camino',id:vista.mid};render();};
  document.querySelectorAll('.opcion').forEach(btn=>{
    btn.onclick=()=>{
      if(vista.respondida)return;
      vista.respondida=true;
      const elegida=+btn.dataset.i;
      const bien=elegida===q.correcta;
      if(bien)vista.aciertos++;
      $app.querySelectorAll('.opcion').forEach(b=>{
        b.disabled=true;
        const i=+b.dataset.i;
        if(i===q.correcta)b.classList.add('correcta');
        else if(i===elegida)b.classList.add('mal');
      });
      document.getElementById('feedback').innerHTML=`
        <div class="explic ${bien?'bien':'mal'}">
          <strong>${bien?'¡Bien ahí! ✓':'No era esa ✗'}</strong>
          ${bien?'':`<div style="margin-bottom:6px"><strong style="display:inline;font-weight:700">La correcta era:</strong> ${esc(q.opciones[q.correcta])}</div>`}
          ${esc(q.explicacion||'')}
        </div>
        <button class="btn" id="sig">${vista.i+1<total?'Siguiente pregunta':'Ver resultado'}</button>`;
      document.getElementById('sig').onclick=()=>{vista.i++;vista.respondida=false;render();};
    };
  });
  });
}

function renderResultado(total){
  const m=materias.find(x=>x.id===vista.mid);
  const ex=exigencia(m?m.objetivo:'8+');
  const pct=Math.round(vista.aciertos/total*100);
  const aprobado=pct>=ex.umbral;
  const nota=Math.max(1,Math.round(pct/10));
  const html=`
    <div class="card resultado">
      <div class="nota">${vista.aciertos}/${total}</div>
      <p><strong>${aprobado?'¡Aprobado!':'Todavía no'}</strong> — equivale a un ${nota} más o menos.</p>
      <p class="sub">${repasoLibre
          ?'Modo repaso: practicaste este quiz sin afectar tu progreso.'
          :(aprobado?'Nodo completado. Seguí el camino.':`Con objetivo ${esc(m?m.objetivo:'8+')} necesitás ${ex.umbral}% para avanzar. ${vista.nodo.tipo==='simulacro'?'Repasá las unidades flojas y volvé a rendir: el examen se arma de nuevo con otras preguntas.':`Repasá la lección y reintentá${vista.tandasTotales>1?': te esperan preguntas distintas':''}.`}`)}</p>
      <div class="acciones-pie">
        ${repasoLibre
          ?`<button class="btn sec" id="volverBtn">Volver al camino</button><button class="btn" id="reint">Practicar otra vez</button>`
          :(aprobado
            ?`<button class="btn" id="seguir">Seguir el camino →</button>`
            :`<button class="btn sec" id="volverBtn">Volver al camino</button>
              <button class="btn" id="reint">Reintentar</button>`)}
      </div>
    </div>`;
  pintarContenido(html, ()=>{
    if(repasoLibre){
      document.getElementById('volverBtn').onclick=()=>{vista={tipo:'camino',id:vista.mid};render();};
      document.getElementById('reint').onclick=()=>abrirNodo(vista.mid,vista.nid,true);
    }else if(aprobado){
      document.getElementById('seguir').onclick=()=>{
        const d=datosMateria(vista.mid);
        const esNuevo=!d.completados[vista.nid];
        d.completados[vista.nid]=true;
        guardarMateria(vista.mid,d);
        if(esNuevo) marcarRacha();
        const perfecto = vista.aciertos===total;
        const esSim = vista.nodo.tipo==='simulacro';
        vista={tipo:'camino',id:vista.mid};render();
        if(esNuevo) chequearLogros({quizPerfecto:perfecto, esSimulacro:esSim});
      };
    }else{
      document.getElementById('volverBtn').onclick=()=>{vista={tipo:'camino',id:vista.mid};render();};
      document.getElementById('reint').onclick=()=>abrirNodo(vista.mid,vista.nid,true);
    }
  });
}

/* ---------- PWA: registrar service worker + botón instalar ---------- */
if('serviceWorker' in navigator){
  window.addEventListener('load',()=>{
    navigator.serviceWorker.register('sw.js').catch(e=>console.warn('SW no registrado:',e));
  });
}
let promptInstalar=null;
window.addEventListener('beforeinstallprompt',(e)=>{
  e.preventDefault();
  promptInstalar=e;
  if(st.get('et:instalar-no')==='1') return; // el usuario ya lo descartó
  mostrarBannerInstalar();
});
function mostrarBannerInstalar(){
  if(document.getElementById('instalar-banner')||!promptInstalar) return;
  const b=document.createElement('div');
  b.className='instalar-banner';
  b.id='instalar-banner';
  b.innerHTML=`<span class="ib-ico">📲</span>
    <span class="ib-tx">Instalá EstudioTrack en tu celu para abrirla como una app.</span>
    <button class="ib-si" id="ib-si">Instalar</button>
    <button class="ib-no" id="ib-no">Ahora no</button>`;
  document.body.appendChild(b);
  document.getElementById('ib-si').onclick=async ()=>{
    b.remove();
    if(promptInstalar){ promptInstalar.prompt(); await promptInstalar.userChoice; promptInstalar=null; }
  };
  document.getElementById('ib-no').onclick=()=>{ b.remove(); st.set('et:instalar-no','1'); };
}
window.addEventListener('appinstalled',()=>{ const b=document.getElementById('instalar-banner'); if(b)b.remove(); });

/* ---------- arranque ---------- */
let _rt;
window.addEventListener('resize',()=>{
  clearTimeout(_rt);
  _rt=setTimeout(()=>{
    if(vista.tipo==='leccion'||vista.tipo==='quiz'||vista.tipo==='camino') render();
  },200);
});
render();
</script>
